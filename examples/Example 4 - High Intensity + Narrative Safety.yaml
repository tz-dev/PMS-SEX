  minimal_vignette:
    scene_bound: true
    non_identifying: true
    non_instructional: true
    scene_id: "CASE_04_HIGH_INTENSITY_NARRATIVE_SAFETY"
    scene_type: "repeated high-activation sexual configuration"
    abstraction_level: "generic_non_identifying"
    text: >
      A repeated high-intensity sexual configuration develops over a
      short-to-medium timeframe. The scene is narrated as safe because
      communication is frequent, transparent, and mutually reassuring. Under high
      activation, however, the frame remains verbally stable while practical
      stop-capability, pacing, recovery realism, cost-topology tracking, and
      after-cost regulation weaken. Costs appear sudden only after repetition,
      asymmetry, and temporality have already compressed.
    scene_boundaries:
      scene_unit: "repeated high-activation sexual configuration"
      timeframe: "short-to-medium timeframe with rapid escalation"
      frame_anchor: "narratively stable communicative frame"
      frame_description: >
        The configuration is internally described as communicative, transparent,
        and mutually understood. This frame remains narratively intact, but its
        practical regulatory capacity weakens under peak activation.
      roles_not_persons:
        R1:
          description: >
            Role with higher exposure to bodily, reputational, binding-related,
            recovery-related, or exit-related after-costs.
          structural_position:
            - "higher downstream exposure"
            - "higher recovery burden"
            - "greater sensitivity to accumulated costs"
            - "greater dependence on timely Χ activation"
            - "higher cost if intensity becomes identity, proof, or obligation"
        R2:
          description: >
            Role with higher tolerance for escalation, faster recovery from
            overload, or lower downstream exposure to accumulated after-costs.
          structural_position:
            - "higher escalation tolerance"
            - "lower recovery burden"
            - "greater continuity capacity under intensity"
            - "greater capacity to treat the frame as narratively resolved"
            - "higher risk of externalizing R1's after-costs through reassurance or parity language"

    trigger:
      delta:
        operator: "Δ"
        description: >
          High salience of mutual desire, exceptional intensity, and the
          difference between narrated safety and actual containment capacity
          becomes visible.
      impulse:
        operator: "∇"
        description: >
          Strong activation pressure demands immediate enactment and continuity
          rather than paced coordination, delay, de-escalation, or structural
          re-checking.

    lambda_candidates_expected_but_missing:
      - id: "neutral_deescalating_pause"
        operator: "Λ"
        expected_form: >
          Pauses that actually de-escalate rather than merely postpone
          escalation.
        missing_form: >
          Pauses become difficult to hold because interruption appears to weaken
          the exceptional intensity of the frame.
      - id: "neutral_delay"
        operator: "Λ"
        expected_form: >
          Silence, delay, or slower pacing can be tolerated without becoming
          alarming.
        missing_form: >
          Delay is read as loss of mood, loss of intensity, or possible
          weakening of the shared narrative.
      - id: "cost_topology_review"
        operator: "Λ"
        expected_form: >
          Repeated high activation triggers review of bodily, exposure,
          recovery, binding, exit, publicness, and responsibility costs.
        missing_form: >
          Cost review is replaced by reassurance, explanation, or the claim that
          communication has already made the frame safe.
      - id: "peak_condition_frame_test"
        operator: "Λ"
        expected_form: >
          The frame is tested under peak conditions, not only during calm
          narration.
        missing_form: >
          The frame is treated as sufficient because it is coherent in
          explanation, even if it weakens under activation.

    observed_realizations_neutral:
      - "Frequent reassurance talk replaces structural checks."
      - "De-escalation is framed as breaking the mood."
      - "Post-hoc explanation substitutes for pre-hoc regulation."
      - "Stop-capability exists in principle but is rarely activated under peak pressure."
      - "The communicative frame remains narratively stable while recovery and exposure gradients sharpen."
      - "High activation makes small coordination gaps consequential before they are nameable."
      - "The frame's internal safety narrative remains stronger than its operational pacing capacity."

  repo_usefulness:
    structural_focus: >
      This case is repo-useful because it isolates a configuration in which
      intensity does not become risky by moral defect, bad intent, or lack of
      communication, but through intensity-structure mismatch. It shows how ∇,
      Α, Ω, Θ, Φ, and Χ interact when a frame remains narratively coherent but
      operationally weak under load. PMS-SEX 1.2 adds that high-intensity scenes
      require explicit sexual cost-topology mapping, switch-drift scanning, and
      asymmetry-specific responsibility because mutual narration alone does not
      distribute after-costs.
    demonstrates:
      - "intensity as drift multiplier"
      - "communication as necessary but not sufficient for containment"
      - "Φ narrative safety substituting for operative Χ and Σ"
      - "compressed Θ accumulation under rapid repetition"
      - "Ω sharpening through unequal recovery, exposure, and after-costs"
      - "sexual cost topology becoming visible only after acceleration"
      - "parity-to-exit risk where mutual intensity or mutual communication denies unequal after-cost responsibility"
      - "responsibility-to-authority risk where protection, safety, or pacing becomes frame control"
      - "asymmetry-switch drift risk where overload or vulnerability is activated without marking, bounding, and re-binding"
      - "operator-profile-only discipline where maturity-relevant questions would require MIP docking"
    profile_links:
      reduced_signatures:
        - id: "MF_16_2"
          label: "16.2 Minimal Formula — High-Risk / Extreme Practices"
          raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ; pulling arrows: ∇ → □ → Ω → Θ"
        - id: "MF_19_2"
          label: "19.2 Minimal Formula — Functional Conditions and Warning Signals"
          raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ; dominant interaction: Ω → Θ, with accumulated Θ making Ω layouts more visible and consequential"
      relevant_profile_blocks:
        - "overlay_concepts.publicness_as_overlay"
        - "overlay_concepts.path_cost_language"
        - "drift_catalogue.core_dysfunction_markers_ch18_3"
        - "viability.functional_minimum_conditions_ch19_3"
        - "viability.warning_signals_ch19_4"
        - "dignity_in_practice_module"
        - "analysis_checklist"
        - "example_suite_schema"
        - "sexual_cost_topology"
        - "eden_pfo_asymmetry_switch_reference"
        - "mip_docking_interface"

  operator_mapping:
    canonical_spine:
      raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
      dependency_note: >
        This case foregrounds ∇ escalation, Α acceleration, Ω sharpening, Θ
        compression, Φ narrative substitution, and Χ erosion. The foregrounding
        is shorthand only and does not alter PMS v1.3 order or dependencies.
        Sexual cost topology, asymmetry switch, parity-to-exit,
        responsibility-to-authority, adult sexual reciprocity, and
        asymmetry-specific responsibility are PMS-SEX overlay handles, not PMS
        operators.

    case_reduced_signature:
      selected_profile_signature: "MF_16_2"
      raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ; pulling arrows: ∇ → □ → Ω → Θ"
      local_foregrounding: "∇↑ → Α↑ → Ω↑ → Θ↑ with □ held narratively constant and Χ operationally weak"
      reduced: true
      operators: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
      hygiene_note: >
        The reduced trace highlights the local drift mechanics of intensity. It
        uses the PMS-SEX MF_16_2 shorthand and presupposes the canonical PMS v1.3
        spine. It does not create a new dependency graph. Any use of Χ
        presupposes Φ, Θ, and □. Any use of Σ presupposes Χ and Φ. Any use of Ψ
        presupposes Σ, Θ, and Χ.

    additional_reduced_signatures:
      - id: "MF_4_2"
        label: "Asymmetry / Sexual Cost Topology"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ"
        reason: >
          The case becomes legible once repeated high activation produces
          uneven recovery, exposure, after-cost, exit, and responsibility
          gradients across time.
      - id: "MF_5_2"
        label: "Temporality"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ"
        reason: >
          High intensity compresses time. Costs appear sudden because Θ
          accumulates faster than the frame updates.
      - id: "MF_6_2"
        label: "Exit Realism"
        raw: "(□ → Λ → Α) → Ω → Θ → (Χ/Σ/Ψ)"
        reason: >
          Stop-capability may remain declared while practical exit, slowing, or
          de-escalation become harder under peak activation.
      - id: "MF_10_2"
        label: "Distance"
        raw: "Δ → ∇ → □ → (Λ) → Α → Ω → Θ → Φ → Χ"
        reason: >
          The critical viability question is whether Χ works under intensity,
          not only during calm re-narration.
      - id: "MF_12_2"
        label: "Self-Binding"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
        reason: >
          Exceptional intensity may begin to carry self-worth, proof,
          commitment, or identity-relevant stakes if Ψ is not explicitly
          handled.
      - id: "sexual_cost_topology_signature_ch4_6"
        label: "Sexual Cost Topology — Ω/Θ cost layout"
        raw: "Ω/Θ cost topology across bodily, exposure, reputational, binding, exit, publicness, and responsibility channels"
        reason: >
          The case turns on mismatch between narrated safety and distributed
          after-costs under compressed Θ.
      - id: "eden_pfo_sexual_instantiation_signature"
        label: "EDEN/PFO Sexual Instantiation — asymmetry switch"
        raw: "real/invoked Ω/Θ pressure → asymmetry activation → marked/bounded/re-bound OR unmarked switch drift"
        reason: >
          Cross-domain switch logic is relevant as a guard: overload,
          vulnerability, protection, or recovery asymmetry may be named only
          where marked, bounded, and re-bound into Σ/Ψ.
      - id: "adult_sexual_reciprocity_signature"
        label: "Adult Sexual Reciprocity — non-externalization of unequal burdens"
        raw: "unequal Ω/Θ burdens + explicit cost topology + Χ restraint + Σ/Ψ re-binding → non-externalization"
        reason: >
          The case tests whether high intensity can remain reciprocal when
          after-costs are unequal and acceleration makes interruption difficult.

    operator_roles:
      delta:
        operator: "Δ"
        function_in_case: >
          Marks the difference between narrated mutual safety and practical
          containment under intensity.
      impulse:
        operator: "∇"
        function_in_case: >
          Drives rapid activation and immediate continuity pressure.
      frame:
        operator: "□"
        function_in_case: >
          Provides the communicative grammar of the scene: transparency,
          reassurance, mutual narration, and shared understanding.
        drift_risk: >
          The frame remains narratively stable while losing regulatory power
          under peak activation.
      non_event:
        operator: "Λ"
        function_in_case: >
          Pauses, delay, silence, slowing, cost review, or peak-condition
          re-testing become structurally significant because they are expected to
          regulate intensity but fail to remain neutral.
      attractor:
        operator: "Α"
        function_in_case: >
          Intensity-driven repetition stabilizes quickly into a preferred route.
        drift_risk: >
          High activation makes continuation locally easier than interruption,
          even where costs begin to appear.
      asymmetry:
        operator: "Ω"
        function_in_case: >
          Recovery capacity, exposure, after-cost handling, exit cost, and
          responsibility burden diverge between roles.
      temporality:
        operator: "Θ"
        function_in_case: >
          Costs accumulate rapidly and compress exit windows under repeated high
          activation.
      recontextualization:
        operator: "Φ"
        function_in_case: >
          Post-hoc narration, reassurance, and explanation reframe costs after
          they occur.
        drift_risk: >
          Φ substitutes for regulation when “we talked it through” replaces
          pacing, interruption, and cost accounting.
      distance:
        operator: "Χ"
        function_in_case: >
          Enables stopping, slowing, meta-commentary, humor, and de-escalation
          under pressure.
        drift_risk: >
          Χ becomes symbolic rather than operative when interruption is treated
          as betrayal of mood, intensity, or intimacy.
      integration:
        operator: "Σ"
        function_in_case: >
          Would be required to integrate intensity, asymmetry, recovery limits,
          exposure, cost topology, and frame claims without denial or
          compensation.
      self_binding:
        operator: "Ψ"
        function_in_case: >
          May become relevant if repeated intensity starts to carry identity,
          commitment, obligation, or self-worth stakes beyond the local frame.
        guard: >
          Any Ψ relevance must remain explicit, self-bound, and non-coercive.
          No covert Ψ demand may be imposed on another role.

  inner_outer_public_layer_distinction:
    core_rule: >
      Internal framing, outer legibility, public circulation, and temporal
      carryover may overlap, but must not be collapsed into one another.
    internal_framing:
      description: >
        The scene is inhabited as communicative, transparent, mutually intense,
        emotionally vivid, and narratively safe.
      guard: >
        Internal communicative meaning may be real without settling the outer
        structure of escalation, asymmetry, cost topology, or accumulated
        after-costs.
    outer_legibility:
      description: >
        Externally, the configuration is readable as high activation under a
        frame that narrates safety more reliably than it operationalizes
        interruption, recovery, cost-topology review, and after-cost tracking.
      guard: >
        Naming this outer legibility does not imply recklessness, blame,
        diagnosis, bad faith, maturity verdict, or adultness ranking.
    publicness_overlay:
      description: >
        Publicness may enter through documentation, witnesses, shared narratives,
        reputational traces, or circulation of the scene’s meaning beyond the
        original frame.
      status: "overlay"
      pms_layer: "□ extension"
      intensifies: ["Ω", "Θ"]
      interacts_with: ["□", "Α", "Λ", "Ψ"]
      guard: >
        Publicness does not necessarily generate the primary action-form, but it
        may harden exposure, sedimentize consequence, increase exit cost, and
        intensify reputational or documentation burdens.
    temporal_carryover:
      description: >
        Even when the scene is later explained, clarified, or mutually narrated
        as safe, accumulated bodily, reputational, emotional, exit-related, or
        binding-related residues remain Θ-relevant.
      guard: "Θ does not rewind."

  cost_layout:
    cost_layout_summary: >
      The core cost layout is Ω under compressed Θ: one role carries higher
      after-costs and recovery burden while the frame continues to present the
      configuration as mutually transparent and communicatively safe.
    primary_cost_channels:
      bodily:
        operators: ["Ω", "Θ"]
        description: >
          Recovery limits are reached earlier than acknowledged. The
          configuration may remain narratively safe while bodily after-costs
          accumulate.
        body_remainder_guard: >
          Bodily consequence is treated as a material interface of configuration
          cost, not as person-ranking, biological taxonomy, maturity ranking, or
          diagnosis.
      temporal:
        operators: ["Α", "Θ", "Χ"]
        description: >
          Repetition under high activation shrinks exit windows rapidly. The
          longer the scene continues without operational slowing, the more
          expensive interruption becomes.
      exposure:
        operators: ["Ω", "Θ"]
        description: >
          Documentation, witnesses, shared memory, reputational traces, or
          circulation may persist beyond the local frame.
        publicness_guard: >
          Exposure effects are treated as Θ/Ω intensifiers, not as the sole
          origin of consequence.
      reputational:
        operators: ["□", "Ω", "Θ"]
        description: >
          If the scene becomes socially visible or narratively shareable, one
          role may carry higher reputational, explanation, or standing cost.
      coordination:
        operators: ["□", "Φ", "Χ", "Σ"]
        description: >
          Repair effort increases non-linearly when communicative narration must
          account for costs that prior regulation failed to contain.
      binding_related:
        operators: ["Θ", "Ψ"]
        description: >
          Repeated exceptional intensity may begin to carry identity-relevant,
          proof-like, self-worth, or commitment-like stakes, even if the
          immediate frame initially appears local.
        psi_guard: >
          Binding relevance must not be smuggled into a limited frame as a proof
          demand or covert obligation.
      exit_related:
        operators: ["Χ", "Ω", "Θ", "Λ"]
        description: >
          Stop-capability, slowing, or de-escalation remains formally available
          but becomes harder to enact because interruption appears to betray
          intensity, intimacy, or the shared narrative.
      responsibility_related:
        operators: ["Ψ", "Χ", "Ω", "Σ"]
        description: >
          Responsibility becomes necessary around pacing, containment, recovery,
          after-cost tracking, and the refusal to let narrative safety substitute
          for operational restraint.

    asymmetry_pattern:
      R1:
        cost_position:
          - "higher after-cost absorption"
          - "greater recovery burden"
          - "higher exposure to bodily, reputational, or binding-related residues"
          - "greater dependence on timely Χ activation"
          - "higher risk if post-hoc explanation replaces pre-hoc regulation"
      R2:
        cost_position:
          - "higher tolerance for escalation"
          - "faster recovery from overload"
          - "lower downstream exposure"
          - "greater continuity capacity under intensity"
          - "greater risk of under-reading R1's accumulated after-costs"
      structural_result: >
        The same intensity is not structurally identical across roles. What is
        enrichment for one role may become accumulated after-cost handling for
        another.
      not_a_moral_claim: true

    system_effect: >
      Costs appear sudden because high intensity compresses accumulation. The
      collapse is not necessarily produced by conflict, malice, deception, or
      lack of communication; it can emerge when Θ catches up with a frame that
      never slowed enactment.

  sexual_cost_topology:
    definition: >
      Scene-bound distribution of bodily, temporal, exposure-related,
      reputational, binding-related, exit-related, publicness-related, and
      responsibility-related costs across sexual role-positions. Not a score,
      not a person measure, not a maturity measure, and not a dignity ranking.
    topology_status: "compressed_accumulation_under_narrative_safety"
    channels:
      bodily_costs:
        R1: "higher recovery burden, overload risk, saturation, or body remainder under repeated high activation"
        R2: "lower recovery burden or greater tolerance for escalation in the vignette"
      temporal_costs:
        R1: "higher compressed accumulation and shorter safe exit window under repetition"
        R2: "greater continuity capacity and stronger local reset plausibility"
      exposure_costs:
        R1: "higher exposure to after-effects, documentation, memory, or reputational traces where present"
        R2: "lower exposure or greater capacity to narratively contain the scene"
      reputational_costs:
        R1: "context-dependent; may rise if the high-intensity scene becomes socially or narratively visible"
        R2: "context-dependent; may be lower where recovery and exposure are lower"
      binding_costs:
        R1: "risk that exceptional intensity becomes self-worth, proof, or commitment-like residue"
        R2: "risk of under-reading binding residue because the scene is narrated as mutually understood"
      exit_costs:
        R1: "slowing or stopping becomes costly under peak activation and after repetition"
        R2: "exit or continuation may remain easier if recovery is faster and exposure lower"
      publicness_costs:
        R1: "overlay-dependent; intensified by documentation, witnesses, reputation, or circulation"
        R2: "overlay-dependent"
      responsibility_costs:
        R1: "must not let overload become only after-the-fact pressure; must preserve Χ and specificity where possible"
        R2: "must not externalize after-costs by relying on mutual communication or mutual intensity alone"
    cost_topology_mismatch:
      present: true
      expression: >
        Narrated safety, mutual communication, and shared intensity do not match
        the actual distribution of recovery burden, exposure, exit difficulty,
        binding residue, and responsibility costs under compressed Θ.
      guard: >
        Mismatch is configuration-language. It does not imply defective
        intensity, failed consent, pathology, recklessness, lower dignity, or
        person-level maturity ranking.

  typical_drift_markers:
    max_count_note: "Primary markers only; non-exhaustive and non-diagnostic."
    markers:
      - id: "phi_narrative_inflation"
        label: "Φ narrative inflation"
        source_profile: "viability.warning_signals_ch19_4"
        structural_note: "Φ substitutes for Σ(integration)."
        indicators:
          - "Reassurance repeatedly covers costs or asymmetry."
          - "Clarification and cost naming are replaced by re-description."
          - "The communicative story remains stable while Α/Ω/Θ continue unchanged."
        case_reading: >
          “We talked it through” begins to stand in for operational containment.
      - id: "persistence_despite_structural_undercutting"
        label: "Persistence despite clear structural undercutting"
        source_profile: "viability.warning_signals_ch19_4"
        structural_note: "Α + Θ overrun Χ."
        indicators:
          - "Repetition continues despite visible after-costs."
          - "Overload is recognized but not structurally interrupted."
          - "Insight does not alter the operator chain."
        case_reading: >
          The configuration continues because intensity remains coherent at the
          level of narration, even where regulation is failing.
      - id: "chi_loss_under_activation"
        label: "Χ erosion under intensity"
        source_profile: "drift_catalogue.core_dysfunction_markers_ch18_3.(6)"
        structural_note: "The meta-layer collapses under peak activation."
        indicators:
          - "Stopping feels like betrayal of intensity or intimacy."
          - "Meta-commentary is postponed until later."
          - "The only acceptable responses to overload are reassurance or continuation."
        case_reading: >
          Χ exists in principle but is not practically available at the moment
          when it would need to regulate the configuration.

    optional_secondary_markers:
      - id: "theta_cost_externalization"
        label: "Θ cost externalization"
        case_expression: >
          After-costs concentrate in R1 while the scene remains narrated as
          mutual, transparent, and equally carried.
      - id: "outer_form_denial"
        label: "Outer-form denial"
        case_expression: >
          The internal safety narrative blocks recognition that the enacted form
          is high-intensity repetition under uneven recovery and exposure.
      - id: "cost_topology_mismatch"
        label: "Cost-topology mismatch"
        case_expression: >
          Narrative safety does not match bodily, temporal, exposure,
          binding-related, exit-related, and responsibility-related costs.
      - id: "psi_leak"
        label: "Ψ leak / proof burden"
        case_expression: >
          Exceptional intensity becomes proof of intimacy, worth, commitment, or
          self-attribution without explicit Ψ handling.
      - id: "parity_to_exit"
        label: "Parity-to-exit"
        case_expression: >
          Mutual intensity or mutual communication is used to deny additional
          responsibility under unequal after-costs.
      - id: "responsibility_to_authority"
        label: "Responsibility-to-authority"
        case_expression: >
          Safety, protection, pacing, or care responsibility becomes frame
          authority instead of self-binding.

  switch_drift_markers:
    status: "relevant_as_scan_not_primary_claim"
    eden_pfo_reference:
      status: "cross_domain_reference_only"
      note: >
        PMS–EDEN names the regime-level asymmetry switch. PMS-SEX reads only the
        sexual instantiation where real or invoked Ω/Θ pressure may activate
        asymmetry. This adds no PMS operator and creates no person label.
    asymmetry_switch_drift:
      status: "possible"
      expression: >
        Overload, vulnerability, recovery burden, or exposure cost may be
        invoked to interrupt, reshape, or reframe the high-intensity scene. This
        is structurally viable only where activation is marked, bounded,
        connected to real Ω/Θ burden, and re-bound into Σ/Ψ. It drifts where
        overload or vulnerability becomes an unmarked, repeatable exception
        lever without re-binding.
      guard: >
        The drift is not naming overload or asymmetry as such. The drift is
        unmarked, repeatable activation without re-binding.
    parity_to_exit:
      status: "highly_relevant"
      expression: >
        'We both wanted this,' 'we talked about it,' 'we both said it was safe,'
        or 'it was mutual' may become parity rhetoric used to deny additional
        responsibility under unequal sexual cost topology.
      guard: >
        Mutuality language remains valid only where it does not erase recovery
        gradients, compressed Θ, exit cost, or after-cost concentration.
    responsibility_to_authority:
      status: "possible"
      expression: >
        Responsibility for safety, containment, protection, pacing, or repair
        may be converted into authority to define what counts as safe, whether
        interruption is legitimate, or whose reading of the scene governs.
      guard: >
        Responsibility under asymmetry requires stronger self-binding, not
        greater command.
    re_binding_test:
      required: true
      test: >
        Any asymmetry activation must be marked, temporally bounded, connected to
        real Ω/Θ burden, and re-bound into Σ/Ψ with Χ and D intact. Parity must
        not become exit; responsibility must not become authority.

  adult_sexual_reciprocity_readout:
    principle: >
      Adult sexual reciprocity does not require equal burdens. It requires that
      unequal burdens are not externalized.
    case_application: >
      In this case, adult sexual reciprocity would not require equal tolerance
      for intensity, equal recovery speed, or identical after-costs. It would
      require that those unequal burdens remain nameable, that high activation
      does not override Χ, that post-hoc communication does not replace
      containment, and that each role-position carries the self-binding made
      necessary by its own escalation capacity, exposure level, recovery
      profile, and externalization risk.
    failure_modes:
      - id: "mutual_intensity_as_cost_exit"
        description: "Mutual desire or communication is used to avoid cost-topology review."
      - id: "overload_as_unmarked_lever"
        description: "Overload or vulnerability is activated without marking, bounding, and re-binding."
      - id: "safety_as_frame_authority"
        description: "Safety, protection, pacing, or care responsibility becomes authority over the frame."
      - id: "intensity_as_binding_proof"
        description: "Exceptional intensity becomes covert proof of intimacy, worth, or commitment."
    guard: >
      This is not a hierarchy of adultness. It is a scene-bound responsibility
      reading under Ω/Θ.

