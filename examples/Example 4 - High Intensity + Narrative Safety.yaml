    warning_signals:
      - id: "phi_narrative_inflation"
        present_when: >
          Reassurance, explanation, or transparency language repeatedly replaces
          pacing, stopping, and cost accounting.
      - id: "theta_cost_externalization"
        present_when: >
          Bodily, reputational, emotional, or binding-related consequences
          concentrate in one role while short-term intensity stabilizes the
          configuration.
      - id: "outer_form_denial"
        present_when: >
          The communicative self-description of the scene blocks recognition
