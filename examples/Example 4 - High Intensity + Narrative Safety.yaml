        - "maintaining Χ where escalation capacity exceeds the other role's recovery capacity"
        - "supporting Σ by allowing the frame to be tested under peak conditions"
        - "not converting safety, care, protection, or pacing responsibility into authority"
      drift_risk: "parity-to-exit or responsibility-to-authority"
    shared:
