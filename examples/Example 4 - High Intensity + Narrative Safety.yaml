  structural_closure:
    closure: >
      High intensity does not create drift by itself. It reveals whether a frame
      can actually carry what it narrates. When activation is extreme, repetition
      accelerates, asymmetries sharpen, and time compresses. If regulation
      remains rhetorical while enactment accelerates, costs do not rise
      gradually; they jump. What looks like a sudden collapse is often Θ catching
      up with a frame that never slowed the scene.
    adult_reciprocity_closure: >
      The relevant reciprocity question is not whether both roles wanted the
      intensity, communicated frequently, or narrated the scene as safe. It is
      whether unequal recovery, exposure, after-cost, exit, and responsibility
      burdens are externalized. Mutuality becomes drift where it exits cost
      responsibility; overload becomes drift where it becomes an unmarked lever;
      safety becomes drift where it becomes authority rather than self-binding.
    citable_sentence: >
      Intensity is a drift multiplier when it converts small coordination gaps
      into irreversible trajectories faster than Distance (Χ) can regulate them.
    final_guard: >
      No person diagnosis. No moral ranking. No maturity ranking. No adultness
      verdict from PMS-SEX. No path-cost as person-worth. No critique through
      humiliation. Only configuration-language: what this scene produces over
      time under frame, impulse, repetition, asymmetry, temporality,
