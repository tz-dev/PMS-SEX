        case_check:
          - "Mutual desire must not erase recovery asymmetry."
          - "Mutual communication must not erase after-cost concentration."
          - "Mutual safety narration must not erase compressed Θ."
      no_responsibility_to_authority:
        status: "at_risk"
        minimal_form: "Safety responsibility must remain self-binding."
        case_check:
