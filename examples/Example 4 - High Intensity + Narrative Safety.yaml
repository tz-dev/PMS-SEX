      They are not endorsed, prescribed, ranked, or treated as evidence of motive
      or character.
    responses:
      - response: "Doubling down on communication instead of slowing enactment."
        operator_reading: >
          The frame privileges Φ and □ narration when Χ regulation would be
          structurally required.
      - response: "Interpreting discomfort as temporary overload rather than drift signal."
        operator_reading: >
          Θ accumulation is minimized because the internal frame remains
          narratively coherent.
      - response: "Avoiding stops because they feel disproportionate to intent."
        operator_reading: >
          Χ activation becomes costly under high ∇ and fast Α consolidation.
      - response: "Treating post-hoc explanation as equivalent to containment."
        operator_reading: >
          Φ substitutes for operational regulation and delays Σ.
      - response: "Relying on mutual intensity to settle responsibility."
        operator_reading: >
          Parity-to-exit risk appears if mutuality language blocks cost
          re-internalization.
      - response: "Claiming safety authority in the name of protection."
        operator_reading: >
          Responsibility-to-authority risk appears if safety responsibility
          becomes frame control.

  narrative_substitution_mechanism:
    title: "Φ as Failed Regulator"
    critical_insight: "Narrative safety does not scale automatically with intensity."
    observed_substitution:
      operator: "Φ"
      description: >
        Reframing, reassurance, and explanation are used to re-stabilize the
        scene after costs appear.
      substitution_formula: "Φ after-cost narration carries regulatory burden that would require operative Χ + □ under ∇ pressure"
    effect: >
      The frame explains costs after they occur instead of limiting them before
      they accumulate. This creates a gap between communicative confidence and
      structural governability.
    guard: >
      This is not a critique of communication. It only marks the point where
      communication is asked to do operator-work that requires distance,
      temporality realism, asymmetry accounting, cost-topology mapping, and
      integration.

  distance_erosion:
    title: "Χ under Pressure"
    risk_point: >
      Distance exists in principle but collapses in practice under peak
      activation.
    failure_mode:
      - "Stopping feels like betrayal of intensity or intimacy."
      - "Meta-position is postponed until later."
      - "De-escalation is read as breaking the mood rather than regulating the configuration."
      - "Reassurance becomes the only accepted response to overload."
      - "Cost-topology review is treated as cooling, mistrust, or loss of intensity."
      - "Χ is framed as rejection rather than as the condition for preserving the scene."
    structural_indicator: >
      The only acceptable responses to overload are reassurance or continuation,
      not interruption, slowing, re-reading, humor, or pause.
    chi_guard: >
      Χ is not purity, superiority, or rejection. In this case it is the
      application-side capacity to keep high activation from becoming an
      irreversible path.

