minimal_vignette:
  scene: 'Across repeated private or semi-private sexual scenes, a highly intensified arrangement is described by the involved
    role-positions as safe because the internal story remains coherent: the frame, labels, tone, and shared language continue
    to explain why the intensity is meaningful, chosen, contained, and repeatable. The drift does not begin with intensity
    alone. It begins where the same story becomes easier to reproduce than to re-read, so that after-scene heaviness, reduced
    stop-capability, reputational or documentation residue, symbolic continuity pressure, uneven repair burden, and the cost
    of naming costs accumulate outside the story that still calls the arrangement safe. The scene is not assessed by practice
    label or by person type; it is assessed by whether narrative safety continues to govern real Ω/Θ costs, Χ distance, Σ
    integration, and Ψ self-binding, or whether the safety story becomes the mechanism by which those costs are absorbed.'
  temporal_boundary: Begins with the repeated high-intensity arrangement and its coherent internal safety story; includes
    the recurrence by which the same frame, tone, labels, or documentation make repetition easier than correction; ends at
    the point where after-scene, symbolic, reputational, bodily, relational, or exit costs have accumulated enough to test
    whether the story still names them or only absorbs them.
  roles:
  - id: role_A
    label: intensity-framing or narrative-continuity role-position
  - id: role_B
    label: cost-carrying, correction-seeking, or after-scene residue-bearing role-position
  - id: field_or_medium
    label: practice label, shared narrative, tone, documentation layer, or audience-adjacent medium
  surface_description: A coherent high-intensity arrangement appears safe because its internal grammar remains stable,
    mutually intelligible, and repeatedly reproducible.
  pms_sex_question: Does internal narrative coherence remain a real safety structure, or does it become Φ inflation that
    makes cost naming symbolically expensive, weakens Χ correction, overloads Θ, and strains Σ/Ψ after-scene dignity?
scene_packet:
  specified_scene: A repeated high-intensity sexual arrangement whose safety claim is grounded in a coherent internal narrative,
    where repetition, tone, labels, possible documentation, and narrative continuity make the arrangement easier to continue
    than to structurally re-read while external effects accumulate over time.
  role_positions:
    role_A:
      scene_position: Maintains, inhabits, or benefits from the internal story that frames the intensified arrangement as safe,
        meaningful, contained, and repeatable, especially where that story has greater frame-control over what counts as
        misunderstanding, correction, or interruption.
      not_identity: true
    role_B:
      scene_position: Carries or surfaces accumulated effects that do not fully fit the internal safety story, including after-scene
        residue, exit cost, exposure cost, symbolic continuity pressure, documentation residue, or the cost of asking whether
        the safety frame still governs the real scene.
      not_identity: true
    field_or_medium:
      scene_position: The practice label, shared script, safety vocabulary, tonal style, documentation layer, reputational
        field, or semi-public trace that stabilizes the scene, protects narrative continuity, and may amplify effects across
        repetition.
      not_identity: true
      optional: true
  frame:
    dominant_frame: mixed
    frame_description: The internal frame presents intensity as bounded, safe, coherent, and narratively integrated, while
      the outer form remains legible as high asymmetry, high exposure, high control, high boundary-density, or high symbolic
      continuity pressure depending on the concrete scene. The drift risk appears where the frame not only explains intensity
      but also makes cost-naming sound like failure to inhabit the story.
    frame_status: unstable
    practice_label_if_any: high-intensity practice label, shared safety narrative, or tone of contained escalation; exact label
      not specified
    frame_guard: Practice labels and safety vocabulary may clarify internal framing but do not settle outer legibility, cost
      topology, publicness, symbolic residue, or Θ carryover.
  layer_distinction:
    internal_framing:
      description: The scene is inhabited through a coherent story of safety, meaningfulness, containment, and chosen intensity.
      status: present
    outer_legibility:
      description: Externally readable form includes intensified asymmetry, exposure, boundary-density, control-nearness,
        or degradation-nearness without converting that visibility into a person verdict.
      status: high
      possible_outer_forms:
      - asymmetry_form
      - exposure_form
      - body_boundary_form
      - control_form
      - humiliation_near_form
    publicness_overlay:
      status: semi_private
      effect: Possible documentation, reputational sedimentation, audience-adjacent legibility, or durable trace increases
        Θ carryover even when the internal story remains private or semi-private.
      measure_vs_confession_guard: Sexual praxis may be publicly measure-forming without making private preference confession-mandatory.
    body_boundary_layer:
      status: boundary
      note: High intensity makes body, exposure, vulnerability, refusal, recognition, or boundary marking structurally relevant,
        while no body state is converted into person truth.
    theta_carryover:
      status: accumulating
      note: After-scene heaviness, repair burden, reputation, documentation, lowered interruption capacity, or repeated difficulty
        naming costs accumulates across episodes.
    layer_guard: Layers may diverge and must not collapse into each other.
  operator_trace:
    status: operator_profile_only
    operator_reference: operator_spine
    operator_set_fixed:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    primary_signature:
      operators:
      - □
      - Ω
      - Θ
      - Φ
      - Χ
      - Σ
      - Ψ
      shorthand_only: true
      note: Reduced signatures are analytic shorthand and do not change PMS dependencies.
    trace:
      Δ: Difference is marked between internal safety coherence and externally accumulating effects; the specific boundary is
        not intensity versus non-intensity, but story-coherence versus residue that the story does not fully carry.
      ∇: Activation pressure is high because the arrangement depends on intensified affect, urgency, arousal, escalation-near
        energy, or the tonal charge of repeatedly returning to the same heightened scene.
      □: The frame is a coherent internal safety narrative supported by labels, shared language, repeated scene grammar, and
        a tone of contained escalation; the same frame can protect the drift by deciding in advance what counts as safety.
      Λ: Non-events include unspoken costs, delayed correction, non-named discomfort, avoided outer-form discussion, silence
        around after-scene residue, and the non-occurrence of a real re-reading after repetition has changed the cost layout.
      Α: Repetition stabilizes the high-intensity script and makes narrative safety an attractor: the story becomes easier
        to reproduce than to interrupt, revise, or cost-map.
      Ω: Asymmetry appears in exposure, exit cost, boundary vulnerability, documentation, repair burden, interpretive authority,
        symbolic continuity pressure, and responsibility distribution around who may name the scene as costly without losing
        standing inside it.
      Θ: 'The decisive pressure is temporal accumulation: what remains after each episode does not disappear because the story
        remains coherent; repetition adds residue, interruption cost, documentation/reputation risk, and repair burden.'
      Φ: Recontextualization is active when the internal story repeatedly redescribes safety while cost topology and effects
        remain structurally unchanged; the safety narrative becomes substitutive when it explains away rather than integrates
        the changed cost layout.
      Χ: Distance is strained if stopping, meta-commenting, naming outer form, asking for a re-read, or questioning the safety
        story becomes socially, symbolically, or relationally expensive.
      Σ: Integration would require the internal narrative, outer legibility, symbolic continuity pressure, cost topology, and
        after-scene effects to be held together rather than substituted for each other.
      Ψ: Self-binding is tested by whether responsibility follows the real accumulated costs, including the cost of preserving
        narrative continuity, or is externalized into the claim that coherent narration already proves safety.
    dependency_hygiene_note: Any Χ, Σ, or Ψ reading presupposes PMS dependency hygiene and does not create a new operator
      path.
  sexual_cost_topology:
    concept_ref: sexual_cost_topology
    status: partial
    governing_rule: Sexual cost topology is not a score, person measure, dignity rank, maturity rank, sex truth, or genital
      truth.
    cost_dimensions:
      bodily_costs:
        role_A: indeterminate
        role_B: medium
      exposure_costs:
        role_A: medium
        role_B: high
      reputational_costs:
        role_A: low
        role_B: medium
      symbolic_continuity_costs:
        role_A: medium
        role_B: high
      temporal_costs:
        role_A: medium
        role_B: high
      tonal_handling_costs:
        role_A: medium
        role_B: high
      binding_costs:
        role_A: medium
        role_B: high
      interruption_costs:
        role_A: medium
        role_B: high
      exit_costs:
        role_A: medium
        role_B: high
      documentation_or_trace_costs:
        role_A: low
        role_B: medium
      publicness_costs:
        role_A: low
        role_B: medium
      body_boundary_costs:
        role_A: medium
        role_B: high
      access_costs:
        role_A: indeterminate
        role_B: medium
      responsibility_costs:
        role_A: high
        role_B: medium
      after_scene_dignity_costs:
        role_A: medium
        role_B: high
    asymmetry_specific_responsibility:
      role_A: Structurally carries the burden of not allowing narrative coherence, frame authority, practice labels, or control
        over the tone of safety to erase accumulated Ω/Θ costs or make correction appear as betrayal of the scene.
      role_B: Structurally carries correction signals, stop-capability, after-scene residue, symbolic continuity pressure, and
        possible costs of making accumulation nameable without being treated as breaking the story.
      field_or_medium: The shared story, tonal style, category label, documentation layer, or reputational trace can stabilize
        meaning but can also amplify sedimentation and make contradiction more costly than repetition.
    mismatch_check:
      declared_parity: present
      real_cost_distribution: mismatched
      decisive_mismatch: Narrative parity or shared safety language remains locally coherent while symbolic, temporal, exit,
        interruption, and after-scene costs are unevenly distributed.
      possible_drift_ref: cost_topology_mismatch
    guard: Do not infer equal burdens, equal responsibility, guilt, rank, or person worth from cost topology.
  direct_otherness:
    concept_ref: direct_otherness
    status: weak
    real_other_correction:
      available: contested
      description: A real other can still respond, pause, refuse, misunderstand, or correct the script, but the coherent safety
        story makes correction harder to register as structurally relevant rather than as failure to inhabit the frame.
    substitution_checks:
      image_category_or_script_substitution: present
      permission_image: weak
      simulated_counterdesire: absent
      access_counterdesire_loop: weak
    access_guard: Direct otherness is reality-correction without access entitlement. No person owes access, desire, correction,
      explanation, or availability.
  embodiment_and_genital_meaning:
    body_remainder_relevance: consequence_interface
    biological_affordance_guard:
      status: active
      note: Biology may structure affordances, risks, asymmetries, thresholds, and likely strategy spaces without establishing
        destiny, rank, role, or moral evidence.
    sexed_dependency_guard:
      status: active
      note: Sexed dependency does not imply relationship mandate, heterosexual mandate, reproductive command, orientation
        ranking, or person incompleteness.
    body_boundary_coding:
      status: present
      markers:
      - exposure
      - boundary_form
      - recognition
      - bodily_consequence
      - refusal
    genital_meaning:
      status: not_relevant
      integration_status: indeterminate
      sovereignty_risk: none
    adult_sexual_emancipation_check:
      formula: genital integration without genital sovereignty
      status: not_relevant
    guard: The genital belongs to the person; the person does not belong to the genital.
  withdrawal_and_binding:
    covert_psi_expectation:
      status: present
      sources:
      - repetition
      - ambiguity
      - after_scene_conduct
      - desire
      - secrecy
    ambivalence_withdrawal:
      status: drift_risk
      note: Withdrawal or hesitation risks being treated as a break in the internal story rather than as information about
        accumulated cost.
    post_access_withdrawal:
      status: indeterminate
      note: The case sentence does not establish post-access withdrawal, but repeated intensity plus non-binding narration
        can create a post-scene cost-disowning risk.
    non_binding_language:
      status: shielding
      cost_relation: Non-binding or safety language shields the arrangement when it treats coherent narration as sufficient
        to settle structured Ψ expectation and after-scene costs.
    after_scene_dignity:
      status: strained
      markers:
      - shame_residue
      - self_worth_leak
      - responsibility_flight
    withdrawal_guard: Withdrawal is neither automatic guilt nor automatic exculpation.
  asymmetry_activation_and_reciprocity:
    sexual_reciprocity_under_real_asymmetry:
      status: strained
      rule: Sexual reciprocity does not require equal burdens; it requires that unequal burdens not be externalized.
    asymmetry_activation:
      present: true
      marked: partial
      bounded: contested
      linked_to_real_omega_theta_burden: partial
      rebound_into_sigma_psi_where_relevant: contested
      possible_drift_refs:
      - unmarked_omega_activation
      - asymmetry_switch_drift
      - parity_to_exit
      - responsibility_to_authority
    guard: Asymmetry is not the problem; false coordination or unmarked activation of real asymmetry is the problem.
pms_sex_map:
  scene_packet_summary:
    field_id: 1
    bounded_scene: Repeated high-intensity sexual scenes are narrated as safe by internal coherence while external effects
      accumulate across time.
    main_structural_question: Whether narrative coherence remains a viable safety structure or becomes Φ inflation that blocks
      Ω/Θ cost naming, Χ correction, Σ integration, and Ψ self-binding.
    strongest_non_capture_possibility: The reading should narrow or suspend if the accumulated effects are not scene effects,
      if the internal frame explicitly names and repairs them, or if the available evidence only shows intensity without cost
      externalization.
  layer_readout:
    field_id: 2
    internal_outer_public_relation: divergent
    internal_framing_result: Internal coherence is present and may be real, but it cannot by itself prove safety under PMS-SEX
      because safety must also survive cost topology and temporal carryover.
    outer_legibility_result: The arrangement remains externally legible as high-intensity asymmetry, exposure, control-nearness,
      or boundary-density; naming this does not totalize the scene or rank persons.
    publicness_result: 'Publicness is semi-private or trace-based: documentation, reputational possibility, and narrative
      circulation can create external effects even when no fully public scene exists.'
    visible_form_totalization_risk: medium
    result: 'The layers diverge: internal story coherence is not erased, but it does not settle outer legibility, publicness,
      cost topology, or Θ accumulation.'
    guardrail: Internal meaning may be real without erasing outer form; outer legibility may be named without ranking persons.
  operator_profile:
    field_id: 3
    dominant_ops:
    - □
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    reduced_signature: □/Φ safety narrative + Ω/Θ accumulation + Χ strain + Σ/Ψ test
    dependency_integrity: preserved
    profile_summary: The scene is organized by a coherent frame that recontextualizes intensity as safe; its structural test
      is whether accumulated costs remain nameable and integrable or are displaced by the story itself.
    not_claimed:
    - operator_redefinition
    - new_pms_axis
    - adultness_verdict
    - person_label
  cost_topology_readout:
    field_id: 4
    concept_ref: sexual_cost_topology
    topology_status: mismatched
    principal_costs:
    - after_scene_dignity_costs
    - symbolic_continuity_costs
    - interruption_costs
    - exit_costs
    - exposure_costs
    - documentation_or_trace_costs
    - responsibility_costs
    externalization_pattern:
      status: present
      description: The safety claim shifts part of the burden from concrete cost naming, interruption, correction, and repair
        into the internal story; the role-position surfacing accumulated effects bears the cost of contradicting not only a
        practice label but the continuity of the narrative that made the intensity feel safe.
    asymmetry_specific_responsibility_result: Where one role-position, the shared narrative, or the field/medium has greater
      frame-control, PMS-SEX reads a higher structural need to keep Ω/Θ costs explicit and not let narrative coherence substitute
      for Ψ handling, especially where the cost of naming costs has itself become part of the cost topology.
    possible_drift_ref: cost_topology_mismatch
    guardrail: Cost topology does not rank suffering, worth, maturity, dignity, sex, or biology.
  direct_otherness_and_access:
    field_id: 5
    direct_otherness_status: weak
    access_logic_status: threshold
    image_mediation_status: category_monopolization
    possible_drift_refs:
    - direct_otherness_failure
    - category_monopolization
    - access_entitlement_drift
    result: Real correction by the other remains possible but is weakened when the story or practice category defines objections
      as misunderstanding the internal frame.
    guardrail: Access threshold-language must not become entitlement. Permission-image is not consent.
  embodiment_boundary_genital_readout:
    field_id: 6
    body_boundary_status: present
    genital_meaning_status: not_relevant
    biological_affordance_status: affordance_only
    possible_drift_refs:
    - body_boundary_person_truth_drift
    - genital_sovereignty_drift
    adult_sexual_emancipation_result: not_relevant
    guardrail: Body and genital meaning are real where relevant, but they do not become person truth.
  withdrawal_binding_readout:
    field_id: 7
    covert_psi_expectation_status: present
    withdrawal_profile: mixed
    non_binding_status: shielding
    after_scene_dignity_status: strained
    possible_drift_refs:
    - covert_psi_expectation_drift
    - withdrawal_expectation_disowned
    - after_scene_dignity_failure
    result: Non-binding or safety language is not invalid by itself, but in this case it becomes drift-relevant where it shields
      structured expectation and accumulated after-scene costs from being carried.
    guardrail: Do not convert withdrawal into automatic guilt or automatic exculpation.
  drift_scan:
    field_id: 8
    max_primary_drifts: 3
    selected_drift_sets:
      core_dysfunction_markers: true
      final_overlay_markers: true
      eden_pfo_drift_triad: true
      access_and_category_drifts: true
      embodiment_drifts: false
      withdrawal_and_binding_drifts: true
      mip_relevant_profiles: false
    primary_drift_readout:
    - drift_ref: phi_inflation
      support: strong
      operator_basis:
      - Φ
      - Σ
      - Θ
      - Ω
      evidence_basis:
      - The arrangement is repeatedly redescribed as safe because the story remains coherent while costs and effects remain
        structurally unresolved.
      counter_evidence:
      - The reading weakens if the internal story explicitly names accumulated effects and changes frame, cost distribution,
        and repair structure accordingly.
      not_a_person_label: true
    - drift_ref: theta_overload
      support: strong
      operator_basis:
      - Θ
      - Ω
      - Α
      - Χ
      evidence_basis:
      - Effects accumulate across repeated scenes and exit or reset appears narrated by safety language rather than demonstrated
        by practical reversibility.
      counter_evidence:
      - The reading weakens if accumulated effects are low, reversible, non-sedimenting, and not carried asymmetrically.
      not_a_person_label: true
    - drift_ref: outer_form_denial
      support: mixed
      operator_basis:
      - □
      - Φ
      - Χ
      evidence_basis:
      - Internal framing risks blocking analysis of externally readable intensity, exposure, asymmetry, and cost topology.
      counter_evidence:
      - The reading weakens if the participants can name outer legibility without punishment, shame, or frame collapse.
      not_a_person_label: true
    drift_chain_readout:
      candidate_chain: layer_collapse_chain
      support: strong
      sequence_fit: Internal safety frame remains coherent; Φ recontextualization claims resolution; Ω/Θ costs continue accumulating;
        Χ correction weakens; Σ/Ψ are tested or displaced by the narrative.
    drift_guardrail: Drift profiles describe configuration trajectories, not persons, identities, pathologies, orientations,
      or moral rank.
  viability_readout:
    field_id: 9
    viability_status: unstable
    viability_is: governability_not_normality
    checks:
      frame_explicit: pass
      omega_nameable: partial
      theta_realistic: fail
      chi_operable: partial
      lambda_tolerable: contested
      psi_handled: partial
      sigma_reachable_where_needed: partial
      cost_topology_explicit: partial
      category_pressure_proportional: contested
      access_non_entitled: partial
      body_boundary_coding_scene_bound: pass
      direct_otherness_non_entitled: partial
      genital_meaning_integrated_not_sovereign: pass
      withdrawal_expectations_honestly_carried: partial
      after_scene_dignity_intact: partial
      boundary_aggression_distinguishable: indeterminate
      asymmetry_activation_marked_bounded_rebound: partial
      no_parity_to_exit: partial
      no_responsibility_to_authority: pass
    minimal_corridor_result: partial
    failure_or_strain_points:
    - theta_realistic
