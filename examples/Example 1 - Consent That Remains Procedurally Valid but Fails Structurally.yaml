minimal_vignette:
  scene: "Two adult role-positions enter a formally agreed, private, non-binding sexual interaction. The agreement is not later negated; instead, it becomes the repeated closure device through which hesitation, tonal unease, and after-scene clarification are treated as already settled. Role A can point back to procedural validity and keep the scene narratively closed, while Role B carries stronger exposure, body-boundary, symbolic, exit, and after-scene dignity costs. The structural failure does not lie in absent consent, but in the way consent becomes too heavy a proof-form: speaking later about cost begins to look like reopening, contradiction, accusation, or failure to honor the frame."
  temporal_boundary: The scene begins with the explicit pre-scene agreement, includes the interaction and the repeated handling of hesitation through reference to that agreement, and ends with the after-scene exchange in which later meta-commentary becomes socially or practically costly even though the formal consent record remains intact.
  roles:
    - id: role_A
      label: frame-closing and lower-aftercost role-position
    - id: role_B
      label: formally consenting and higher-aftercost role-position
    - id: field_or_medium
      label: procedural consent record plus repeated closure grammar
  surface_description: The scene may initially appear as a mutually agreed, procedurally valid, private, non-binding interaction whose formal rules were respected.
  pms_sex_question: Can procedural consent remain valid while its repeated use as closure proof makes later Χ, cost-language, and after-scene dignity structurally difficult to carry?

scene_packet:
  specified_scene: A formally agreed, private, non-binding sexual interaction in which the consent record remains valid but becomes a repeated proof-form that closes later cost-language, weakens practical Χ, and leaves asymmetrical after-scene dignity insufficiently carried.
  role_positions:
    role_A:
      scene_position: Role-position with stronger frame-control capacity, lower visible after-cost, easier narrative exit, and greater ability to make the prior agreement function as closure proof.
      not_identity: true
    role_B:
      scene_position: Role-position that formally agrees but carries higher exposure, body-boundary, symbolic, clarification, exit, and after-scene dignity costs once later cost-language becomes harder to introduce.
      not_identity: true
    field_or_medium:
      scene_position: The procedural consent record plus the repeated closure grammar through which a locally valid agreement can become the medium that hides unresolved Ω/Θ/Ψ costs.
      not_identity: true
      optional: true

  frame:
    dominant_frame: mixed
    frame_description: The dominant frame combines consent, autonomy, parity, non-binding language, and private intimacy. Internally, the agreement remains real; structurally, the frame drifts when that agreement is repeatedly used as a totalizing closure device, so that later hesitation or clarification appears as reopening a settled scene rather than as ordinary cost-topology uptake.
    frame_status: unstable
    practice_label_if_any: consensual non-binding encounter
    frame_guard: Practice labels and formal agreement may clarify internal framing but do not settle outer legibility, symbolic cost, cost topology, practical Χ, or Θ carryover.

  layer_distinction:
    internal_framing:
      description: The scene is inhabited as formally agreed and non-binding, with explicit consent functioning as the internal permission and closure marker.
      status: present
    outer_legibility:
      description: Externally, without judging persons, the action-form is readable as a parity-coded encounter that may obscure asymmetrical exposure, exit, expectation, and after-scene burden.
      status: mixed
      possible_outer_forms:
        - asymmetry_form
        - access_form
        - body_boundary_form
        - exposure_form
    publicness_overlay:
      status: private
      effect: No broad circulation is specified, but the procedural consent record can sediment as a local proof-form that blocks later cost-language.
      measure_vs_confession_guard: Sexual praxis may be publicly measure-forming without making private preference confession-mandatory.
    body_boundary_layer:
      status: boundary
      note: The body/boundary layer is relevant because consent does not make bodily exposure, boundary residue, or after-scene vulnerability delegable.
    theta_carryover:
      status: accumulating
      note: The after-scene exchange carries unresolved expectation and dignity residue even though the formal agreement remains intact.
    layer_guard: Layers may diverge and must not collapse into each other.

  operator_trace:
    status: operator_profile_only
    operator_reference: operator_spine
    operator_set_fixed:
      - Δ
      - ∇
      - □
      - Λ
      - Α
      - Ω
      - Θ
      - Φ
      - Χ
      - Σ
      - Ψ
    primary_signature:
      operators:
        - □
        - Ω
        - Θ
        - Χ
        - Ψ
        - Σ
      shorthand_only: true
      note: Reduced signatures are analytic shorthand and do not change PMS dependencies.
    trace:
      Δ: The decisive distinction is between consent as a valid local permission condition and consent as a total closure proof; the case turns on that difference, not on negating consent.
      ∇: Attraction and permission-pressure are structurally present, but the falltypical pressure is the later pressure not to disturb the already-agreed frame.
      □: The scene frame is consent-based, parity-coded, private, and non-binding, yet it protects drift when the formal agreement becomes the grammar that makes cost-language appear late or disruptive.
      Λ: The relevant non-event is the missing uptake of hesitation, tone, clarification, and after-scene cost; what does not happen is a structurally adequate re-opening of the frame.
      Α: The attractor is the repeatable move from cost-language back to procedural proof - both agreed, the frame was clear, the scene is already closed.
      Ω: Asymmetry appears in frame-control, exposure, symbolic cost, body-boundary residue, exit burden, and the uneven cost of speaking after consent has been recorded.
      Θ: Temporal carryover accumulates because the scene does not reset after agreement; later clarification now carries the added cost of seeming contradictory, accusatory, or frame-breaking.
      Φ: Recontextualization narrows the event into a merely consensual episode, protecting procedural validity while reducing the legibility of structural after-cost.
      Χ: Stop-capability and meta-commentability remain formally available, but become socially or practically expensive once later distance is coded as reopening what consent supposedly settled.
      Σ: Integration is partial because procedural validity, tonal unease, Ω/Θ cost, later Χ, and after-scene dignity are not brought into one governable account.
      Ψ: Self-binding fails structurally where the lower-aftercost role-position can bind itself only to the fact of consent, not to the costs produced by using consent as closure.
    dependency_hygiene_note: Any Χ, Σ, or Ψ reading presupposes PMS dependency hygiene and does not create a new operator path.

  sexual_cost_topology:
    concept_ref: sexual_cost_topology
    status: hidden
    governing_rule: Sexual cost topology is not a score, person measure, dignity rank, maturity rank, sex truth, or genital truth.
    cost_dimensions:
      bodily_costs:
        role_A: low
        role_B: medium
      exposure_costs:
        role_A: low
        role_B: medium
      reputational_costs:
        role_A: low
        role_B: medium
      binding_costs:
        role_A: low
        role_B: high
      exit_costs:
        role_A: low
        role_B: medium
      publicness_costs:
        role_A: none
        role_B: low
      body_boundary_costs:
        role_A: low
        role_B: medium
      access_costs:
        role_A: low
        role_B: medium
      responsibility_costs:
        role_A: medium
        role_B: high
      after_scene_dignity_costs:
        role_A: low
        role_B: high
      symbolic_costs:
        role_A: low
        role_B: medium
      temporal_costs:
        role_A: low
        role_B: medium
      tonal_handling_costs:
        role_A: low
        role_B: high
    asymmetry_specific_responsibility:
      role_A: Role A carries a self-binding burden not only to preserve the fact of consent, but to avoid turning that fact into a closure proof that makes later Χ, tonal unease, or after-scene cost-language structurally expensive.
      role_B: Role B carries no duty to convert higher after-cost into proof of invalid consent, guilt, diagnosis, or person-status claim; the structural burden is to keep later cost-language readable without converting it into self-worth loss or forced contradiction of the prior agreement.
      field_or_medium: The consent record stabilizes procedural validity, but when repeatedly invoked as the decisive proof-form it also becomes the medium through which symbolic, temporal, and tonal costs are displaced.
    mismatch_check:
      declared_parity: present
      real_cost_distribution: mismatched
      possible_drift_ref: cost_topology_mismatch
    guard: Do not infer equal burdens, equal responsibility, guilt, rank, person worth, or invalid consent from cost topology.

  direct_otherness:
    concept_ref: direct_otherness
    status: weak
    real_other_correction:
      available: contested
      description: Role B can respond, hesitate, and request clarification, but those corrections are weakened when the procedural agreement is treated as a complete answer to later structural cost.
    substitution_checks:
      image_category_or_script_substitution: weak
      permission_image: present
      simulated_counterdesire: absent
      access_counterdesire_loop: absent
    access_guard: Direct otherness is reality-correction without access entitlement. No person owes access, desire, correction, explanation, or availability.

  embodiment_and_genital_meaning:
    body_remainder_relevance: consequence_interface
    biological_affordance_guard:
      status: active
      note: Biology may structure affordances, risks, asymmetries, thresholds, and likely strategy spaces without establishing destiny, rank, role, or moral evidence.
    sexed_dependency_guard:
      status: active
      note: Sexed dependency does not imply relationship mandate, heterosexual mandate, reproductive command, orientation ranking, or person incompleteness.
    body_boundary_coding:
      status: present
      markers:
        - body_state
        - exposure
        - boundary_form
        - recognition
    genital_meaning:
      status: present
      integration_status: partially_integrated
      sovereignty_risk: low
    adult_sexual_emancipation_check:
      formula: genital integration without genital sovereignty
      status: partial
    guard: The genital belongs to the person; the person does not belong to the genital.

  withdrawal_and_binding:
    covert_psi_expectation:
      status: present
      sources:
        - care
        - access
        - ambiguity
        - after_scene_conduct
    ambivalence_withdrawal:
      status: drift_risk
      note: Withdrawal can be structurally adult in itself, but here it becomes drift-relevant when the role-position with lower after-cost treats non-binding language as sufficient to disown structured expectation.
    post_access_withdrawal:
      status: disowned_cost
      note: The interaction resolves access-threshold pressure while after-scene Ψ remains insufficiently carried.
    non_binding_language:
      status: mismatched
      cost_relation: The non-binding label does not match the structured Ψ-expectation created by access, ambiguity, bodily-boundary exposure, and after-scene conduct.
    after_scene_dignity:
      status: strained
      markers:
        - shame_residue
        - self_worth_leak
        - responsibility_flight
    withdrawal_guard: Withdrawal is neither automatic guilt nor automatic exculpation.

  asymmetry_activation_and_reciprocity:
    sexual_reciprocity_under_real_asymmetry:
      status: failed
      rule: Unequal burdens need not be equal; they must not be externalized.
    asymmetry_activation:
      present: true
      marked: contested
      bounded: contested
      linked_to_real_omega_theta_burden: false
      rebound_into_sigma_psi_where_relevant: false
      possible_drift_refs:
        - unmarked_omega_activation
        - asymmetry_switch_drift
        - parity_to_exit
        - responsibility_to_authority
    guard: Asymmetry activation is legitimate only where marked, bounded, linked to real Ω/Θ burden, and re-bound into Σ/Ψ where relevant.

pms_sex_map:
  scene_packet_summary:
    field_id: 1
    bounded_scene: A procedurally valid, consent-framed interaction whose cost topology and after-scene expectation are not structurally carried.
    main_structural_question: Whether formal consent can remain valid while the configuration fails as a governable PMS-SEX structure because Ω/Θ/Ψ burdens are externalized.
    strongest_non_capture_possibility: A richer empirical reconstruction could show that cost and expectation were explicitly named and carried after the scene, which would narrow or defeat the failure reading.

  layer_readout:
    field_id: 2
    internal_outer_public_relation: divergent
    internal_framing_result: Present and procedurally valid as a permission frame.
    outer_legibility_result: Mixed; no person verdict follows, but the configuration is readable as parity rhetoric masking role-specific costs.
    publicness_result: Private with local sedimentation through the consent record as proof-form.
    visible_form_totalization_risk: medium
    result: The consent frame must be preserved as procedurally meaningful while not allowed to collapse cost topology, Θ carryover, and Ψ handling.
    guardrail: Internal framing may be real without erasing outer form, cost topology, publicness, or temporal carryover.

  operator_profile:
    field_id: 3
    dominant_ops:
      - □
      - Ω
      - Θ
      - Χ
      - Ψ
      - Σ
    reduced_signature: □→Ω→Θ with Χ/Ψ strain and partial Σ failure
    dependency_integrity: preserved
    profile_summary: The case turns on a frame that remains formally valid while Ω and Θ burdens are hidden or externalized; Χ is procedurally present but practically weakened, and Ψ does not adequately bind to after-scene cost.
    not_claimed:
      - diagnosis
      - motive
      - maturity_verdict
      - person_worth

  cost_topology_readout:
    field_id: 4
    concept_ref: concepts.sexual_cost_topology
    topology_status: mismatched
    principal_costs:
      - binding_costs
      - exit_costs
      - body_boundary_costs
      - responsibility_costs
      - after_scene_dignity_costs
    externalization_pattern:
      status: present
      description: The role-position with lower after-cost treats the formal consent frame as sufficient closure, shifting residual expectation and dignity costs toward the higher-aftercost role-position.
    asymmetry_specific_responsibility_result: Asymmetry-specific responsibility is not satisfied by consent alone; it requires carrying the actual Ω/Θ/Ψ profile without converting it into authority, guilt, or person rank.
    possible_drift_ref: cost_topology_mismatch
    guardrail: Consent, mutuality, or autonomy may be real frame conditions but do not by themselves settle cost distribution.

  direct_otherness_and_access:
    field_id: 5
    direct_otherness_status: weak
    access_logic_status: threshold
    image_mediation_status: permission_image
    possible_drift_refs:
      - direct_otherness_failure
      - access_entitlement_drift
      - outer_form_denial
    result: The case does not show access entitlement as a primary pattern, but it does show a permission-image risk where prior agreement is used to neutralize later otherness.
    guardrail: Direct otherness is reality-correction without access entitlement.

  embodiment_boundary_genital_readout:
    field_id: 6
    body_boundary_status: present
    genital_meaning_status: integrated
    biological_affordance_status: affordance_only
    possible_drift_refs:
      - body_boundary_person_truth_drift
      - genital_sovereignty_drift
    adult_sexual_emancipation_result: Partial; genital and bodily meaning appear as scene consequences, but no genital sovereignty or genital truth is claimed.
    guardrail: Body or genital meaning is not person truth, command, rank, destiny, or immunity source.

  withdrawal_binding_readout:
    field_id: 7
    covert_psi_expectation_status: present
    withdrawal_profile: post_access_withdrawal
    non_binding_status: mismatched_to_structured_expectation
    after_scene_dignity_status: strained
    possible_drift_refs:
      - covert_psi_expectation_drift
      - withdrawal_expectation_disowned
      - after_scene_dignity_failure
    result: Withdrawal and non-binding language are not treated as guilt, but they fail structurally where they disown the Ψ expectation and dignity residue created by the scene.
    guardrail: Withdrawal is not automatic guilt, betrayal, exploitation, immaturity, or automatic exculpation.

  drift_scan:
    field_id: 8
    max_primary_drifts: 3
    selected_drift_sets:
      core_dysfunction_markers: true
      final_overlay_markers: true
      eden_pfo_drift_triad: true
      access_and_category_drifts: true
      embodiment_drifts: true
      withdrawal_and_binding_drifts: true
      mip_relevant_profiles: false
    primary_drift_readout:
      - drift_ref: cost_topology_mismatch
        support: strong
        operator_basis:
          - □
          - Ω
          - Θ
          - Ψ
        evidence_basis:
          - declared parity through consent
          - repeated use of consent as closure proof
          - higher symbolic, tonal, exit, and after-scene dignity burden for Role B
          - cost-language becomes harder to introduce after the formal frame has been closed
        counter_evidence:
          - explicit post-scene cost uptake and socially cheap meta-commentability would weaken this drift
        not_a_person_label: true

      - drift_ref: pseudo_symmetry_drift
        support: strong
        operator_basis:
          - □
          - Ω
          - Θ
        evidence_basis:
          - formal mutuality makes real asymmetry difficult to name
          - procedural equality hides the unequal cost of later clarification
        counter_evidence:
          - clear asymmetry-specific responsibility acknowledged by both role-positions would narrow this drift
        not_a_person_label: true

      - drift_ref: withdrawal_expectation_disowned
        support: mixed
        operator_basis:
          - Λ
          - Θ
          - Ψ
        evidence_basis:
          - non-binding language conflicts with structured expectation and after-scene request for clarification
          - the lower-aftercost role-position can withdraw into the consent record while residual Ψ-load remains elsewhere
        counter_evidence:
          - if no structured expectation or after-scene dignity cost was created after access, this reading weakens
        not_a_person_label: true
    drift_chain_readout:
      candidate_chain: withdrawal_expectation_chain
      support: mixed
      sequence_fit: Formal agreement remains intact; repeated consent-as-closure makes later Χ socially or practically costly; symbolic and temporal costs accumulate under Ω/Θ; Ψ-load and after-scene dignity are displaced rather than integrated.
    drift_guardrail: Drifts name stabilization burdens, not pathology, guilt, identity, maturity, or person value.

  viability_readout:
    field_id: 9
    viability_status: unstable
    viability_is: governability_not_normality
    checks:
      frame_explicit: pass
      omega_nameable: fail
      theta_realistic: partial
      chi_operable: partial
      lambda_tolerable: partial
      psi_handled: fail
      sigma_reachable_where_needed: fail
      cost_topology_explicit: fail
      category_pressure_proportional: pass
      access_non_entitled: pass
      body_boundary_coding_scene_bound: pass
      direct_otherness_non_entitled: partial
      genital_meaning_integrated_not_sovereign: partial
      withdrawal_expectations_honestly_carried: fail
      after_scene_dignity_intact: partial
      boundary_aggression_distinguishable: pass
      asymmetry_activation_marked_bounded_rebound: fail
      no_parity_to_exit: fail
      no_responsibility_to_authority: partial
    minimal_corridor_result: fail
    failure_or_strain_points:
      - omega_nameable
      - psi_handled
      - sigma_reachable_where_needed
      - cost_topology_explicit
      - withdrawal_expectations_honestly_carried
      - asymmetry_activation_marked_bounded_rebound
      - no_parity_to_exit
    guardrail: A viability failure is not a person verdict, moral verdict, diagnosis, or practice ranking.

  dignity_in_practice_readout:
    field_id: 10
    module_ref: modules.dignity_in_practice
    D_status: strained
    application_condition_profile:
      explicit_omega: fail
      operative_chi: partial
      no_covert_psi_demand_under_theta: fail
      after_scene_dignity: partial
      marked_bounded_asymmetry_activation: fail
      no_parity_to_exit: fail
      no_responsibility_to_authority: partial
      boundary_aggression_readability: pass
      outer_form_readability_without_visible_form_totalization: pass
    critique_drift_refs:
      - cost_topology_mismatch
      - pseudo_symmetry_drift
      - withdrawal_expectation_disowned
      - after_scene_dignity_failure
      - parity_to_exit
    not_critique_by_itself:
      - outer_legibility
      - pre_reflective_readability
      - publicness_as_overlay
      - sexual_cost_topology
      - biological_affordance_without_destiny
      - body_boundary_coding
      - genital_meaning
      - withdrawal
      - marked_bounded_asymmetry_activation
    result: Dignity-in-Practice is strained because the asymmetry is not sufficiently named, the formal consent frame is used to exit cost carriage, and after-scene dignity is only partially preserved.
    guardrail: Dignity in sexual practice is about how asymmetry is carried, not who someone is.

  minimal_psychology_gate:
    field_id: 11
    module_ref: modules.minimal_psychology_adapter
    activate: false
    activation_conditions:
      drift_marker_present: true
      viability_conditions_not_restoring_correction: true
      configuration_repeats_voluntarily: indeterminate
    permitted_question: What structural role is this desire playing in this configuration?
    allowed_alarm_output: none
    prohibited_outputs:
      - diagnosis
      - motive_explanation
      - clinical_claim
      - identity_verdict
      - orientation_claim
      - maturity_verdict
