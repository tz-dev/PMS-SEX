readable_structural_closure:
  summary: "This case maps a consent-framed interaction in which procedural validity remains intact while the agreement becomes too heavy a closure proof. The dominant operator profile is □/Ω/Θ with Χ, Σ, and Ψ under pressure: the frame is explicit, but repeated reference to the formal agreement makes later hesitation, tonal unease, and after-scene cost-language socially or practically costly. Consent is therefore not negated; it remains locally real while failing to carry symbolic cost, cost topology, practical meta-commentability, and after-scene dignity. The primary drift is cost_topology_mismatch, supported by pseudo_symmetry_drift and a mixed withdrawal_expectation_disowned reading. The falltypical failure is not absent permission, but the conversion of permission into a proof-form that externalizes Ω/Θ/Ψ burdens. The reading remains partial because a fuller empirical reconstruction could show explicit cost uptake, socially cheap Χ, and intact after-scene dignity."
  main_formula_used: formal consent remains intact while repeated consent-as-closure produces symbolic and temporal cost under Ω/Θ, making Χ socially costly and straining Σ/Ψ/D
  support_level: strong
  final_status: provisional_reading
  final_guardrail: This example maps a scene. It does not diagnose persons, rank sexes, prescribe practice, or authorize intervention.
  required_final_phrase: This remains a scene-bound structural reading, not a diagnosis, verdict, instruction, or person-status claim.

