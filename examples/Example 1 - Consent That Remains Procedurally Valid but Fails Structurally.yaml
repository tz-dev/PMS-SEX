case:
  schema_version: "PMS-SEX_CASE_1.2"
  case_id: "PMS-SEX_EXAMPLE_01"
  legacy_case_id: "PMS-SEX_CASE_01"
  title: "Consent That Remains Procedurally Valid but Fails Structurally"
  short_label: "Formal Consent vs. Drift under Accumulating Costs"

  status:
    case_type: "example_suite_vignette"
    role: "repo_vignette"
    function: "scene_bound_operator_reading"
    instructionality: "non_instructional"
    diagnostic_status: "non_diagnostic"
    prescriptive_status: "non_prescriptive"
    moral_status: "non_moralizing"
    person_classification: false

  profile_dependency:
    model: "PMS-SEX"
    schema_version: "PMS-SEX_1.2"
    base_model: "PMS"
    base_schema_version: "PMS_1.3"
    conformity_status: "conformant_application_case"
    case_role: "example_suite_vignette"
    application_status: "scene_bound_structural_mapping_only"

  paper_refs:
    primary:
      - "Ch. 0.7: EDEN/PFO asymmetry switch reference"
      - "Ch. 0.8: Sexual Cost Topology"
      - "Ch. 0.9: Validity gate"
      - "Ch. 18.3: Dysfunction markers"
      - "Ch. 19.3: Functional minimum conditions"
      - "Ch. 19.4: Warning signals"
      - "Ch. 21: Dignity-in-Practice module"
      - "Ch. 22: MIP docking interface"
      - "Appendix D.4: Highlighted drift corridors"
      - "Appendix D.5: Minimal viability corridor"
      - "Appendix D.8: Path-cost / disturbance guard"
    secondary:
      - "Ch. 0.2"
      - "Ch. 0.4"
      - "Ch. 3"
      - "Ch. 4: Asymmetry / Sexual Cost Topology"
      - "Ch. 5: Temporality"
      - "Ch. 6: Exit realism"
      - "Ch. 8"
      - "Ch. 10: Distance"
      - "Ch. 12: Self-binding"
      - "Ch. 17: Alternative explanations and methodological discipline"
      - "Appendix B"
      - "Appendix C"

  scope_discipline:
    summary: >
      Structural mapping only. This case does not diagnose persons, infer
      motives, rank identities, evaluate legal validity, evaluate person-
      adultness, or prescribe action. It reconstructs a configuration in which a
      formally consent-based frame remains intact while cost distribution,
      temporality, distance-capacity, and asymmetry-specific self-binding drift
      structurally.
    claims:
      - "scene-bound"
      - "configuration-specific"
      - "revisable"
      - "non-diagnostic"
      - "non-prescriptive"
      - "non-moralizing"
      - "non-instructional"
      - "operator-profile-only where maturity questions would require MIP docking"
    forbidden_conversions:
      - "legal evaluation"
      - "clinical interpretation"
      - "person diagnosis"
      - "moral ranking"
      - "maturity ranking"
      - "adultness verdict from PMS-SEX"
      - "dignity hierarchy"
      - "consent erasure"
      - "procedural or sexual instruction"
      - "risk optimization"
      - "asymmetry switch as authority"
      - "cost topology as score"
    validity_gate:
      required: ["Χ", "reversibility", "D"]
      applies_to: "application_only"
    additional_1_2_guards:
      - "sexual_cost_topology_not_score"
      - "operator_profile_only"
      - "mip_boundary"
      - "no_asymmetry_switch_as_authority"

  minimal_vignette:
    scene_bound: true
    non_identifying: true
    non_instructional: true
    scene_id: "CASE_01_FORMAL_CONSENT_ACCUMULATING_COST"
    scene_type: "repeated consent-based sexual frame under accumulating asymmetric costs"
    abstraction_level: "generic_non_identifying"
    text: >
      A repeated sexual configuration is organized through an explicit
      consent-based frame. The frame includes articulated rules, declared
      reversibility, and formal stop-options. No single rupture event occurs.
      Over time, however, one role experiences the configuration increasingly as
      cumulative: recovery, emotional processing, bodily after-effects, exposure
      management, and refusal burden accumulate. The other role experiences the
      configuration more episodically, with lower downstream handling or greater
      externalization capacity. The formal consent frame remains legible, but
      the cost layout becomes increasingly asymmetrical under time. PMS-SEX
      reads this as a sexual cost-topology problem, not as consent erasure.
  roles:
    R1:
      description: >
        Role with higher initiation frequency, stronger episodic orientation, or
        lower downstream exposure after enactment.
      person_status: "role_only_not_person_type"
    R2:
      description: >
        Role with lower initiation frequency, higher recovery, processing,
        after-cost, exposure, and refusal-handling burden.
      person_status: "role_only_not_person_type"
  frame_anchor:
    operator: "□"
    description: >
      Explicit consent-based frame with declared rules, articulated stop-options,
      and the statement that participation remains reversible.
  temporality:
    operator: "Θ"
    description: >
      Repeated encounters across time. The case is defined by cumulative effects,
      not by one isolated violation or rupture.
  trigger:
    delta:
      operator: "Δ"
      description: >
        Difference emerges between formal consent clarity and lived cost
        distribution.
    impulse:
      operator: "∇"
      description: >
        Pressure rises to maintain continuity and intensity without reopening the
        frame’s assumptions.
  lambda_candidates:
    operator: "Λ"
    expected_but_missing_or_underused:
      - "pauses that remain non-steering"
      - "explicit renegotiation after repeated accumulation"
      - "non-occurrence that does not become guilt, devaluation, or interpretive pressure"
      - "hesitation treated as structurally meaningful rather than as disruption"
      - "cost-topology review after repeated bodily, exposure-related, or binding-related accumulation"
  observed_realizations:
    - "consent is reaffirmed verbally and procedurally"
    - "declared reversibility remains present"
    - "the phrase 'you can always say no' becomes a catch-all stabilizer"
    - "practical stop-capability becomes less frequently activated"
    - "cost distribution remains under-articulated because no formal rule has been broken"
    - "asymmetry-specific responsibility remains implicit rather than explicitly carried"

  repo_usefulness:
    structural_focus: >
      This example shows why PMS-SEX separates formal frame validity from
      structural governability. It demonstrates that a scene can remain formally
      consent-based while still drifting under Α repetition, Ω cost asymmetry, Θ
      accumulation, Χ erosion, sexual cost-topology mismatch, and weak
      asymmetry-specific self-binding.
    demonstrates:
      - "consent as frame condition does not erase temporality"
      - "formal reversibility does not guarantee practical Χ availability"
      - "no single violation is required for drift to become structurally legible"
      - "Ω may emerge through after-costs, recovery burden, exposure, and exit friction"
      - "sexual cost topology may become unequal while consent remains locally intact"
      - "Ψ relevance may leak into a frame narrated as local or non-binding"
      - "parity language may become exit from cost re-internalization where unequal burdens accumulate"
      - "responsibility may drift toward authority if protection, care, or frame maintenance becomes control"
    avoids:
      - "reducing the case to coercion"
      - "collapsing consent into pathology"
      - "treating either role as morally defective"
      - "using structural cost language as person-ranking"
      - "treating sexual cost topology as score"
      - "converting asymmetry-specific responsibility into maturity ranking"

  operator_mapping:
    canonical_spine:
      raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
      note: >
        The full PMS v1.3 spine remains the reference path. The case foregrounds a
        local drift cluster but does not alter the canonical sequence.
    closest_reduced_signatures:
      - id: "MF_4_2"
        label: "Asymmetry / Sexual Cost Topology"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ"
        relevance: >
          The case becomes legible once repeated framed practice stabilizes into
          an attractor and generates unequal cost-bearing under time. PMS-SEX_1.2
          reads this as sexual cost topology rather than as person score.
      - id: "MF_5_2"
        label: "Temporality"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ"
        relevance: >
          Repetition turns local permission into trajectory. Accumulation matters
          even when each local scene remains formally consent-based.
      - id: "MF_6_2"
        label: "Exit Realism"
        raw: "(□ → Λ → Α) → Ω → Θ → (Χ/Σ/Ψ)"
        relevance: >
          The declared ability to stop is not identical to practical exit realism
          after repetition, cost accumulation, and role expectation have stabilized.
      - id: "MF_10_2"
        label: "Distance"
        raw: "Δ → ∇ → □ → (Λ) → Α → Ω → Θ → Φ → Χ"
        relevance: >
          The critical drift point is not the absence of formal stop-options, but
          the rising cost of activating Χ in practice.
      - id: "MF_19_2"
        label: "Functional Conditions and Warning Signals"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ; dominant interaction: Ω → Θ"
        relevance: >
          Functional governability depends on Ω nameability, explicit sexual cost
          topology, Θ realism, Χ operation, Λ tolerance, Ψ handling, and no
          unmarked switch drift.
      - id: "sexual_cost_topology_signature_ch4_6"
        label: "Sexual Cost Topology — Ω/Θ cost layout"
        raw: "Ω/Θ cost topology across bodily, exposure, reputational, binding, exit, publicness, and responsibility channels"
        relevance: >
          The case is primarily a mismatch between local procedural validity and
          distributed costs over time.
      - id: "eden_pfo_sexual_instantiation_signature"
        label: "EDEN/PFO Sexual Instantiation — asymmetry switch"
        raw: "real/invoked Ω/Θ pressure → asymmetry activation → marked/bounded/re-bound OR unmarked switch drift"
        relevance: >
          Cross-domain switch logic is relevant only as a warning: if asymmetry is
          invoked to stabilize the frame, it must be marked, bounded, and re-bound
          into Σ/Ψ.
      - id: "adult_sexual_reciprocity_signature"
        label: "Adult Sexual Reciprocity — non-externalization of unequal burdens"
        raw: "unequal Ω/Θ burdens + explicit cost topology + Χ restraint + Σ/Ψ re-binding → non-externalization"
        relevance: >
          The case tests whether unequal sexual costs are re-internalized by the
          relevant role-positions or externalized through consent-form, parity, or
          responsibility language.
    operator_roles:
      Δ:
        function_in_case: >
          Marks the discrepancy between consent clarity and cost distribution.
        drift_risk: "difference becomes unnameable because the formal frame appears sufficient"
      ∇:
        function_in_case: >
          Maintains directional pressure toward continuation, intensity, and frame
          preservation.
        drift_risk: "urgency becomes self-justifying because no rule violation is visible"
      □:
        function_in_case: >
          Provides explicit consent grammar, rules, declared stop-options, and
          formal reversibility.
        drift_risk: "frame becomes static; consent labels replace frame re-analysis and cost-topology mapping"
      Λ:
        function_in_case: >
          Names missed or underused pauses, cancellations, hesitation, slowing,
          cost review, and renegotiation opportunities.
        drift_risk: "non-events become costly to activate and may be read as disruption"
      Α:
        function_in_case: >
          Repetition stabilizes the practice as the default coordination route.
        drift_risk: "continuation becomes easier than interruption"
      Ω:
        function_in_case: >
          Cost gradients emerge across recovery, exposure, emotional processing,
          refusal burden, exit friction, and definitional power.
        drift_risk: "asymmetry remains unnamed because procedural consent is intact"
      Θ:
        function_in_case: >
          Converts repeated local consent into cumulative trajectory with residues,
          after-effects, and reduced exit realism.
        drift_risk: "later re-description cannot rewind accumulation"
      Φ:
        function_in_case: >
          Recontextualization may appear as narrative minimization: 'nothing bad is
          happening,' 'the rules are clear,' or 'this is still consensual.'
        drift_risk: "Φ substitutes for Σ if it covers cost rather than integrating it"
      Χ:
        function_in_case: >
          Stop-capability and meta-position exist formally but become increasingly
          expensive to enact.
        drift_risk: "Χ becomes ornamental rather than operative"
      Σ:
        function_in_case: >
          Integration would require holding consent clarity and cost asymmetry
          together without collapsing one into the other.
        drift_risk: "contradiction is simplified: either the frame is fine, or the scene must be treated as violation"
      Ψ:
        function_in_case: >
          Continuity begins to matter for self-attribution, loyalty, relational
          meaning, or identity-relevant stakes despite local/non-binding framing.
        drift_risk: "Ψ leak or Ψ externalization: binding relevance enters covertly or is displaced onto the other role-position"

  inner_outer_public_layer_distinction:
    internal_framing:
      description: >
        Internally, the scene is framed as consensual, rule-governed, reversible,
        and procedurally clear.
      guard: >
        This internal framing may be real and significant, but it does not settle
        the full outer structural form once asymmetry, cost topology, and
        accumulation become active.
    outer_legibility:
      description: >
        Externally or structurally, the scene becomes readable as a repeated frame
        in which cost-bearing diverges between roles despite formal consent.
      guard: >
        Naming this outer legibility does not deny consent, assign blame, diagnose
        either role, or convert the scene into moral verdict.
    publicness_overlay:
      status: "possible_but_not_required"
      description: >
        Shared narratives, records, reputational exposure, or documentation may
        harden Θ costs if present. Publicness is not the origin of the case but can
        amplify after-costs.
      pms_layer: "□ extension"
      primarily_intensifies: ["Ω", "Θ"]
      guard: >
        Publicness must neither be treated as the whole source of consequence nor
        ignored where it sediments cost.
    temporal_carryover:
      description: >
        Repetition causes local events to count beyond themselves. Even where each
        scene is locally consent-based, the trajectory may become harder to exit
        or revise.
      guard: "Θ does not rewind through later reassurance."

  cost_layout:
    cost_layout_formula: "Ω under Θ"
    summary: >
      The main structural cost lies in unequal downstream handling under repeated
      enactment. Consent secures permission at the scene level, but does not by
      itself distribute recovery, exposure, refusal burden, binding-related cost,
      exit cost, or cumulative responsibility cost.
    cost_channels:
      bodily:
        description: >
          Fatigue, recovery latency, saturation effects, and embodied after-costs.
        operator_interface: ["Θ", "Ω"]
        body_remainder: true
      temporal:
        description: >
          Continuation becomes normalized; interruption becomes more expensive
          even though it remains formally allowed.
        operator_interface: ["Α", "Θ", "Χ"]
      exposure:
        description: >
          Vulnerability to being seen, remembered, narratively positioned, or left
          with after-effects may accumulate unevenly even without publicness.
        operator_interface: ["Ω", "Θ", "□"]
      reputational:
        description: >
          Where the scene is socially visible or narratively shareable, one role
          may carry higher standing, interpretation, or explanation cost.
        operator_interface: ["□", "Ω", "Θ"]
      binding_related:
        description: >
          Continued participation may begin to imply loyalty, relationship proof,
          self-worth, or identity relevance despite the frame remaining procedural.
        operator_interface: ["Ψ", "Θ", "Χ"]
      exit_related:
        description: >
          Stopping remains allowed but becomes harder to activate because
          interruption now carries interpretive, relational, or accumulated cost.
        operator_interface: ["Χ", "Ω", "Θ", "Λ"]
      relational:
        description: >
          Refusal, slowing, or pause may become interpretively loaded because the
          prior frame appears consensual and stable.
        operator_interface: ["□", "Λ", "Ω", "Ψ"]
      interpretive:
        description: >
          One role may carry the burden of explaining why a formally correct frame
          is nevertheless becoming costly.
        operator_interface: ["Ω", "Φ", "Χ"]
      responsibility_related:
        description: >
          Role-specific responsibility may remain implicit: who must name cost,
          carry accumulated effects, reopen the frame, or restrain continuation.
        operator_interface: ["Ψ", "Χ", "Ω", "Σ"]
      public_or_documentary:
        description: >
          Where shared memory, records, images, logs, or third-party knowledge
          exist, publicness may harden cost after the scene.
        operator_interface: ["□", "Ω", "Θ"]
        publicness_as_overlay: true
    asymmetry_pattern:
      R1:
        typical_position: "episodic enactment; lower downstream handling; higher externalization capacity possible"
      R2:
        typical_position: "cumulative enactment; higher recovery, explanation, exposure, and refusal burden"
      structural_note: >
        This is a role-asymmetry description, not a claim about character,
        intention, guilt, maturity, adultness, or worth.
    system_effect: >
      Formal consent begins to mask cost distribution because the frame can appear
      structurally settled while Ω and Θ continue to accumulate.

  sexual_cost_topology:
    definition: >
      Scene-bound distribution of bodily, temporal, exposure-related,
      reputational, binding-related, exit-related, publicness-related, and
      responsibility-related costs across the sexual role-positions in this
      configuration. Not a score, not a person measure, not a maturity measure, and
      not a dignity ranking.
    topology_status: "unequal_and_under_articulated"
    channels:
      bodily_costs:
        R1: "lower or more episodic downstream bodily overhang in the vignette"
        R2: "higher cumulative recovery, saturation, or embodied after-cost burden"
      temporal_costs:
        R1: "more local reset plausibility after each encounter"
        R2: "higher accumulation across repeated encounters; lower practical reset"
      exposure_costs:
        R1: "lower exposure to after-cost explanation in the basic vignette"
        R2: "higher exposure to having to explain reluctance, change, or refusal"
      reputational_costs:
        R1: "context-dependent; may be lower unless publicness/documentation enters"
        R2: "context-dependent; may rise if hesitation or refusal becomes narratively framed"
      binding_costs:
        R1: "risk of treating continued consent as proof that no binding issue exists"
        R2: "risk of covertly carrying loyalty, identity, or relationship proof through continued participation"
      exit_costs:
        R1: "exit or continuation may remain more episodic and less narratively burdened"
        R2: "formal exit remains available but practical exit cost rises under repetition"
      publicness_costs:
        R1: "overlay-dependent"
        R2: "overlay-dependent; intensified if records, shared narratives, or reputational traces accumulate"
      responsibility_costs:
        R1: "must not externalize unequal downstream cost by relying on formal parity alone"
        R2: "must not use cost asymmetry as unmarked standing lever; cost naming must remain marked and bounded"
    cost_topology_mismatch:
      present: true
      expression: >
        Declared formal parity in consent and stop-options does not match the
        actual distribution of recovery, refusal, exposure, exit, and explanation
        costs across time.
      guard: >
        Mismatch is configuration-language. It does not imply invalid consent,
        coercion by itself, moral failure, or person-level adultness ranking.

  switch_drift_markers:
    status: "relevant_as_risk_not_primary_claim"
    eden_pfo_reference:
      status: "cross_domain_reference_only"
      note: >
        PMS–EDEN names the regime-level asymmetry switch. PMS-SEX reads only the
        sexual instantiation where real or invoked Ω/Θ pressure may activate
        asymmetry. This adds no PMS operator and creates no person label.
    asymmetry_switch_drift:
      status: "possible"
      expression: >
        R2's cumulative bodily, exposure-related, or refusal-related cost may be
        invoked to interrupt or reshape the frame. This is structurally viable only
        where the activation is marked, bounded, linked to real Ω/Θ burden, and
        re-bound into Σ/Ψ. It drifts where cost asymmetry becomes an unmarked,
        repeatable exception lever.
      guard: >
        The drift is not asymmetry activation as such. The drift is unmarked,
        repeatable activation without re-binding.
    parity_to_exit:
      status: "possible"
      expression: >
        'We both agreed,' 'the rules are the same,' or 'you can always say no' may
        become parity rhetoric used to deny additional responsibility under unequal
        sexual cost topology.
      guard: >
        Parity remains valid only when it coordinates reciprocity and cost
        re-internalization; it becomes drift when it exits them.
    responsibility_to_authority:
      status: "possible"
      expression: >
        Responsibility for protection, repair, pacing, or cost handling may be
        converted into control over the frame, unilateral authority to decide what
        counts as safe, or entitlement to define the other role-position.
      guard: >
        Responsibility under asymmetry requires stronger self-binding, not greater
        command.
    re_binding_test:
      required: true
      test: >
        Any asymmetry activation must be marked, temporally bounded, connected to
        real Ω/Θ burden, and re-bound into Σ/Ψ with Χ and D intact. Parity must not
        become exit; responsibility must not become authority.

  adult_sexual_reciprocity_readout:
    principle: >
      Adult sexual reciprocity does not require equal burdens. It requires that
      unequal burdens are not externalized.
    case_application: >
      In this case, reciprocity remains viable only if the role-position with
      lower downstream handling does not use formal parity to externalize R2's
      cumulative cost, and the role-position with higher downstream cost does not
      use asymmetry as an unmarked standing lever. Both role-positions must carry
      the self-binding specific to their own cost, power, exposure, exit, and
      externalization profile.
    failure_modes:
      - id: "formal_parity_as_cost_exit"
        description: "Consent parity is used to avoid cost-topology review."
      - id: "cost_as_unmarked_lever"
        description: "Accumulated cost is activated without marking, bounding, and re-binding."
      - id: "protection_as_frame_authority"
        description: "Care or safety responsibility becomes unilateral control over the frame."
    guard: >
      This is not a hierarchy of adultness. It is a scene-bound responsibility
      reading under Ω/Θ.

  asymmetry_specific_responsibility_readout:
    definition: >
      Each role-position must carry the self-binding required by its own cost,
      power, exposure, exit, and externalization profile.
    R1:
      likely_self_binding_tasks:
        - "not treating procedural consent as sufficient proof that no cost topology exists"
        - "not using formal parity to exit responsibility for unequal downstream costs"
        - "maintaining Χ when continuation is easier than interruption"
        - "supporting Σ by allowing cost re-reading without requiring violation-language"
      drift_risk: "parity-to-exit"
    R2:
      likely_self_binding_tasks:
        - "naming cumulative cost without converting asymmetry into an unmarked standing lever"
        - "keeping Χ operative rather than allowing accumulated cost to become only after-the-fact pressure"
        - "separating valid cost-topology claims from global person claims"
        - "supporting Σ by making cost specific, bounded, and re-bindable"
      drift_risk: "asymmetry-switch drift if cost activation becomes unmarked and repeatable"
    shared:
      likely_self_binding_tasks:
        - "cost topology must remain speakable"
        - "formal consent must remain accountable to outer-form cost layout"
        - "neither parity nor asymmetry may be used to bypass Σ/Ψ"
        - "responsibility must not become authority"

  mip_docking_guard:
    applies_if: "reader infers maturity, adultness, or role-capacity evaluation"
    pms_sex_records_only:
      - "unmarked_omega_activation"
      - "weak_or_defensive_chi"
      - "missing_sigma_coordination"
      - "psi_externalization"
      - "parity_to_exit"
      - "responsibility_to_authority"
      - "cost_topology_mismatch"
      - "repeated_failure_to_mark_bound_and_rebind_asymmetry_activation"
    not_allowed_in_pms_sex:
      - "maturity_verdict"
      - "adultness_verdict"
      - "person_label"
      - "moral_failure_claim"
      - "dignity_hierarchy"
      - "essence_claim"
    proper_mip_question_if_docked: >
      In this scene, under this cost topology, did the role-position carry the
      self-binding made necessary by its own power, exposure, exit capacity, and
      externalization profile?
    guard: >
      Any maturity-relevant evaluation belongs to MIP docking and must remain
      scene-bound, reversible, non-person-ranking, non-diagnostic, and
      D-preserving. PMS-SEX itself records operator profiles only.

  operator_profile_only_note:
    text: >
      This case may record pseudo-symmetry, temporal overload, Χ erosion, Ψ leak,
      cost-topology mismatch, parity-to-exit risk, responsibility-to-authority
      risk, or asymmetry-switch drift risk. None of these profiles is a person
      diagnosis, person-adultness claim, moral verdict, or dignity ranking.

  drift_trace:
    compressed_formula: "□ explicit → Α repetition → Ω/Θ cost topology mismatch → Χ erosion → Σ strain → Ψ leak / Ψ externalization → possible parity-to-exit or switch drift"
    full_formula_reference: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
    dynamic_reading: >
      The frame starts as explicit and procedurally clear. Repetition stabilizes
      the practice into an attractor. Asymmetry emerges through unequal after-costs
      and recovery burdens. Time accumulates residues that cannot be reset by
      renewed consent language alone. Distance becomes harder to activate because
      no obvious violation has occurred. Eventually, continued participation may
      begin to carry identity-relevant or relational meaning despite local
      non-binding framing. Under PMS-SEX_1.2, the drift risk also includes
      cost-topology mismatch, parity-to-exit, responsibility-to-authority, and
      unmarked asymmetry activation if the unequal cost layout is not re-bound into
      Σ/Ψ.
    transitions:
      - from: "□"
        to: "Α"
        description: >
          Explicit consent frame becomes a repeated coordination route.
        risk: "frame stability turns into default continuation"
      - from: "Α"
        to: "Ω"
        description: >
          Repetition reveals unequal recovery, exposure, refusal, and repair
          burdens.
        risk: "cost gradient remains unnamed because the practice is formally consensual"
      - from: "Ω"
        to: "Θ"
        description: >
          Unequal burdens accumulate over time.
        risk: "exit becomes more expensive without becoming forbidden"
      - from: "Θ"
        to: "Φ"
        description: >
          Narrative reassurance may attempt to reset the scene: 'nothing bad is
          happening because consent remains explicit.'
        risk: "recontextualization replaces integration"
      - from: "Φ"
        to: "Χ"
        description: >
          Distance must become operative to re-read the frame and cost layout.
        risk: "Χ is formally available but practically discouraged"
      - from: "Χ"
        to: "Σ"
        description: >
          Integration would hold both truths: consent may be valid, and the
          configuration may still be structurally costly.
        risk: "without Σ, the contradiction is displaced"
      - from: "Σ"
        to: "Ψ"
        description: >
          If not handled, continuity begins to carry identity-relevant or
          relationship-relevant stakes.
        risk: "Ψ leak into a frame narrated as local, procedural, or non-binding"
      - from: "Ψ"
        to: "switch_drift_risk"
        description: >
          If binding and responsibility are not re-internalized, the scene may
          drift toward parity-to-exit, responsibility-to-authority, or unmarked
          asymmetry activation.
        risk: "operator profile appears without authorizing person-level conclusion"

  typical_drift_markers:
    max_markers_for_case_use: 3
    selected:
      - id: "pseudo_symmetry"
        source: "drift_catalogue.core_dysfunction_markers_ch18_3"
        marker: "Pseudo-symmetry"
        case_expression: >
          'We both consented' or 'the rules are the same for both' functions as a
          lid on unequal after-costs.
        guard: >
          This does not deny consent. It states that consent-language does not by
          itself settle cost distribution.
      - id: "temporal_overload"
        source: "drift_catalogue.core_dysfunction_markers_ch18_3"
        marker: "Temporal overload / Θ accumulation"
        case_expression: >
          Repetition creates accumulated costs faster than the frame can update
          itself.
        guard: >
          The problem is trajectory-load, not a hidden defect in either role.
      - id: "chi_loss"
        source: "drift_catalogue.core_dysfunction_markers_ch18_3"
        marker: "Loss of distance / Χ erosion"
        case_expression: >
          Stopping or pausing remains formally available but becomes practically
          costly to activate.
        guard: >
          This is a structural stop-capability issue, not a claim of coercion by
          itself.
    optional_additional_markers:
      - id: "psi_leak"
        marker: "Covert self-binding demand"
        case_expression: >
          Continued participation begins to imply loyalty, identity relevance,
          relationship proof, or self-worth despite formal non-binding language.
      - id: "outer_form_denial"
        marker: "Outer-form denial"
        case_expression: >
          The internal label 'consensual' is used to end structural analysis of
          enacted cost layout.
      - id: "cost_topology_mismatch"
        marker: "Cost-topology mismatch"
        case_expression: >
          Declared parity and reversibility fail to match the actual distribution
          of accumulated bodily, exposure, exit, and responsibility costs.
      - id: "parity_to_exit"
        marker: "Parity-to-exit"
        case_expression: >
          Consent parity or mutuality language is used to avoid additional
          responsibility under unequal cost topology.
      - id: "responsibility_to_authority"
        marker: "Responsibility-to-authority"
        case_expression: >
          Safety, care, or pacing responsibility becomes frame control or
          protection entitlement.

  viability_assessment:
    functional_minimums_source: "PMS-SEX Ch. 19.3"
    conditions:
      explicit_omega_recognition:
        status: "weakened"
        reason: >
          Cost, recovery, refusal burden, exposure, and exit gradients are present
          but remain under-articulated because the formal consent frame appears
          sufficient.
        viability_requirement: "Ω must be nameable beyond procedural consent."
      explicit_sexual_cost_topology:
        status: "weakened"
        reason: >
          Bodily, exposure-related, binding-related, exit-related, and
          responsibility-related costs are not yet mapped as a scene-bound layout.
        viability_requirement: >
          Sexual cost topology must be explicit as topology, not score, dignity
          ranking, or person measure.
      theta_awareness:
        status: "weakened"
        reason: >
          Repetition and after-effects accumulate, but the frame treats each event
          as locally resettable.
        viability_requirement: "Θ must be treated as real; renewed consent does not rewind accumulated cost."
      stable_chi_capacity:
        status: "eroding"
        reason: >
          Stop-capability exists formally but becomes socially or emotionally
          expensive to activate.
        viability_requirement: "Χ must be practically available, not merely declared."
      no_psi_substitution:
        status: "at_risk"
        reason: >
          Continuity may begin to carry relational or identity-relevant meaning
          without explicit frame support.
        viability_requirement: "No covert Ψ demand should become the default carrier of stakes."
      lambda_tolerance_without_escalation:
        status: "weakened"
        reason: >
          Pauses, hesitation, or slowing may become interpretively loaded because
          the frame expects continued participation.
        viability_requirement: "Λ must remain tolerable without becoming steering, punishment, or devaluation."
      internal_framing_accountable_to_outer_form:
        status: "required"
        reason: >
          The internal consent frame is real but cannot erase outer cost
          distribution under asymmetry and temporality.
        viability_requirement: "Consent-language must not block structural cost-layout analysis."
      publicness_handled_as_overlay:
        status: "context_dependent"
        reason: >
          Documentation, shared narratives, or reputational traces may intensify
          cost if present, but are not required for the primary drift.
        viability_requirement: "Publicness must be tracked as overlay where relevant."
      marked_bounded_rebound_asymmetry_activation:
        status: "required_if_activation_occurs"
        reason: >
          Cumulative cost may require asymmetry-aware handling. It drifts if
          asymmetry is activated as an unmarked, repeatable exception lever.
        viability_requirement: "Any asymmetry activation must be marked, bounded, and re-bound into Σ/Ψ."
      no_parity_to_exit:
        status: "at_risk"
        reason: >
          Formal consent parity can be used to deny additional responsibility
          under unequal downstream costs.
        viability_requirement: "Parity must coordinate reciprocity rather than exit cost re-internalization."
      no_responsibility_to_authority:
        status: "at_risk"
        reason: >
          Responsibility for protection, pacing, or repair can become authority
          over the frame if not held as Ψ/Χ self-binding.
        viability_requirement: "Responsibility remains self-binding; it does not authorize control."
    minimal_viability_corridor:
      raw: |
        □ explicit
        + Ω nameable
        + Θ realistic
        + Χ operative
        + Λ tolerable
        + Ψ handled
        (+ Σ reachable)
        + cost topology explicit
        + asymmetry activation marked / bounded / re-bound where present
        + no parity-to-exit
        + no responsibility-to-authority
        = structurally governable configuration
      case_reading: >
        The configuration becomes less governable where □ remains explicit but Ω
        is unnamed, sexual cost topology is under-articulated, Θ is reset
        rhetorically, Χ is hard to use, Λ becomes costly, Ψ begins to leak, and
        parity or responsibility language blocks re-binding.

  warning_signals:
    source: "PMS-SEX Ch. 19.4"
    present_or_relevant:
      - id: "phi_narrative_inflation"
        status: "possible"
        expression: >
          Repeated reassurance that the frame is consensual replaces cost naming
          and integration.
        structural_note: "Φ may substitute for Σ."
      - id: "mono_frame"
        status: "possible"
        expression: >
          The established consent frame becomes the only acceptable reading of the
          scene.
        structural_note: "Α may monopolize □."
      - id: "theta_cost_externalization"
        status: "relevant"
        expression: >
          Recovery, explanation, refusal, or after-costs concentrate in one role.
        structural_note: "Θ costs shift asymmetrically through Ω."
      - id: "outer_form_denial"
        status: "relevant"
        expression: >
          Internal consent naming blocks analysis of enacted asymmetry and
          temporal accumulation.
        structural_note: "Χ weakens because the configuration cannot re-read itself."
      - id: "cost_topology_mismatch"
        status: "relevant"
        expression: >
          Formal parity and declared reversibility fail to match the actual
          distribution of sexual costs over time.
        structural_note: "Cost topology becomes unreadable under a formally valid frame."
      - id: "parity_to_exit"
        status: "possible"
        expression: >
          Consent parity is used to deny additional responsibility for unequal
          downstream costs.
        structural_note: "Parity language exits cost re-internalization."
      - id: "responsibility_to_authority"
        status: "possible"
        expression: >
          Care, safety, pacing, or protection responsibility becomes authority to
          define the frame.
        structural_note: "Responsibility stops being Ψ/Χ self-binding."

  dignity_in_practice_stress_test:
    source: "PMS-SEX Ch. 21"
    canonical_pms_D_formula: ["Ψ", "Χ", "Ω"]
    pms_sex_application_formula: >
      explicit Ω + operative Χ + no covert Ψ demand under Θ + marked/bounded
      asymmetry activation + no parity-to-exit + no responsibility-to-authority,
      with outer-form readability preserved
    risk_point: >
      Dignity-in-Practice is not necessarily undermined by formal coercion or rule
      violation. It may be stressed by procedural insulation: 'you agreed' begins
      to shield the frame from re-reading lived impact and cost topology.
    possible_failure_mode:
      label: "D-in-Practice stress without formal-consent failure"
      description: >
        Restraint exists formally, but enacted coordination fails to account for
        accumulating load, unequal recovery, exit friction, exposure, and
        decreasing practical stop-capacity.
    structural_indicators:
      - "formal stop-options exist but are rarely activated"
      - "cost distribution is harder to name than consent status"
      - "Χ is treated as unnecessary, hypersensitive, or disruptive"
      - "the frame protects procedural clarity more than recoverability"
      - "Ψ relevance begins to leak into continued participation"
      - "formal parity is used to avoid cost-topology review"
      - "protection or pacing responsibility risks becoming frame authority"
    guardrail: >
      This stress test does not rank persons, deny consent, assign adultness level,
      or assert bad faith. It asks whether D is preserved in enactment under Ω and
      Θ.

  rational_response_envelope:
    status: "structural_reasonableness_not_prescription"
    description: >
      The following responses are structurally intelligible within the
      configuration. They are not endorsed, prescribed, or morally ranked.
    possible_responses:
      - response: "continued participation despite rising costs"
        structural_reason: >
          Refusal may appear disproportionate because the explicit frame remains
          formally correct.
        operators: ["□", "Α", "Ω", "Θ"]
      - response: "hesitation to activate Χ"
        structural_reason: >
          Stop-capability exists, but using it may appear to destabilize a frame in
          which 'nothing wrong' has happened.
        operators: ["Χ", "□", "Θ"]
      - response: "narrative minimization"
        structural_reason: >
          Recontextualization reduces tension locally by preserving the
          explicit-consent equilibrium.
        operators: ["Φ", "Σ"]
      - response: "increased interpretive burden"
        structural_reason: >
          One role must explain why a valid consent frame has nevertheless become
          costly.
        operators: ["Ω", "Θ", "Χ"]
      - response: "reliance on formal parity"
        structural_reason: >
          Equality of declared rules can locally stabilize the frame while hiding
          unequal downstream cost topology.
        operators: ["□", "Ω", "Θ", "Ψ"]

  path_cost_guard:
    applies: true
    allowed_language:
      - "path-cost"
      - "stabilization burden"
      - "Θ accumulation"
      - "Χ/Σ/Ψ work required for governability"
      - "cost-layout drift"
      - "cost-topology mismatch"
      - "asymmetry-specific self-binding burden"
    case_use: >
      This case may describe rising stabilization burden: more framing, distance,
      integration, cost-topology naming, and self-binding discipline are required
      to keep the configuration governable over time.
    forbidden_conversions:
      - "path-cost means lower dignity"
      - "higher stabilization burden means moral disorder"
      - "repetition means pathology"
      - "asymmetrical cost means bad person"
      - "formal consent failure is implied"
      - "sexual identity or orientation is being classified"
      - "cost topology means score"
      - "asymmetry-specific responsibility means maturity hierarchy"
      - "operator profile means adultness verdict"
    final_guard: >
      Path-cost language remains configuration-language only. If converted into
      person-language, diagnosis, rank, humiliation, maturity ranking, dignity
      hierarchy, or orientation taxonomy, the analysis leaves PMS-SEX.

  reader_guards:
    does_not_claim:
      - "that consent is insufficient or unimportant"
      - "that explicit rules cause harm"
      - "that either role acted deceptively"
      - "that either role acted in bad faith"
      - "that consent implies obligation"
      - "that formal consent has failed"
      - "that structural cost equals coercion"
      - "that the configuration diagnoses anyone"
      - "that sexual cost topology ranks persons"
      - "that asymmetry-specific responsibility creates authority"
      - "that PMS-SEX can directly evaluate adultness"
    does_claim:
      - "that consent does not neutralize Θ accumulation"
      - "that explicit frames can still drift if Ω remains unnamed"
      - "that formal reversibility is not identical to operative Χ"
      - "that structural cost can emerge without rule violation"
      - "that viability requires cost realism beyond permission"
      - "that D-in-Practice concerns enacted handling under asymmetry, not person worth"
      - "that adult sexual reciprocity requires non-externalization of unequal burdens"
      - "that PMS-SEX records operator profiles only where maturity questions would require MIP docking"

  analysis_checklist_application:
    S1_scene_boundary:
      result: >
        Scene is bounded as repeated explicit consent-based encounters under
        cumulative cost divergence.
    S2_canonical_dependency_check:
      result: >
        PMS v1.3 spine preserved. Reduced signatures are used as shorthand only.
        Sexual cost topology and switch drift handles are overlay handles, not new
        operators.
    S3_reduced_signature:
      selected:
        - "MF_4_2"
        - "MF_5_2"
        - "MF_6_2"
        - "MF_10_2"
        - "MF_19_2"
        - "sexual_cost_topology_signature_ch4_6"
        - "eden_pfo_sexual_instantiation_signature"
        - "adult_sexual_reciprocity_signature"
    S4_inner_outer_public_scan:
      result: >
        Internal frame: consensual and rule-governed. Outer legibility:
        asymmetric cost accumulation. Publicness: possible overlay, not required.
    S5_cost_axis_scan:
      result: >
        Ω appears through recovery, exposure, refusal, exit, responsibility, and
        repair burden. Θ appears through repetition, after-effects, and exit
        realism. Sexual cost topology is unequal and under-articulated.
    S6_distance_and_correction_capacity:
      result: >
        Χ is formally present but practically eroding. Σ would require integrating
        consent clarity with cost asymmetry and cost-topology mismatch.
    S7_drift_marker_scan:
      result: >
        Pseudo-symmetry, temporal overload, Χ loss, possible Ψ leak,
        cost-topology mismatch, parity-to-exit risk, and responsibility-to-authority
        risk are structurally relevant.
    S8_switch_drift_scan:
      result: >
        Asymmetry activation is not the primary claim but may appear as risk where
        cumulative cost is invoked without marking, bounding, and re-binding.
        Parity-to-exit is a clearer risk where consent parity denies additional
        responsibility under unequal cost topology.
    S9_viability_minimums:
      result: >
        Viability is weakened where Ω is unnamed, cost topology is not explicit, Θ
        is minimized, Χ is hard to activate, Λ is not tolerated, Ψ is not explicitly
        handled, parity exits responsibility, or responsibility becomes authority.
    S10_adult_reciprocity_and_mip_guard:
      result: >
        Adult sexual reciprocity is read only as non-externalization of unequal
        burdens. Any adultness-relevant evaluation must be docked in MIP and remain
        scene-bound, reversible, non-person-ranking, non-diagnostic, and
        D-preserving.
    S11_path_cost_guard:
      result: >
        Path-cost is used only as configuration-language.
    S12_escalation_guard:
      result: >
        No motive explanation, diagnosis, humiliation, maturity ranking, or
        person-label is allowed.

  readable_structural_closure:
    short_closure: >
      Consent secures permission. Viability requires cost realism and
      non-externalization of unequal burdens.
    full_closure: >
      In this configuration, the consent frame does not collapse. It remains
      explicit, procedurally legible, and locally valid as a frame. The structural
      problem appears elsewhere: repetition stabilizes the practice into an
      attractor, asymmetry distributes downstream costs unevenly, and temporality
      turns local participation into cumulative trajectory.

      Once explicit consent becomes the sole stabilizer, Θ and Ω begin to do the
      coordinating work. What remains formally consensual can still become
      structurally costly where recovery, refusal, exposure, exit, and interpretive
      burden accumulate unevenly. The issue is not that consent fails, but that it
      overperforms: it absorbs pressure that would need to be redistributed into
      frame re-reading, distance activation, cost-topology naming, or integration.

      PMS-SEX_1.2 adds that the relevant adult reciprocity question is not whether
      burdens are equal, but whether unequal burdens are externalized. Formal parity
      becomes drift when it exits responsibility under unequal cost topology;
      asymmetry becomes drift when it is activated as an unmarked standing lever;
      responsibility becomes drift when it turns into authority rather than
      self-binding.

      The drift is therefore not produced by malice, defective agency, hidden
      pathology, or failed consent by itself. It is the predictable result of
      treating a valid consent frame as sufficient while Θ continues to accumulate,
      Ω remains under-articulated, Χ becomes harder to enact in practice, and Σ/Ψ
      re-binding does not carry the cost topology.

  final_case_guard:
    text: >
      This case remains PMS-SEX-valid only as configuration analysis. It may name
      cost, drift, outer legibility, sexual cost topology, cost-topology mismatch,
      switch-drift risk, and D-in-Practice stress, but it must not convert those
      claims into person-ranking, diagnosis, orientation taxonomy, legal judgment,
      adultness verdict, maturity hierarchy, dignity hierarchy, or humiliating
      critique.
    compressed_rules:
      - "no consent erasure"
      - "no person diagnosis"
      - "no moral ranking"
      - "no legal conclusion"
      - "no maturity ranking"
      - "no adultness verdict from PMS-SEX alone"
      - "no dignity hierarchy"
      - "no path-cost as person-worth"
      - "no sexual cost topology as score"
      - "no outer-form erasure by consent labels"
      - "no publicness reduction"
      - "no parity-to-exit as reciprocity"
      - "no responsibility-to-authority as care"
      - "no asymmetry switch as authority"
      - "no operator profile as person verdict"
      - "no prescription"