      where language refuses to. Repetition stabilizes expectation, asymmetry
      channels control, and time turns informal reliance into fact. Possession
      does not begin here as a declared claim; it begins as a trajectory that
      cannot be interrupted without cost. By the time conflict appears, binding
      may already be structurally operative, not by agreement, but by accumulated
