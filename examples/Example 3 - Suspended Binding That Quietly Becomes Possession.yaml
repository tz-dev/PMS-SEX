        description: "The declared open frame is used to deny responsibility for generated trajectory."
      - id: "continuity_pain_as_unmarked_lever"
        description: "Access loss or replacement risk is activated without marking, bounding, and re-binding."
      - id: "clarity_as_frame_authority"
        description: "Responsibility for clarity becomes authority to define the frame or govern alternatives."
