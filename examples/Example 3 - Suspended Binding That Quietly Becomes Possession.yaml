minimal_vignette:
  scene: Two scene-bound role-positions enter an explicitly non-binding sexual-relational arrangement. Over repeated contact, late messages, attention rituals, availability expectations, and continuity cues begin to organize the relation, while the arrangement is still narrated as non-binding. When role_B delays, refuses, redirects attention, or treats the arrangement as actually non-binding, non-continuity begins to appear as a meaningful disturbance rather than as a neutral option. The scene is analyzed only as a configuration of frame, repetition, cost, asymmetry, and suspended Ψ, not as a verdict on either person.
  temporal_boundary: From the initial non-binding frame through repeated episodes of contact and non-events, ending at the point where availability, attention, and continuity have acquired after-scene carryover without being renamed as binding.
  roles:
  - id: role_A
    label: frame-preserving role-position that receives continuity while keeping the arrangement unnamed as binding
  - id: role_B
    label: responsive role-position whose availability, attention, and continuity become structurally expected
  - id: field_or_medium
    label: private messaging cadence, recurring encounters, and the non-binding label as scene medium
  surface_description: A casual or non-binding arrangement that appears mutually open and reversible.
  pms_sex_question: When does a non-binding frame cease to carry the costs it produces and begin to function as suspended binding with possession-form or access-entitlement drift?
scene_packet:
  specified_scene: An explicitly non-binding arrangement in which repeated availability, attention, and continuity gradually become expected without a frame update.
  role_positions:
    role_A:
      scene_position: keeps the non-binding label active while responding to reduced availability as if continuity were owed
      not_identity: true
    role_B:
      scene_position: carries the expectation pressure created by repeated attention and becomes the site where refusal, delay, or non-continuity is charged
      not_identity: true
    field_or_medium:
      scene_position: private messaging and repeated encounters sediment expectations while preserving the appearance of casual non-binding
      not_identity: true
      optional: true
  frame:
    dominant_frame: non_binding
    frame_description: The scene is named as non-binding, yet repetition and after-scene conduct structure a practical expectation of ongoing access, attention, and continuity.
    frame_status: unstable
    practice_label_if_any: non-binding arrangement
    frame_guard: Practice labels may clarify internal framing but do not settle outer legibility, cost topology, publicness, or Θ carryover.
  layer_distinction:
    internal_framing:
      description: The arrangement is inhabited as casual, open, or non-binding, with no explicit commitment language.
      status: present
    outer_legibility:
      description: The repeated expectation of availability and continuity makes the configuration readable as access-form and possession-form/control-form risk without producing a person verdict.
      status: medium
      possible_outer_forms:
      - access_form
      - control_form
      - asymmetry_form
    publicness_overlay:
      status: private
      effect: documentation and sedimentation through messages, not public exposure
      measure_vs_confession_guard: Sexual praxis may be publicly measure-forming without making private preference confession-mandatory.
    body_boundary_layer:
      status: not_relevant
      note: The case does not specify bodily or genital consequences; the relevant boundary is availability, attention, and continuity rather than body-boundary coding.
    theta_carryover:
      status: accumulating
      note: Repeated non-events such as delayed replies, cancelled continuity, or redirected attention become meaningful after the local episode.
    layer_guard: Layers may diverge and must not collapse into each other.
  operator_trace:
    status: operator_profile_only
    operator_reference: operator_spine
    operator_set_fixed:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    primary_signature:
      operators:
      - □
      - Λ
      - Α
      - Ω
      - Θ
      - Χ
      - Σ
      - Ψ
      shorthand_only: true
      note: Reduced signatures are analytic shorthand and do not change PMS dependencies.
    trace:
      Δ: The active distinction is between declared non-binding status and lived continuity expectations.
      ∇: Attraction, reassurance-seeking, attention pressure, and availability pressure keep the scene activated.
      □: The non-binding frame constrains what may be explicitly claimed, while repeated contact creates a second practical grammar.
      Λ: Silence, delayed replies, unmade plans, absence, and refusal become non-events that steer expectation.
      Α: 'Repetition stabilizes an attractor: attention and continuity become the normal route even without explicit commitment.'
      Ω: Asymmetry appears where one role can preserve the non-binding label while the other carries the cost of disrupted availability or refusal.
      Θ: Temporal accumulation turns local contact into trajectory; each episode makes the unrenamed expectation more consequential.
      Φ: The scene can be recontextualized as still casual, even when its after-scene conduct has begun to exceed the casual frame.
      Χ: Stop-capability and meta-commentability remain formally possible but become strained because clarification may be treated as betrayal, coldness, or overinterpretation.
      Σ: Integration would require the frame, costs, non-events, and continuity expectations to become jointly readable; in the case sentence this remains only partial.
      Ψ: 'Self-binding is suspended: binding relevance is produced by repetition but not explicitly carried as responsibility or commitment.'
    dependency_hygiene_note: Any Χ, Σ, or Ψ reading presupposes PMS dependency hygiene and does not create a new operator path.
  sexual_cost_topology:
    concept_ref: sexual_cost_topology
    status: hidden
    governing_rule: Sexual cost topology is not a score, person measure, dignity rank, maturity rank, sex truth, or genital truth.
    cost_dimensions:
      bodily_costs:
        role_A: low
        role_B: low
      exposure_costs:
        role_A: low
        role_B: medium
      reputational_costs:
        role_A: low
        role_B: low
      binding_costs:
        role_A: hidden
        role_B: high
      exit_costs:
        role_A: low
        role_B: medium
      publicness_costs:
        role_A: none
        role_B: none
      body_boundary_costs:
        role_A: low
        role_B: medium
      access_costs:
        role_A: low
        role_B: high
      responsibility_costs:
        role_A: hidden
        role_B: high
      after_scene_dignity_costs:
        role_A: medium
        role_B: high
    asymmetry_specific_responsibility:
      role_A: The frame-preserving role structurally carries the cost of not letting non-binding language conceal the continuity expectations it benefits from.
      role_B: The responsive role structurally carries the cost of being treated as available while formally remaining unbound; this is a cost-location, not a duty assignment.
      field_or_medium: Messaging cadence and repeated encounter patterns sediment expectation while keeping the arrangement apparently revocable.
    mismatch_check:
      declared_parity: present
      real_cost_distribution: mismatched
      possible_drift_ref: cost_topology_mismatch
    guard: Do not infer equal burdens, equal responsibility, guilt, rank, or person worth from cost topology.
  direct_otherness:
    concept_ref: direct_otherness
    status: present
    real_other_correction:
      available: contested
      description: role_B can delay, refuse, redirect attention, misunderstand, or withdraw, but these corrections are increasingly charged by the unrenamed continuity expectation.
    substitution_checks:
      image_category_or_script_substitution: weak
      permission_image: absent
      simulated_counterdesire: absent
      access_counterdesire_loop: absent
    access_guard: Direct otherness is reality-correction without access entitlement. No person owes access, desire, correction, explanation, or availability.
  embodiment_and_genital_meaning:
    body_remainder_relevance: not_relevant
    biological_affordance_guard:
      status: active
      note: Biology may structure affordances, risks, asymmetries, thresholds, and likely strategy spaces without establishing destiny, rank, role, or moral evidence.
    sexed_dependency_guard:
      status: active
      note: Sexed dependency does not imply relationship mandate, heterosexual mandate, reproductive command, orientation ranking, or person incompleteness.
    body_boundary_coding:
      status: not_relevant
      markers:
      - none
    genital_meaning:
      status: not_relevant
      integration_status: indeterminate
      sovereignty_risk: none
    adult_sexual_emancipation_check:
      formula: genital integration without genital sovereignty
      status: not_relevant
    guard: The genital belongs to the person; the person does not belong to the genital.
  withdrawal_and_binding:
    covert_psi_expectation:
      status: present
      sources:
      - access
      - repetition
      - ambiguity
      - after_scene_conduct
      - other
    ambivalence_withdrawal:
      status: drift_risk
      note: Withdrawal or reduced attention becomes structurally charged because the repeated frame has created continuity relevance without naming it.
    post_access_withdrawal:
      status: indeterminate
      note: The case sentence does not specify whether a post-access pattern is present; the relevant structure is broader continuity expectation.
    non_binding_language:
      status: mismatched
      cost_relation: Non-binding language no longer matches the structured Ψ-expectation produced by availability, attention, repetition, and after-scene conduct.
    after_scene_dignity:
      status: strained
      markers:
      - self_worth_leak
      - responsibility_flight
      - immunity
    withdrawal_guard: Withdrawal is neither automatic guilt nor automatic exculpation.
  asymmetry_activation_and_reciprocity:
    sexual_reciprocity_under_real_asymmetry:
      status: strained
      rule: Sexual reciprocity does not require equal burdens; it requires that unequal burdens not be externalized.
    asymmetry_activation:
      present: 'true'
      marked: 'false'
      bounded: 'false'
      linked_to_real_omega_theta_burden: partial
      rebound_into_sigma_psi_where_relevant: 'false'
      possible_drift_refs:
      - unmarked_omega_activation
      - asymmetry_switch_drift
      - parity_to_exit
      - responsibility_to_authority
    guard: Asymmetry is not the problem; false coordination or unmarked activation of real asymmetry is the problem.
pms_sex_map:
  scene_packet_summary:
    field_id: 1
    bounded_scene: A non-binding arrangement gradually produces expectations of availability, attention, and continuity without renaming the frame.
    main_structural_question: Whether a formally non-binding frame remains governable once repetition, charged non-events, and after-scene carryover produce covert Ψ-expectation.
    strongest_non_capture_possibility: The reading would narrow if the parties explicitly and repeatedly preserved no-continuity expectations and reduced availability carried no sanction, resentment-near signal, repair demand, or implied debt.
  layer_readout:
    field_id: 2
    internal_outer_public_relation: divergent
    internal_framing_result: The internal frame remains non-binding and may be sincerely understood as casual or open.
    outer_legibility_result: The outer form shows access and control-form risk because availability and continuity become expected while refusal becomes charged.
    publicness_result: The scene is private, but message traces may sediment expectations without becoming a public-confession requirement.
    visible_form_totalization_risk: medium
    result: Internal non-binding meaning is real but insufficient to settle the structural cost topology once repeated expectations carry Θ-weight.
    guardrail: Internal meaning may be real without erasing outer form; outer legibility may be named without ranking persons.
  operator_profile:
    field_id: 3
    dominant_ops:
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Χ
    - Σ
    - Ψ
    reduced_signature: □/Λ/Α/Ω/Θ → strained Χ/Σ → suspended Ψ
    dependency_integrity: preserved
    profile_summary: A declared non-binding frame accumulates repeated attention and non-event meanings until binding relevance appears without explicit Ψ-handling.
    not_claimed:
    - operator_redefinition
    - new_pms_axis
    - adultness_verdict
    - person_label
  cost_topology_readout:
    field_id: 4
    concept_ref: sexual_cost_topology
    topology_status: partial_mismatch
    topology_is: partial_not_score_like
    principal_costs:
    - binding_costs
    - access_and_availability_costs
    - exit_costs
    - responsibility_costs
    - after_scene_dignity_costs
    decisive_cost_pattern: The decisive costs are not intensity costs but continuity, availability, refusal, repair, and responsibility costs produced by repetition under a non-binding label.
    externalization_pattern:
      status: present
      description: The continuity and repair burden shifts toward role_B while role_A can continue invoking the non-binding label to avoid naming the expectation it benefits from.
    asymmetry_specific_responsibility_result: The structural responsibility issue is not equal burden but whether each role-position carries the costs produced by its access, frame-control, continuity expectation, and exit profile.
    possible_drift_ref: cost_topology_mismatch
    guardrail: Cost topology remains partial and scene-bound; it does not rank suffering, worth, maturity, dignity, sex, or biology.
  direct_otherness_and_access:
    field_id: 5
    direct_otherness_status: present
    access_logic_status: entitlement_risk
    image_mediation_status: none
    possible_drift_refs:
    - access_entitlement_drift
    - direct_otherness_failure
    result: Real correction by an other remains available, but the configuration begins to treat refusal, delay, or redirected attention as a disturbance of expected access.
    guardrail: Access threshold-language must not become entitlement. Permission-image is not consent.
  embodiment_boundary_genital_readout:
    field_id: 6
    body_boundary_status: not_relevant
    genital_meaning_status: not_relevant
    biological_affordance_status: not_relevant
    possible_drift_refs:
    - none
    adult_sexual_emancipation_result: not_relevant
    guardrail: Body and genital meaning are real where relevant, but they do not become person truth.
  withdrawal_binding_readout:
    field_id: 7
    covert_psi_expectation_status: present
    withdrawal_profile: non_event_steering
    non_binding_status: mismatched
    after_scene_dignity_status: strained
    possible_drift_refs:
    - covert_psi_expectation_drift
    - withdrawal_expectation_disowned
    - after_scene_dignity_failure
    result: The non-binding frame is not automatically invalid, but in this case it no longer carries the expectation load it produces; withdrawal and non-continuity become drift-relevant rather than neutral by default.
    guardrail: Do not convert withdrawal into automatic guilt or automatic exculpation.
  drift_scan:
    field_id: 8
    max_primary_drifts: 3
    selected_drift_sets:
      core_dysfunction_markers: true
      final_overlay_markers: false
      eden_pfo_drift_triad: true
      access_and_category_drifts: true
      embodiment_drifts: false
      withdrawal_and_binding_drifts: true
      mip_relevant_profiles: false
    primary_drift_readout:
    - drift_ref: covert_psi_expectation_drift
      support: strong
      operator_basis:
      - Ψ
      - Θ
      - Ω
      - □
      evidence_basis:
      - Care, access, repetition, ambiguity, attention, and after-scene conduct create binding relevance while the frame remains non-binding.
      counter_evidence:
      - The drift reading would weaken if continuity expectations were explicitly named as non-owed and refusal or delay remained genuinely uncharged.
      not_a_person_label: true
    - drift_ref: psi_leak
      support: strong
      operator_basis:
      - Ψ
      - □
      - Θ
      evidence_basis:
      - Possession-like expectations enter a frame that cannot explicitly carry commitment or responsibility language.
      counter_evidence:
      - The drift reading would weaken if expectations were explicitly framed as optional preferences rather than implied claims on availability.
      not_a_person_label: true
    - drift_ref: access_entitlement_drift
      support: mixed
      operator_basis:
      - Ω
      - Λ
      - Θ
      - Χ
      evidence_basis:
      - Availability, attention, and continuity become structurally charged when refusal, delay, or redirection no longer read as neutral non-continuity.
      counter_evidence:
      - The case sentence does not prove explicit entitlement; the drift reading would weaken if direct refusal and non-continuity were accepted without repair burden, sanction, resentment-near signal, or implied debt.
      not_a_person_label: true
    drift_chain_readout:
      candidate_chain: withdrawal_expectation_chain
      support: mixed
      sequence_fit: covert_psi_expectation_drift fits strongly; withdrawal_expectation_disowned is a strong risk if non-continuity is treated as costless; after_scene_dignity_failure remains strained rather than fully established by the case sentence.
    drift_guardrail: Drift profiles describe configuration trajectories, not persons, identities, pathologies, orientations, or moral rank.
  viability_readout:
    field_id: 9
    viability_status: unstable
    viability_is: governability_not_normality
    checks:
      frame_explicit: partial
      omega_nameable: partial
      theta_realistic: fail
      chi_operable: partial
      lambda_tolerable: partial
      psi_handled: fail
      sigma_reachable_where_needed: partial
      cost_topology_explicit: fail
      category_pressure_proportional: pass
      access_non_entitled: partial
      body_boundary_coding_scene_bound: pass
      direct_otherness_non_entitled: partial
      genital_meaning_integrated_not_sovereign: pass
      withdrawal_expectations_honestly_carried: fail
      after_scene_dignity_intact: partial
      boundary_aggression_distinguishable: pass
      asymmetry_activation_marked_bounded_rebound: fail
      no_parity_to_exit: partial
      no_responsibility_to_authority: partial
    minimal_corridor_result: fail
    failure_or_strain_points:
    - theta_realistic
    - psi_handled
    - cost_topology_explicit
    - withdrawal_expectations_honestly_carried
    - asymmetry_activation_marked_bounded_rebound
    guardrail: A viability failure is not a person verdict, moral verdict, diagnosis, or practice ranking.
  dignity_in_practice_readout:
    field_id: 10
    module_ref: modules.dignity_in_practice
    D_status: strained
    application_condition_profile:
      explicit_omega: partial
      operative_chi: partial
      no_covert_psi_demand_under_theta: fail
      after_scene_dignity: partial
      marked_bounded_asymmetry_activation: fail
      no_parity_to_exit: partial
      no_responsibility_to_authority: partial
      boundary_aggression_readability: pass
      outer_form_readability_without_visible_form_totalization: pass
    critique_drift_refs:
    - covert_psi_expectation_drift
    - psi_leak
    - access_entitlement_drift
    - cost_topology_mismatch
    not_critique_by_itself:
    - outer_legibility
    - pre_reflective_readability
    - publicness_as_overlay
    - sexual_cost_topology
    - biological_affordance_without_destiny
    - body_boundary_coding
    - genital_meaning
    - withdrawal
    - marked_bounded_asymmetry_activation
    result: Dignity-in-Practice is strained only where non-binding language conceals a continuity demand, externalizes repair burden, or makes refusal practically costly; non-binding by itself is not a D-failure. This remains a scene-bound structural reading.
    guardrail: Dignity in sexual practice is about how asymmetry is carried, not who someone is.
  minimal_psychology_gate:
    field_id: 11
    module_ref: modules.minimal_psychology_adapter
    activate: 'false'
    activation_conditions:
      drift_marker_present: 'true'
      viability_conditions_not_restoring_correction: 'true'
      configuration_repeats_voluntarily: indeterminate
    permitted_question: What structural role is this desire playing in this configuration?
    allowed_alarm_output: none
    prohibited_outputs:
    - diagnosis
    - motive_explanation
    - clinical_claim
    - identity_verdict
    - orientation_claim
    - maturity_verdict
    - dignity_status_claim
    - sex_truth
    - genital_truth
    - practice_instruction
    result: The adapter is not activated by the case sentence alone; PMS-SEX records the drift structurally without inferring desire, motive, or psychology.
  mip_docking_gate:
    field_id: 12
    module_ref: modules.mip_docking
    activate: 'false'
    trigger_conditions:
      adultness_language_present: 'false'
      maturity_language_present: 'false'
      public_critique_language_present: 'false'
      responsibility_evaluation_required: 'false'
      system_or_regime_lens_required: 'false'
    pms_sex_records_only:
      operator_profile: □/Λ/Α/Ω/Θ creates covert Ψ under strained Χ/Σ; no MIP evaluation is activated.
      drift_refs:
      - covert_psi_expectation_drift
      - psi_leak
      - access_entitlement_drift
    proper_question_if_activated: null
    improper_questions_blocked:
    - what_kind_of_person_does_this
    - what_identity_or_orientation_does_this_reveal
    - is_this_person_adult
    - is_this_person_lower_in_dignity
    - what_clinical_or_moral_defect_explains_this
    docking_status: not_needed
