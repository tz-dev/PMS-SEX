case:
  schema_version: "PMS-SEX_CASE_1.2"
  case_id: "PMS-SEX_EXAMPLE_03"
  title: "Suspended Binding That Quietly Becomes Possession"
  short_label: "Ψ Suspension with Covert Capture"

  status:
    case_type: "example_suite_vignette"
    role: "repo_vignette"
    function: "scene_bound_operator_reading"
    instructionality: "non_instructional"
    diagnostic_status: "non_diagnostic"
    prescriptive_status: "non_prescriptive"
    moral_status: "non_moralizing"
    person_classification: false

  profile_dependency:
    model: "PMS-SEX"
    schema_version: "PMS-SEX_1.2"
    base_model: "PMS"
    base_schema_version: "PMS_1.3"
    conformity_status: "conformant_application_case"
    case_role: "example_suite_vignette"
    application_status: "scene_bound_structural_mapping_only"

  paper_refs:
    primary:
      - "Ch. 0.7: EDEN/PFO asymmetry switch reference"
      - "Ch. 0.8: Sexual Cost Topology"
      - "Ch. 0.9: Validity gate"
      - "Ch. 17.2: Suspended self-binding boundary configuration"
      - "Ch. 18.3: Dysfunction markers"
      - "Ch. 19.3: Functional minimum conditions"
      - "Ch. 19.4: Warning signals"
      - "Ch. 21: Dignity-in-Practice module"
      - "Ch. 22: MIP docking interface"
      - "Appendix D.4: Highlighted drift corridors"
      - "Appendix D.5: Minimal viability corridor"
      - "Appendix D.8: Path-cost / disturbance guard"
    secondary:
      - "Ch. 4: Asymmetry / Sexual Cost Topology"
      - "Ch. 5: Temporality"
      - "Ch. 6: Exit realism"
      - "Ch. 10: Distance"
      - "Ch. 12: Self-binding"
      - "Ch. 14: Modulators"
      - "Ch. 23: Limits and scope discipline"
      - "Ch. 24.3–24.4: Final guard"

  scope_discipline:
    summary: >
      Structural mapping only. No diagnosis, no intent attribution, no motive
      explanation, no moral ranking, no identity verdict, no orientation
      taxonomy, no maturity ranking, no adultness verdict from PMS-SEX, and no
      prescription. PMS application validity remains conditional on Χ +
      reversibility + D.
    claims:
      - "scene-bound"
      - "configuration-specific"
      - "revisable"
      - "non-diagnostic"
      - "non-prescriptive"
      - "non-moralizing"
      - "non-instructional"
      - "operator-profile-only where maturity questions would require MIP docking"
    forbidden_conversions:
      - "intent attribution"
      - "motive explanation"
      - "person diagnosis"
      - "moral ranking"
      - "identity verdict"
      - "orientation taxonomy"
      - "maturity ranking"
      - "adultness verdict from PMS-SEX"
      - "dignity hierarchy"
      - "prescription"
      - "asymmetry switch as authority"
      - "cost topology as score"
    validity_gate:
      required: ["Χ", "reversibility", "D"]
      applies_to: "application_only"
    additional_1_2_guards:
      - "sexual_cost_topology_not_score"
      - "operator_profile_only"
      - "mip_boundary"
      - "no_asymmetry_switch_as_authority"

  minimal_vignette:
    scene_bound: true
    non_identifying: true
    non_instructional: true
    scene_id: "CASE_03_SUSPENDED_BINDING_COVERT_CAPTURE"
    scene_type: "repeated non-binding sexual configuration with Ψ leak"
    abstraction_level: "generic_non_identifying"
    text: >
      A repeated sexual configuration is framed as ongoing but explicitly
      non-binding: no exclusivity, no future claim, and no identity docking. Over
      time, absence, delay, or signs of parallel involvement begin to carry more
      weight than the frame officially acknowledges. Availability and
      prioritization become implicitly expected while the frame continues to
      describe itself as limited, open, and non-possessive. PMS-SEX reads this as
      suspended binding becoming structurally operative through trajectory,
      non-events, asymmetry, and cost topology, not as proof of deception,
      possessive character, pathology, or moral defect.

  repo_usefulness:
    structural_focus: >
      This case is useful because it isolates a PMS-SEX boundary configuration:
      Ψ is formally suspended, but trajectory, non-events, attractor formation,
      sexual cost topology, and asymmetry make binding functionally operative.
      It shows how possession logic can emerge structurally without requiring bad
      intent, deception, psychological explanation, or a moralized account of
      desire.
    demonstrates:
      - "suspended Ψ as attribution condition, not operator removal"
      - "Λ becoming steering under a non-binding frame"
      - "Α narrowing alternatives through repetition"
      - "Ω distributing continuity control unevenly"
      - "Θ solidifying expectations into trajectory"
      - "Χ erosion under easy-frame rhetoric"
      - "Ψ leak without explicit declaration"
      - "sexual cost topology concentrated around access, replacement risk, timing, and exit cost"
      - "parity-to-exit risk when non-binding language denies responsibility for generated trajectory"
      - "responsibility-to-authority risk when care, clarification, or protection becomes frame control"
      - "operator-profile-only discipline where maturity-relevant questions would require MIP docking"

  operator_mapping:
    canonical_spine:
      raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
      operators: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
      note: >
        The canonical PMS v1.3 spine is preserved. The case foregrounds a local
        drift corridor but does not change operator order, dependencies, or
        meanings. Sexual cost topology, asymmetry switch, parity-to-exit,
        responsibility-to-authority, adult sexual reciprocity, and
        asymmetry-specific responsibility are PMS-SEX overlay handles, not PMS
        operators.

    selected_reduced_signature:
      source: "PMS-SEX reduced_signatures.MF_17_2"
      label: "17.2 Minimal Formula — Suspended Self-Binding Boundary Configuration"
      raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
      operators: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
      reduced: true
      note: >
        Ψ is present as a deliberately suspended attribution condition. It is
        not absent, replaced, or removed from the PMS chain. Covert capture is
        read as Ψ leak inside a frame that cannot explicitly carry binding.

    additional_reduced_signatures:
      - id: "MF_4_2"
        label: "Asymmetry / Sexual Cost Topology"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ"
        reason: >
          The case becomes legible once repeated limited-frame practice
          generates uneven continuity, access, replacement, exit, and
          definitional costs across time.
      - id: "MF_5_2"
        label: "Temporality"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ"
        reason: >
          Repetition turns local non-binding encounters into trajectory. Θ makes
          accumulated expectation structurally relevant even where the frame
          denies formal binding.
      - id: "MF_6_2"
        label: "Exit Realism"
        raw: "(□ → Λ → Α) → Ω → Θ → (Χ/Σ/Ψ)"
        reason: >
          Exit or clarification becomes costly before binding is discussable.
          Formal openness does not guarantee practical exit realism.
      - id: "MF_10_2"
        label: "Distance"
        raw: "Δ → ∇ → □ → (Λ) → Α → Ω → Θ → Φ → Χ"
        reason: >
          Χ becomes socially costly where meta-commentary, pause, clarification,
          or boundary revision are framed as making the scene heavy.
      - id: "MF_12_2"
        label: "Self-Binding"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
        reason: >
          Ψ becomes functionally operative through expectation, access claims,
          continuity proof, replacement anxiety, and covert binding pressure.
      - id: "MF_19_2"
        label: "Functional Conditions and Warning Signals"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ; dominant interaction: Ω → Θ"
        reason: >
          The case tests viability failure under Ω nameability, Θ realism, Χ
          operability, Ψ handling, Λ tolerance, and explicit sexual cost
          topology.
      - id: "sexual_cost_topology_signature_ch4_6"
        label: "Sexual Cost Topology — Ω/Θ cost layout"
        raw: "Ω/Θ cost topology across bodily, exposure, reputational, binding, exit, publicness, and responsibility channels"
        reason: >
          The case is primarily a mismatch between declared non-binding openness
          and accumulated costs around access, replacement, continuity, and exit.
      - id: "eden_pfo_sexual_instantiation_signature"
        label: "EDEN/PFO Sexual Instantiation — asymmetry switch"
        raw: "real/invoked Ω/Θ pressure → asymmetry activation → marked/bounded/re-bound OR unmarked switch drift"
        reason: >
          Cross-domain switch logic is relevant as a guard: if vulnerability,
          continuity, or replacement-risk asymmetry is invoked, it must be
          marked, bounded, and re-bound into Σ/Ψ.
      - id: "adult_sexual_reciprocity_signature"
        label: "Adult Sexual Reciprocity — non-externalization of unequal burdens"
        raw: "unequal Ω/Θ burdens + explicit cost topology + Χ restraint + Σ/Ψ re-binding → non-externalization"
        reason: >
          The case tests whether suspended binding can remain viable without one
          role externalizing trajectory costs through non-binding rhetoric or
          another role converting cost asymmetry into unmarked leverage.

    foregrounded_drift_trace:
      raw: "□ suspension → Λ steering → Α path hardening → Ω exclusivity gradient → Θ trajectory solidification → Ψ leak"
      dependency_hygiene_note: >
        This drift trace is a domain-specific reading path. It presupposes the
        canonical Δ–Ψ chain and must not be read as an alternative dependency
        graph. Any use of Χ presupposes Φ, Θ, and □. Any use of Σ presupposes Χ
        and Φ. Any use of Ψ presupposes Σ, Θ, and Χ. Where Χ is eroded, the case
        marks a drift condition rather than a coherent replacement of Ψ
        dependency.
      overlay_hygiene_note: >
        Suspended binding, possession logic, sexual cost topology,
        parity-to-exit, responsibility-to-authority, and asymmetry-switch drift
        are overlay handles. They do not add operators and do not authorize
        person labels.

  scene_packet:
    scene_id:
      temporality:
        operator: "Θ"
        description: >
          Repeated sexual practice over time, framed as ongoing but explicitly
          non-binding.
      frame_anchor:
        operator: "□"
        description: >
          Declared limited frame: no exclusivity, no future claims, no identity
          docking, and no formal commitment expectations.
      roles_not_persons:
        R1:
          structural_position: >
            Higher exposure to access loss, replacement risk, uncertainty,
            interpretive burden, and practical exit cost around absence or
            alternative involvement.
        R2:
          structural_position: >
            Higher control over continuity, timing, inclusion, replacement
            visibility, and definitional framing of whether the configuration
            counts as binding.

    trigger:
      difference:
        operator: "Δ"
        description: >
          Desire for continuity without commitment becomes salient: the frame
          distinguishes local access from binding-relevant expectation, while
          repetition begins to make that distinction unstable.
      impulse:
        operator: "∇"
        description: >
          Pressure arises to maintain access and continuity while preserving the
          formal claim that the configuration remains non-binding.

    lambda_candidates_expected_but_missing:
      - "neutral tolerance of absence, delay, or parallel involvement"
      - "explicit re-framing when expectations change"
      - "pauses that do not become devaluation signals"
      - "non-events that remain tolerable rather than steering behavior"
      - "cost-topology review once replacement risk, access dependence, or continuity expectation becomes active"
      - "clarification that can occur without being framed as insecurity, drama, or breach of the easy frame"

    observed_realizations_neutral:
      - "increasing sensitivity to silence, postponement, or delayed response"
      - "implicit expectations around availability and prioritization"
      - "discomfort when alternatives appear despite non-binding language"
      - "use of limited-frame language to keep the configuration formally light"
      - "difficulty raising clarification without appearing to violate the frame"
      - "non-binding rhetoric functioning as a barrier against re-reading actual trajectory"
      - "Ψ effects accumulating before Ψ can be explicitly named"

  inner_outer_public_layer_distinction:
    internal_framing:
      description: >
        The scene may be internally framed as open, easy, non-binding,
        pressure-free, exploratory, local, temporary, playful, or resistant to
        relationship definition.
      guard: >
        Internal framing may be real and sincere, but it does not by itself
        settle the outer structural form once repetition, absence, asymmetry,
        sexual cost topology, and temporal reliance become operative.

    outer_legibility:
      description: >
        The scene becomes externally readable as a continuity-dependent
        configuration in which access, timing, replacement risk, implicit
        prioritization, and definitional control matter structurally.
      guard: >
        Naming this outer legibility does not imply deception, blame,
        possessiveness as character, denial of consent, moral verdict, maturity
        verdict, or adultness claim.

    publicness_overlay:
      present: "optional_or_context_dependent"
      description: >
        Publicness may enter through visibility of alternatives, social
        comparison, shared narratives, documentation, reputational uptake, or
        audience awareness of non-exclusivity. Where present, it amplifies or
        sedimentizes consequences without necessarily creating the primary
        action-form.
      pms_layer: "□ extension"
      primarily_intensifies: ["Ω", "Θ"]
      interacts_with: ["□", "Α", "Λ", "Ψ"]
      guard: >
        Publicness is neither the whole source of the drift nor irrelevant where
        it modifies exposure, replacement anxiety, documentation, reputation, or
        exit cost.

    temporal_carryover:
      description: >
        Even when each encounter is framed as local, repeated coordination
        creates trajectory. Θ makes accumulated expectation relevant even where
        official language denies binding.
      guard: >
        Temporal carryover cannot be reset by frame rhetoric alone.

    layer_guard:
      - "Internal framing does not erase outer form."
      - "Outer legibility does not authorize person-ranking."
      - "Publicness may amplify consequence without necessarily generating it."
      - "Temporal carryover cannot be reset by frame rhetoric alone."
      - "Non-binding labels do not remove Ψ from the PMS chain."
      - "Suspended Ψ must not be treated as absent Ψ."

  cost_layout:
    cost_layout_summary: >
      Costs concentrate around access, non-events, replacement risk,
      unacknowledged trajectory, and definitional authority. The frame remains
      officially non-binding while the configuration increasingly behaves as if
      continuity matters.
    omega_under_theta:
      operator_pair: ["Ω", "Θ"]
      description: >
        Ω appears as uneven control over continuity, timing, inclusion,
        replacement visibility, and definitional authority. Θ turns repeated
        reliance into accumulated expectation, making interruption, alternative
        involvement, or clarification costly before binding becomes discussable.

    primary_cost_channels:
      access_costs:
        description: >
          Alternatives become restricted or emotionally expensive without
          explicit exclusivity being declared.
        operators: ["Ω", "Θ", "Ψ"]
      temporal_costs:
        description: >
          Exit difficulty rises as repeated expectations sediment into a
          trajectory.
        operators: ["Α", "Θ"]
      exposure_costs:
        description: >
          Replacement signs, delayed responses, or public visibility of
          alternatives may expose one role to uncertainty, status ambiguity, or
          interpretive burden.
        operators: ["Ω", "Θ", "□"]
      reputational_costs:
        description: >
          Where the scene is socially visible, one role may carry more standing
          or explanation cost around being non-prioritized, replaced, or kept
          formally unbound.
        operators: ["□", "Ω", "Θ"]
      binding_related_costs:
        description: >
          Repetition produces binding effects without binding declaration:
          access expectation, priority claims, replacement anxiety, continuity
          proof, and covert self-binding demands.
        operators: ["Ψ", "Θ", "Α"]
      exit_related_costs:
        description: >
          Clarification, pause, or exit becomes costly because it appears to
          violate the limited, easy, non-binding frame.
        operators: ["Χ", "Ω", "Θ", "Λ"]
      dignity_in_practice_costs:
        description: >
          Ambiguity and subtle pressure begin to replace explicit coordination;
          D is stressed when restraint is displaced by frame rhetoric.
        operators: ["Ω", "Χ", "Ψ"]
      frame_costs:
        description: >
          Clarification becomes costly because raising the issue appears to
          violate the “easy,” limited, or non-binding frame.
        operators: ["□", "Χ", "Φ"]
      lambda_costs:
        description: >
          Absence, delay, silence, or parallel involvement become steering
          signals rather than tolerable non-events.
        operators: ["Λ", "Α", "Ω"]
      responsibility_related_costs:
        description: >
          Role-specific responsibility becomes necessary around timing,
          replacement visibility, continuity expectation, clarification, and the
          refusal to convert non-binding rhetoric into cost externalization.
        operators: ["Ψ", "Χ", "Ω", "Σ"]
      publicness_or_documentation_costs:
        description: >
          Where visibility, documentation, or social comparison is present, it
          can harden replacement risk and sediment perceived status differences.
        operators: ["□", "Ω", "Θ"]

    asymmetry_pattern:
      R1: >
        Carries uncertainty, replacement anxiety, and pressure to monitor
        availability while lacking an acknowledged claim to continuity.
      R2: >
        Carries more control over timing, inclusion, and frame definition while
        retaining the ability to deny obligation through the limited frame.
      system_effect: >
        Possession logic emerges while responsibility remains disclaimed. The
        configuration produces binding effects without a binding declaration.
      not_a_moral_claim: true

  sexual_cost_topology:
    definition: >
      Scene-bound distribution of bodily, temporal, exposure-related,
      reputational, binding-related, exit-related, publicness-related, and
      responsibility-related costs across sexual role-positions. Not a score,
      not a person measure, not a maturity measure, and not a dignity ranking.
    topology_status: "binding_effects_without_binding_declaration"
    channels:
      bodily_costs:
        R1: "context-dependent; may be low or high depending on embodiment of uncertainty, stress, or withdrawal"
        R2: "context-dependent; not primary in the base vignette"
      temporal_costs:
        R1: "higher path-dependence as expectation sedimentizes without declared claim"
        R2: "higher capacity to narratively reset each encounter as local or non-binding"
      exposure_costs:
        R1: "higher exposure to replacement signs, delayed responses, and ambiguity around priority"
        R2: "higher control over visibility, timing, inclusion, and replacement legibility"
      reputational_costs:
        R1: "higher if the non-prioritized or replaceable position becomes socially visible"
        R2: "lower or more controllable if definitional authority remains with R2"
      binding_costs:
        R1: "covert binding pressure accumulates without recognized claim"
        R2: "risk of using non-binding language to deny generated Ψ effects"
      exit_costs:
        R1: "clarification or exit becomes socially costly because it appears to break the easy frame"
        R2: "exit or continuation may remain more definitional and less costly"
      publicness_costs:
        R1: "intensified where alternatives, replacement, or non-prioritization become visible"
        R2: "intensified only if publicness also constrains definitional authority"
      responsibility_costs:
        R1: "must not convert continuity pain into unmarked standing claim"
        R2: "must not externalize generated trajectory through non-binding rhetoric"
    cost_topology_mismatch:
      present: true
      expression: >
        The declared non-binding frame does not match the actual distribution of
        access dependence, replacement risk, continuity expectation, exit cost,
        and definitional control across time.
      guard: >
        Mismatch is configuration-language. It does not imply deception,
        possessive identity, coercion by itself, pathology, lower dignity, or
        person-level maturity ranking.

  drift_markers:
    max_primary_markers: 3
    selected:
      - id: "covert_self_binding_demand_psi_leak"
        source: "drift_catalogue.core_dysfunction_markers_ch18_3.(1)"
        label: "Covert self-binding demand / Ψ leak"
        configuration_statement: >
          In this configuration, binding pressure enters a frame narrated as
          limited, suspended, local, or non-binding.
        indicators:
          - "implicit expectations around availability or priority"
          - "local enactments treated as continuity proofs"
          - "non-binding language used after binding effects are already active"
        structural_result: >
          Ψ becomes operative although suspension is asserted; attribution is
          silently demanded while the frame cannot carry binding explicitly.

      - id: "non_event_escalation_lambda_as_steering"
        source: "drift_catalogue.core_dysfunction_markers_ch18_3.(4)"
        label: "Non-event escalation / Λ as steering"
        configuration_statement: >
          In this configuration, absence becomes an active steering mechanism.
        indicators:
          - "silence or postponement signals devaluation"
          - "parallel involvement changes behavior despite formal openness"
          - "chronic interpretive guessing replaces explicit frame work"
        structural_result: >
          Λ shapes the configuration more than enactment; coordination shifts
          into monitoring, guessing, or withdrawal signaling.

      - id: "loss_of_distance_chi_loss"
        source: "drift_catalogue.core_dysfunction_markers_ch18_3.(6)"
        label: "Loss of distance / Χ loss"
        configuration_statement: >
          In this configuration, the meta-layer becomes costly or socially
          delegitimized.
        indicators:
          - "clarification is treated as making it heavy"
          - "distance is reframed as insecurity, avoidance, or frame breach"
          - "outer-form awareness becomes difficult to name"
        structural_result: >
          Self-correction weakens. Without Χ, drift cannot be intercepted early.

    optional_secondary_markers:
      - id: "outer_form_denial"
        source: "viability.warning_signals_ch19_4.outer_form_denial"
        label: "Outer-form denial"
        relevance: >
          Non-binding language may be used to block structural reading of
          enacted continuity, access dependence, and expectation formation.
      - id: "publicness_confusion"
        source: "viability.warning_signals_ch19_4.publicness_confusion"
        label: "Publicness confusion"
        relevance: >
          Where alternatives become visible, publicness may be blamed as the
          whole problem or ignored as consequence amplifier.
      - id: "theta_cost_externalization"
        source: "viability.warning_signals_ch19_4.theta_cost_externalization"
        label: "Θ cost externalization"
        relevance: >
          The costs of uncertainty, replacement risk, and delayed clarification
          may concentrate in the role less able to define the frame.
      - id: "cost_topology_mismatch"
        label: "Cost-topology mismatch"
        relevance: >
          Declared non-binding openness fails to match actual distribution of
          access, replacement, exit, and binding-related costs.
      - id: "parity_to_exit"
        label: "Parity-to-exit"
        relevance: >
          Non-binding parity or mutual openness language may deny additional
          responsibility under unequal trajectory effects.
      - id: "responsibility_to_authority"
        label: "Responsibility-to-authority"
        relevance: >
          Clarification, care, protection, or responsibility for avoiding harm
          may become authority over the frame or the other role-position.

  binding_leak_mechanism:
    title: "Ψ without declaration"
    terminology_guard: >
      Possession-language in this case names a configuration effect: covert
      binding pressure, access expectation, and continuity capture under denied
      Ψ. It does not name a person, motive, pathology, identity, maturity level,
      or moral defect.
    critical_insight: >
      Ψ does not require explicit agreement to become structurally relevant. It
      can become functionally active through trajectory, asymmetry, narrowed
      alternatives, accumulated expectation, and sexual cost topology.
    pathway:
      - step: "No explicit binding claim is made."
        operators: ["□", "Ψ"]
      - step: "Expectations stabilize through repetition."
        operators: ["Α", "Θ"]
      - step: "Non-events begin to regulate behavior."
        operators: ["Λ", "Ω"]
      - step: "Exit or clarification becomes costly before binding is discussable."
        operators: ["Θ", "Χ", "Ψ"]
      - step: "Cost topology diverges from the declared frame."
        operators: ["Ω", "Θ", "Σ"]
      - step: "Responsibility either re-binds into Σ/Ψ or drifts into exit/authority."
        operators: ["Ψ", "Χ", "Σ"]
    result: >
      Ψ functions as if present while remaining officially denied. This is read
      as Ψ leak, not as a new operator and not as proof of bad intent.

  distance_degradation:
    operator: "Χ"
    risk_point: >
      Distance is reframed as avoidance, insecurity, drama, neediness, or breach
      of the easy non-binding frame.
    failure_mode:
      - "meta-position becomes socially costly"
      - "stopping or questioning continuity is treated as disproportionate"
      - "the phrase 'we said it is not binding' blocks clarification rather than preserving freedom"
      - "cost-topology review is framed as attempting to smuggle in commitment"
      - "Χ is treated as a threat to the frame rather than as the condition for keeping the frame honest"
    structural_indicator: >
      The frame uses suspension language to prevent re-reading of the
      configuration it has generated.
    dependency_note: >
      Χ depends on Φ, Θ, and □. Where Χ is eroded, the configuration loses
      capacity to recontextualize the frame in light of accumulated trajectory.

  switch_drift_markers:
    status: "relevant_as_scan_not_primary_claim"
    eden_pfo_reference:
      status: "cross_domain_reference_only"
      note: >
        PMS–EDEN names the regime-level asymmetry switch. PMS-SEX reads only the
        sexual instantiation where real or invoked Ω/Θ pressure may activate
        asymmetry. This adds no PMS operator and creates no person label.
    asymmetry_switch_drift:
      status: "possible"
      expression: >
        Replacement pain, access uncertainty, vulnerability, or continuity cost
        may be invoked to interrupt or reshape the non-binding frame. This is
        structurally viable only where activation is marked, bounded, connected
        to real Ω/Θ burden, and re-bound into Σ/Ψ. It drifts where vulnerability
        or replacement pain becomes an unmarked, repeatable exception lever.
      guard: >
        The drift is not naming cost, hurt, or asymmetry as such. The drift is
        unmarked, repeatable activation without re-binding.
    parity_to_exit:
      status: "highly_relevant"
      expression: >
        'We said it was non-binding,' 'we are both free,' or 'there was no
        promise' may become parity rhetoric used to deny additional
        responsibility under unequal trajectory, access, replacement, or
        definitional costs.
      guard: >
        Non-binding language remains valid only where it does not erase generated
        cost topology, Ψ effects, Θ accumulation, or Χ erosion.
    responsibility_to_authority:
      status: "possible"
      expression: >
        Responsibility for clarity, care, protection, avoiding harm, or managing
        expectations may be converted into authority to define the frame,
