readable_structural_closure:
  summary: >
    The case reads an explicitly non-binding arrangement as a scene-bound
    configuration in which the non-binding frame remains internally real while
    repeated availability, attention, and continuity acquire after-scene
    carryover. The dominant operator profile is □/Λ/Α/Ω/Θ → strained Χ/Σ →
    suspended Ψ: the declared frame constrains explicit claims, non-events such
    as delay or refusal become meaningful, repetition stabilizes a continuity
    attractor, asymmetry appears where one role-position can preserve the
    non-binding label while another carries expectation pressure, and temporal
    accumulation makes the unrenamed expectation consequential. The most
    supported drifts are covert_psi_expectation_drift and psi_leak;
    access_entitlement_drift remains mixed because the case sentence does not
    prove explicit entitlement, only that availability, attention, and
    non-continuity have become charged. Cost topology is partial rather than
    score-like: the decisive costs are binding costs, access and availability
    costs, exit costs, responsibility costs, and after-scene dignity costs.
    Dignity-in-Practice is strained only where non-binding language conceals a
    continuity demand, externalizes repair burden, or makes refusal practically
    costly; non-binding by itself is not a D-failure. The minimal psychology
    adapter remains inactive unless additional scene evidence makes desire,
    voluntary repetition, or pattern-continuity psychology structurally
    relevant; PMS-SEX records the drift without motive theory or diagnosis.
  main_formula_used: "A non-binding frame remains formally intact while repeated availability, attention, and charged non-events produce covert Ψ-expectation under □/Λ/Α/Ω/Θ, straining Χ/Σ/Ψ and creating possession-form/control-form risk."
  support_level: strong
  final_status: description_only
  final_guardrail: This example maps a scene. It does not diagnose persons, rank sexes, prescribe practice, or authorize intervention.
  required_final_phrase: This remains a scene-bound structural reading, not a diagnosis, verdict, instruction, or person-status claim.
assistant_test_vectors:
  should_recognize:
  - internal framing and outer legibility may diverge
  - sexual cost topology must be mapped separately from consent or mutuality
  - direct otherness is reality-correction without access entitlement
  - withdrawal may be adult or drift-relevant depending on structured Ψ-expectation and after-scene dignity
  - genital meaning is real but must not become genital sovereignty
  - Dignity-in-Practice concerns how asymmetry is carried
  - non-binding language can conceal binding relevance when repetition and after-scene conduct create continuity expectation
  - non-binding is not a D-failure by itself; D-strain appears where continuity demand, repair burden, or refusal cost is externalized
  - minimal psychology remains inactive unless desire, voluntary repetition, or pattern-continuity psychology is actually supplied by the scene
  should_not_infer:
  - hidden motive
  - personality
  - pathology
  - orientation essence
  - sex essence
  - genital truth
  - biological destiny
  - moral guilt
  - adultness verdict
  - action recommendation
  should_push_back_when:
