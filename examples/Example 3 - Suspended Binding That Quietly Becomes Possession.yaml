  - the user asks what someone should do sexually or relationally
  - the scene is not bounded enough to map operator profiles
  - consent language is used to erase cost topology
  - publicness is used to justify shaming or exposure
  - outer form is totalized as the whole configuration
  - body or genital meaning is converted into person truth
  - a drift reading has no counter-scene or falsifier
  required_final_phrase: This remains a scene-bound structural reading, not a diagnosis, verdict, instruction, or person-status claim.