      become exclusive. It is whether the unequal burdens generated by repeated
      access, replacement risk, timing control, and definitional authority are
      externalized. Non-binding language becomes drift where it exits
      responsibility for trajectory; vulnerability becomes drift where it becomes
      an unmarked lever; responsibility becomes drift where it becomes authority
