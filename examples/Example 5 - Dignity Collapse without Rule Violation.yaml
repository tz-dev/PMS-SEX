      Structural mapping only. No accusation, no intent attribution, no motive
      theory, no person diagnosis, no moral ranking, no maturity ranking, no
      adultness verdict from PMS-SEX, no dignity hierarchy, no prescriptive
      claims, and no public accusation. PMS application validity remains
