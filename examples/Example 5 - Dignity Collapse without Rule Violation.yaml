case_schema_version: PMS-SEX_CASE_TEMPLATE
case_meta:
  id: pms_sex_case_dignity_collapse_without_rule_violation
  title: Dignity Collapse without Rule Violation
  subtitle: Rule-compliant arrangement with failed after-scene carrying
  status: example
  model: PMS-SEX
  model_schema_version: PMS-SEX_PROFILE
  base_schema: PMS_1.3
  file_name: Example - Dignity Collapse without Rule Violation.yaml
  authorship:
    originator: T. Zöller
    formalization_assistant: ChatGPT 5.5 (Thinking)
  purpose: Demonstrate a bounded PMS-SEX structural reading of a rule-compliant scene in which after-scene dignity, distance,
    and reciprocal carrying of consequences nevertheless fail.
  case_type: dignity_case
  primary_focus:
    construct: after_scene_dignity_failure
    construct_status: drift
    yaml_home: drifts.after_scene_dignity_failure
    secondary_constructs:
      - sexual_cost_topology
      - cost_topology_mismatch
      - sexual_reciprocity_under_real_asymmetry
      - D_compliance
      - parity_to_exit
      - covert_psi_expectation_drift
      - withdrawal_expectation_disowned
    not_a_case_of:
      - rule_violation_by_itself
      - consent_substitution_for_cost_topology
      - person_diagnosis
      - sexual_identity_taxonomy
      - practice_instruction

case_guardrails:
  non_diagnostic: true
  non_prescriptive: true
  non_verdictive: true
  non_person_labeling: true
  non_orientation_taxonomy: true
  non_sex_ranking: true
  non_genital_truth: true
  non_biological_destiny: true
  no_hidden_motive_inference: true
  no_psychological_diagnosis: true
  no_therapy_or_intervention_protocol: true
  no_practice_guidance: true
  no_risk_optimization: true
  no_public_punishment: true
  no_public_confession_requirement: true
  description_mode: structural_mapping_only
  validity_gate_reference: guard_sets.final_profile
  required_pms_entry_conditions:
    - Χ
    - reversibility
    - Dignity-in-Practice
  required_pms_sex_conditions:
    - scene_bound
    - operator_profile_only
    - internal_outer_public_layers_distinguished
    - sexual_cost_topology_explicit_if_relevant
    - after_scene_dignity_checked_if_relevant
    - direct_otherness_not_converted_into_access_entitlement
    - genital_meaning_not_converted_into_genital_sovereignty
    - withdrawal_not_moralized_or_exculpated_by_default
    - viability_read_as_governability_not_normality
    - mip_docking_only_if_maturity_or_adultness_language_appears
  core_rule: Map configurations; do not diagnose persons, prescribe practice, rank sexes, infer motives, or authorize action.
  invalid_if_any:
    - scene_packet_replaced_by_impression
    - operator_trace_used_as_person_verdict
    - visible_form_totalized_as_whole_configuration
    - internal_framing_erases_outer_legibility
    - public_measure_formation_becomes_confession_demand
    - consent_or_mutuality_substitutes_for_cost_topology
    - access_threshold_becomes_entitlement
    - permission_image_treated_as_consent
    - body_boundary_coding_treated_as_person_truth
    - genital_meaning_treated_as_genital_sovereignty
    - withdrawal_treated_as_automatic_guilt
    - withdrawal_treated_as_automatic_exculpation
    - D_suspended_for_clarity_or_punishment
    - description_converted_directly_into_binding_or_action
  prohibited_shortcuts:
    - PMS-SEX-by-vibe
    - deviance-by-label
    - practice-label-settles-structure
    - consent-settles-cost
    - public-reaction-settles-harm
    - body-state-proves-person-truth
    - genital-self-description-settles-analysis
    - orientation-or-identity-used-as-explanation
    - motive-inference-from-operator-trace
    - maturity-verdict-without-MIP-docking

repo_use:
  status: structural_focus_only
  intended_use:
    - scene_bound_analysis
    - operator_mapping
    - cost_topology_readout
    - drift_and_viability_scan
    - dignity_in_practice_check
    - mip_docking_gate_if_relevant
  not_intended_for:
