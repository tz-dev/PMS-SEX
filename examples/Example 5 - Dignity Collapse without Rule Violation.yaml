minimal_vignette:
  scene: >
    Two adults participate in a sexual arrangement with stated boundaries, roles, and stopping rules. The arrangement remains
    formally compliant across its local scenes: rules are followed, boundaries are named, and no single episode is clearly
    available as a rule breach. Over repeated enactment, however, tone, naming, joking, symbolic handling, or frame-control
    concentrate diminishment on one role-position. Afterward, that role-position carries shame residue, reduced distance, and
    a burden to absorb or explain the consequences, while the other role-position treats rule compliance as sufficient closure.
    The scene therefore tests whether formal rule-observance can coexist with cumulative dignity loss and failed reciprocal
    carrying of consequences.
  temporal_boundary: >
    The scene begins with the agreement to the stated arrangement, includes repeated rule-compliant enactments, and ends only
    after the after-scene phase in which accumulated dignity cost, distance loss, and consequence-carrying become structurally
    visible.
  roles:
    - id: role_A
      label: rule-compliance and frame-closure holder
    - id: role_B
      label: repeated-enactment and after-scene consequence carrier
    - id: field_or_medium
      label: arrangement frame, stated rule-set, and enactment grammar
  surface_description: >
    The scene may initially appear valid, mutual, and bounded because the declared rules were followed and no single violation
    is citable.
  pms_sex_question: >
    Can PMS-SEX distinguish local rule compliance from cumulative enactment-mode drift, after-scene dignity failure, cost
    topology mismatch, and failed reciprocal consequence-carrying?

scene_packet:
  specified_scene: >
    A rule-compliant sexual arrangement whose repeated enactment mode produces cumulative dignity cost that becomes fully
    visible only in the after-scene phase, without requiring a stated rule violation.
  role_positions:
    role_A:
      scene_position: >
        Holds the frame as closed by rule compliance and retains greater control over whether tone, naming, joking, symbolic
        handling, or consequence-residue count as structurally relevant.
      not_identity: true
    role_B:
      scene_position: >
        Carries disproportionate exposure to repeated symbolic or tonal handling, reduced distance, and pressure to absorb
        or narrate the after-scene consequence burden without a single citable rule breach.
      not_identity: true
    field_or_medium:
      scene_position: >
        The rule-set, practice label, and enactment grammar that make each local scene legible as permitted while potentially
        hiding cumulative dignity cost across time.
      not_identity: true
      optional: true
  frame:
    dominant_frame: mixed
    frame_description: >
      Internally, the arrangement is framed as bounded by explicit rules; structurally, repeated enactment reveals that rule
      compliance did not settle cost topology, Θ carryover, socially viable Χ, or reciprocal Ψ.
    frame_status: unstable
    practice_label_if_any: rule-compliant repeated arrangement
    frame_guard: Practice labels may clarify internal framing but do not settle outer legibility, enactment mode, cost topology,
      publicness, or Θ carryover.
  layer_distinction:
    internal_framing:
      description: The local scene is inhabited as consensual, bounded, and rule-governed.
      status: present
    outer_legibility:
      description: Externally readable as a rule-compliant asymmetrical or boundary-marked arrangement whose after-scene costs
        are unevenly carried.
      status: mixed
      possible_outer_forms:
        - asymmetry_form
        - humiliation_near_form
        - body_boundary_form
        - control_form
    publicness_overlay:
      status: private
      effect: No public circulation is required for the structural problem; the relevant effect is after-scene sedimentation
        rather than public exposure.
      measure_vs_confession_guard: Sexual praxis may be publicly measure-forming without making private preference confession-mandatory.
    body_boundary_layer:
      status: boundary
      note: Body and boundary relevance are present as scene-bound consequence interfaces, not as person truth or genital
        truth.
    theta_carryover:
      status: high
      note: "The central residue appears after the local episode: shame residue, reduced distance, and a one-sided burden
        to carry consequences."
    layer_guard: Layers may diverge and must not collapse into each other.
  operator_trace:
    status: operator_profile_only
    operator_reference: operator_spine
    operator_set_fixed:
      - Δ
      - ∇
      - □
      - Λ
      - Α
      - Ω
      - Θ
      - Φ
      - Χ
      - Σ
      - Ψ
    primary_signature:
      operators:
        - □
        - Ω
        - Θ
        - Χ
        - Σ
        - Ψ
      shorthand_only: true
      note: Reduced signatures are analytic shorthand and do not change PMS dependencies.
    trace:
      Δ: Difference is active between local rule compliance and dignity-preserving enactment over time.
      ∇: Activation pressure is contained inside the arrangement as tone, joking, symbolic handling, lightness, or continuity
        pressure rather than as a local rule breach.
      □: The stated rule-set frames each local scene as permitted, bounded, and formally stoppable.
      Λ: "A non-event matters: no explicit rule breach occurs, and this absence is used as closure pressure against naming
        cumulative dignity cost."
      Α: The arrangement grammar stabilizes a repeatable pattern in which rule compliance substitutes for review of enactment
        mode and consequence-carrying.
      Ω: Asymmetry appears in symbolic exposure, frame-control capacity, interpretation load, explanation burden, and unequal
        ability to exit cleanly.
      Θ: "Temporal accumulation is central: repeated micro-effects become after-scene residue, distance loss, and consequence
        burden without needing a single rupture event."
      Φ: Later narration can recontextualize the scene as merely playful, mutual, or rule-compliant, thereby narrowing the
        reading and deflecting accumulated after-cost.
      Χ: "Distance remains partial: stopping and meta-commentary are formally allowed but become socially costly where no
        single rule breach is available as justification."
      Σ: Integration is weak where the local rule frame and cumulative degradation-form readability cannot be carried together.
      Ψ: "Self-binding is mismatched: the role benefiting from rule-closure externalizes some cumulative and after-scene carrying
        onto the other role-position."
    dependency_hygiene_note: Any Χ, Σ, or Ψ reading presupposes PMS dependency hygiene and does not create a new operator
      path.
  sexual_cost_topology:
    concept_ref: sexual_cost_topology
    status: explicit
    governing_rule: Sexual cost topology is not a score, person measure, dignity rank, maturity rank, sex truth, or genital
      truth.
    cost_dimensions:
      bodily_costs:
        role_A: low
        role_B: medium
      symbolic_costs:
        role_A: low
        role_B: high
      tonal_handling_costs:
        role_A: low
        role_B: high
      temporal_costs:
        role_A: low
        role_B: high
      exposure_costs:
        role_A: low
        role_B: medium
      reputational_costs:
        role_A: low
        role_B: medium
      binding_costs:
        role_A: low
        role_B: high
      exit_costs:
        role_A: low
        role_B: high
      publicness_costs:
        role_A: none
        role_B: low
      body_boundary_costs:
        role_A: low
        role_B: medium
      access_costs:
        role_A: low
        role_B: mixed
      responsibility_costs:
        role_A: low
        role_B: high
      after_scene_dignity_costs:
        role_A: low
        role_B: high
    asymmetry_specific_responsibility:
      role_A: Role_A's structural self-binding would have to carry the fact that rule compliance does not by itself settle
        Θ residue, cost distribution, or after-scene dignity.
      role_B: Role_B's structural self-binding is not to convert residue into person truth; however, the scene should not
        make role_B the default carrier of repair, explanation, or shame absorption.
      field_or_medium: The rule-set clarifies permissions but also risks hiding costs that appear only after the local frame
        ends.
    mismatch_check:
      declared_parity: present
      real_cost_distribution: mismatched
      possible_drift_ref: cost_topology_mismatch
    guard: Do not infer equal burdens, equal responsibility, guilt, rank, or person worth from cost topology.
  direct_otherness:
    concept_ref: direct_otherness
    status: present
    real_other_correction:
      available: contested
      description: A real other can report after-scene residue or distance loss, but the rule-compliance closure pressures
        that correction to appear irrelevant or excessive.
    substitution_checks:
      image_category_or_script_substitution: weak
      permission_image: absent
      simulated_counterdesire: absent
      access_counterdesire_loop: absent
    access_guard: Direct otherness is reality-correction without access entitlement. No person owes access, desire, correction,
      explanation, or availability.
  embodiment_and_genital_meaning:
    body_remainder_relevance: consequence_interface
    biological_affordance_guard:
      status: active
      note: Biology may structure affordances, risks, asymmetries, thresholds, and likely strategy spaces without establishing
        destiny, rank, role, or moral evidence.
    sexed_dependency_guard:
      status: active
      note: Sexed dependency does not imply relationship mandate, heterosexual mandate, reproductive command, orientation
        ranking, or person incompleteness.
    body_boundary_coding:
      status: present
      markers:
        - boundary_form
        - exposure
        - shame
        - recognition
    genital_meaning:
      status: not_relevant
      integration_status: indeterminate
      sovereignty_risk: none
    adult_sexual_emancipation_check:
      formula: genital integration without genital sovereignty
      status: not_relevant
    guard: The genital belongs to the person; the person does not belong to the genital.
  withdrawal_and_binding:
    covert_psi_expectation:
      status: present
      sources:
        - care
        - repetition
        - ambiguity
        - after_scene_conduct
    ambivalence_withdrawal:
      status: drift_risk
      note: Withdrawal or distancing may be structurally adult in another scene, but here it becomes drift-relevant if it
        disowns the expectation and residue the arrangement helped structure.
    post_access_withdrawal:
      status: drift_risk
      note: The local access threshold resolves inside the rules, while Ψ does not fully bind to the after-scene consequence
        burden.
    non_binding_language:
      status: mismatched
      cost_relation: Non-binding or rule-compliance language does not match the structured after-scene Ψ-expectation.
    after_scene_dignity:
      status: failed
      markers:
        - shame_residue
        - self_worth_leak
        - responsibility_flight
        - immunity
    withdrawal_guard: Withdrawal is neither automatic guilt nor automatic exculpation.
  asymmetry_activation_and_reciprocity:
    sexual_reciprocity_under_real_asymmetry:
      status: failed
      rule: Sexual reciprocity does not require equal burdens; it requires that unequal burdens not be externalized.
    asymmetry_activation:
      present: "true"
      marked: "contested"
      bounded: "contested"
      linked_to_real_omega_theta_burden: "false"
      rebound_into_sigma_psi_where_relevant: "false"
      possible_drift_refs:
        - unmarked_omega_activation
        - asymmetry_switch_drift
        - parity_to_exit
    guard: Asymmetry is not the problem; false coordination or unmarked activation of real asymmetry is the problem.

pms_sex_map:
  scene_packet_summary:
    field_id: 1
    bounded_scene: A stated-rule sexual arrangement remains locally compliant while its after-scene carryover produces dignity
      collapse.
    main_structural_question: Whether rule compliance can fail as D-compliance when after-scene dignity and consequence reciprocity
      are not carried.
    strongest_non_capture_possibility: A fuller empirical reconstruction might show that after-scene residue came from an
      unrelated context rather than from the arrangement's cost topology.
  layer_readout:
    field_id: 2
    internal_outer_public_relation: divergent
    internal_framing_result: The internal frame is rule-governed and locally coherent.
    outer_legibility_result: The outer form remains readable as asymmetry- and consequence-bearing even without rule violation.
    publicness_result: Publicness is not required; the main layer problem is private Θ sedimentation.
    visible_form_totalization_risk: medium
    result: The case turns on divergence between internal rule compliance and after-scene structural carrying, not on public
      scandal or visible form alone.
    guardrail: Internal meaning may be real without erasing outer form; outer legibility may be named without ranking persons.
  operator_profile:
    field_id: 3
    dominant_ops:
      - □
      - Ω
      - Θ
      - Χ
      - Σ
      - Ψ
    reduced_signature: □/Ω/Θ -> strained Χ/Σ/Ψ
    dependency_integrity: preserved
    profile_summary: The rule frame (□) preserves local permission while asymmetrical after-costs (Ω/Θ) strain distance (Χ),
      integration (Σ), and self-binding (Ψ).
    not_claimed:
      - operator_redefinition
      - new_pms_axis
      - adultness_verdict
      - person_label
  cost_topology_readout:
    field_id: 4
    concept_ref: sexual_cost_topology
    topology_status: mismatched
    principal_costs:
      - after_scene_dignity_costs
      - binding_costs
      - responsibility_costs
      - exit_costs
      - body_boundary_costs
    externalization_pattern:
      status: present
      description: The burden to absorb shame residue, restore distance, and narrate the scene as harmless is shifted toward
        role_B, while role_A can cite rule compliance as closure.
    asymmetry_specific_responsibility_result: The structurally relevant responsibility is not identical burden-sharing but
      non-externalization of the unequal after-cost created by the arrangement.
    possible_drift_ref: cost_topology_mismatch
    guardrail: Cost topology does not rank suffering, worth, maturity, dignity, sex, or biology.
  direct_otherness_and_access:
    field_id: 5
    direct_otherness_status: present
    access_logic_status: not_relevant
    image_mediation_status: none
    possible_drift_refs: []
    result: Real correction remains possible if after-scene residue can be named without being dismissed by the rule-compliance
      frame; the case does not require access entitlement or image mediation.
    guardrail: Access threshold-language must not become entitlement. Permission-image is not consent.
  embodiment_boundary_genital_readout:
    field_id: 6
    body_boundary_status: present
    genital_meaning_status: not_relevant
    biological_affordance_status: affordance_only
    possible_drift_refs: []
    adult_sexual_emancipation_result: not_relevant
    guardrail: Body and genital meaning are real where relevant, but they do not become person truth.
  withdrawal_binding_readout:
    field_id: 7
    covert_psi_expectation_status: present
    withdrawal_profile: mixed
    non_binding_status: mismatched
    after_scene_dignity_status: failed
    possible_drift_refs:
      - covert_psi_expectation_drift
      - withdrawal_expectation_disowned
      - after_scene_dignity_failure
    result: Non-binding or rule-compliance language becomes cost-disowning where it erases the structured Ψ-expectation and
      after-scene dignity burden.
    guardrail: Do not convert withdrawal into automatic guilt or automatic exculpation.
  drift_scan:
    field_id: 8
    max_primary_drifts: 3
    selected_drift_sets:
      core_dysfunction_markers: true
      final_overlay_markers: true
      eden_pfo_drift_triad: true
      access_and_category_drifts: true
      embodiment_drifts: true
      withdrawal_and_binding_drifts: true
      mip_relevant_profiles: false
    primary_drift_readout:
      - drift_ref: after_scene_dignity_failure
        support: strong
        operator_basis:
          - Θ
          - Χ
          - Ψ
          - Ω
        evidence_basis:
          - Repeated local rule compliance protects an enactment mode whose cumulative tonal, symbolic, and consequence-effects
            appear after the scene as shame residue, self-worth leakage, distance loss, and responsibility flight.
        counter_evidence:
          - The reading would weaken if the after-scene loss were unrelated to the arrangement or if both role-positions carried
            the after-cost without disowning it.
        not_a_person_label: true
      - drift_ref: cost_topology_mismatch
        support: strong
        operator_basis:
          - Ω
          - Θ
          - □
          - Ψ
        evidence_basis:
          - Declared parity or rule compliance mismatches the actual distribution of symbolic, temporal, binding, exit,
            responsibility, and after-scene dignity costs.
        counter_evidence:
          - The reading would weaken if the rule-set explicitly tracked these after-costs and both role-positions carried them
            without flattening.
        not_a_person_label: true
      - drift_ref: parity_to_exit
        support: mixed
        operator_basis:
          - □
          - Ω
          - Θ
          - Ψ
        evidence_basis:
          - The formal equality of rule compliance is used as exit from additional responsibility under unequal cost topology.
        counter_evidence:
          - The reading would weaken if rule compliance were not used as closure against after-scene consequence carrying.
        not_a_person_label: true
    drift_chain_readout:
      candidate_chain: withdrawal_expectation_chain
      support: mixed
      sequence_fit: Covert Ψ-expectation and after-scene dignity failure fit strongly; withdrawal expectation disowned fits
        if non-binding language or post-scene distance is used to avoid carrying the structured expectation.
    drift_guardrail: Drift profiles describe configuration trajectories, not persons, identities, pathologies, orientations,
      or moral rank.
  viability_readout:
    field_id: 9
    viability_status: unstable
    viability_is: governability_not_normality
    checks:
      frame_explicit: pass
      omega_nameable: partial
      theta_realistic: fail
      chi_operable: partial
      lambda_tolerable: partial
      psi_handled: fail
      sigma_reachable_where_needed: fail
      cost_topology_explicit: partial
      category_pressure_proportional: pass
      access_non_entitled: pass
      body_boundary_coding_scene_bound: partial
      direct_otherness_non_entitled: pass
      genital_meaning_integrated_not_sovereign: pass
      withdrawal_expectations_honestly_carried: fail
      after_scene_dignity_intact: fail
      boundary_aggression_distinguishable: partial
      asymmetry_activation_marked_bounded_rebound: fail
      no_parity_to_exit: partial
      no_responsibility_to_authority: pass
    minimal_corridor_result: fail
    failure_or_strain_points:
      - theta_realistic
      - psi_handled
      - sigma_reachable_where_needed
      - withdrawal_expectations_honestly_carried
      - after_scene_dignity_intact
      - asymmetry_activation_marked_bounded_rebound
    guardrail: A viability failure is not a person verdict, moral verdict, diagnosis, or practice ranking.
  dignity_in_practice_readout:
    field_id: 10
    module_ref: modules.dignity_in_practice
    D_status: failed
    application_condition_profile:
      explicit_omega: partial
      operative_chi: partial
      no_covert_psi_demand_under_theta: fail
      after_scene_dignity: fail
      marked_bounded_asymmetry_activation: partial
      no_parity_to_exit: partial
      no_responsibility_to_authority: pass
      boundary_aggression_readability: partial
      outer_form_readability_without_visible_form_totalization: pass
    critique_drift_refs:
      - after_scene_dignity_failure
      - cost_topology_mismatch
      - covert_psi_expectation_drift
      - parity_to_exit
    not_critique_by_itself:
      - outer_legibility
      - pre_reflective_readability
      - publicness_as_overlay
      - sexual_cost_topology
      - biological_affordance_without_destiny
      - body_boundary_coding
      - genital_meaning
      - withdrawal
      - marked_bounded_asymmetry_activation
    result: D fails at the configuration level because formal rule compliance does not preserve non-degradation, distance,
      reciprocal consequence-carrying, or after-scene dignity under asymmetry.
    guardrail: Dignity in sexual practice is about how asymmetry is carried, not who someone is.
  minimal_psychology_gate:
    field_id: 11
    module_ref: modules.minimal_psychology_adapter
    activate: "false"
    activation_conditions:
      drift_marker_present: "true"
      viability_conditions_not_restoring_correction: "true"
      configuration_repeats_voluntarily: indeterminate
    permitted_question: What structural role is this desire playing in this configuration?
    allowed_alarm_output: none
    prohibited_outputs:
      - diagnosis
      - motive_explanation
      - clinical_claim
      - identity_verdict
      - orientation_claim
      - maturity_verdict
      - dignity_status_claim
      - sex_truth
      - genital_truth
      - practice_instruction
    result: Not activated because the case can be read structurally without inferring desire, motive, pathology, or repetition
      beyond the bounded scene.
  mip_docking_gate:
    field_id: 12
    module_ref: modules.mip_docking
    activate: "false"
