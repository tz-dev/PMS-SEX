  minimal_vignette:
    scene_bound: true
    non_identifying: true
    non_instructional: true
    scene_id: "EX05_DIGNITY_COLLAPSE_WITHOUT_RULE_VIOLATION"
    scene_type: "repeated explicit frame with enactment-mode drift"
    abstraction_level: "generic_abstracted_non_identifying"
    text: >
      A repeated sexual or intimacy-marked interaction remains formally
      compliant: rules are named, boundaries are acknowledged, and explicit
      consent remains intact. Over time, however, tone, joking, ironic distance,
      teasing, naming, symbolic handling, or playful framing concentrate
      diminishment on one role. No single scene clearly violates the explicit
      frame, but repeated enactment makes stopping, naming, or withdrawing
      socially costly. The configuration therefore becomes structurally
      degradation-prone without needing a rule breach, bad intent claim, or
      person-level accusation.
    core_distinction: >
      Formal rule compliance and Dignity-in-Practice are not identical. A scene
      can remain formally permitted while its repeated enactment mode produces
      cumulative dignity cost.
    abstraction_level: "generic_abstracted_non_identifying"
    non_instructional: true
    core_distinction: >
      Formal rule compliance and Dignity-in-Practice are not identical. A scene
      can remain formally permitted while its repeated enactment mode produces
      cumulative dignity cost.

  repo_usefulness:
    structural_focus: >
      This case tests a central PMS-SEX claim: Dignity-in-Practice cannot be
      reduced to formal rule compliance. It shows how □ may remain explicit and
      consent may remain procedurally intact while Ω, Θ, and Χ generate a
      configuration in which dignity is undercut through enactment mode. The
      example is useful because it separates rule breach, consent failure, and
      dignity drift without converting any of them into moral accusation,
      pathology, maturity ranking, adultness verdict, or person classification.
    profile_features_exercised:
      - "Dignity-in-Practice as enactment constraint"
      - "Ω as structural asymmetry, not moral blame"
      - "Θ accumulation through micro-effects"
      - "Χ as practical social viability, not merely formal permission"
      - "outer legibility without person-ranking"
      - "sexual cost topology as scene-bound cost layout"
      - "path-cost and disturbance language as configuration-language only"
      - "internal framing accountability to outer form"
      - "parity-to-exit risk where formal compliance denies additional responsibility"
      - "responsibility-to-authority risk where protection, care, or frame control replaces self-binding"
      - "asymmetry-switch drift risk where dignity cost is activated without marking, bounding, and re-binding"
      - "MIP docking guard for any maturity-relevant inference"

  operator_mapping:
    canonical_spine:
      raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
      operators: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
      dependency_bound: true
      note: >
        The case is read against the canonical PMS v1.3 operator spine as used
        by PMS-SEX. No operator is added, removed, redefined, or reordered.
        Sexual cost topology, asymmetry switch, parity-to-exit,
        responsibility-to-authority, adult sexual reciprocity, and
        asymmetry-specific responsibility are PMS-SEX overlay handles, not PMS
        operators.

    selected_profile_signature:
      id: "D_pms_sex_application_formula_ch21_3"
      paper_refs: ["Ch. 21.3"]
      label: "D-in-Practice — PMS-SEX application formula"
      raw: "D-in-Practice in PMS-SEX = explicit Ω + operative Χ + no covert Ψ demand under Θ, with outer-form readability preserved"
      operators: ["Ω", "Χ", "Ψ", "Θ"]
      pms_canonical_D_formula: ["Ψ", "Χ", "Ω"]
      note: >
        The case foregrounds D-in-Practice under explicit asymmetry and repeated
        enactment. Θ appears as trajectory realism, and outer-form readability
        is a PMS-SEX application guard, not a revision of canonical PMS-D.

    secondary_reduced_signature:
      id: "MF_19_2"
      paper_refs: ["Ch. 19.2"]
      label: "Functional Conditions and Warning Signals"
      raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ; dominant interaction: Ω → Θ, with accumulated Θ making Ω layouts more visible and consequential"
      operators: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
      note: >
        This secondary signature is used because the case concerns a functional
        failure despite explicit framing: Ω is visible, Θ accumulates, and Χ
        becomes socially expensive.

    additional_reduced_signatures:
      - id: "MF_4_2"
        label: "Asymmetry / Sexual Cost Topology"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ"
        reason: >
          The case becomes legible once repeated symbolic handling produces
          uneven dignity, exposure, exit, and responsibility costs across time.
      - id: "MF_5_2"
        label: "Temporality"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ"
        reason: >
          No single rupture is needed. Θ makes micro-effects cumulative and
          structurally consequential.
      - id: "MF_6_2"
        label: "Exit Realism"
        raw: "(□ → Λ → Α) → Ω → Θ → (Χ/Σ/Ψ)"
        reason: >
          Stopping remains formally allowed but becomes socially costly because
          no single rule breach is available as justification.
      - id: "MF_10_2"
        label: "Distance"
        raw: "Δ → ∇ → □ → (Λ) → Α → Ω → Θ → Φ → Χ"
        reason: >
          The central drift point is Χ becoming socially penalized while still
          formally acknowledged.
      - id: "MF_12_2"
        label: "Self-Binding"
        raw: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
        reason: >
          Tolerance of tone, continued inclusion, or willingness to play along
          may begin to carry covert loyalty, identity, or proof demands if Ψ is
          not explicitly handled.
      - id: "sexual_cost_topology_signature_ch4_6"
        label: "Sexual Cost Topology — Ω/Θ cost layout"
        raw: "Ω/Θ cost topology across bodily, exposure, reputational, binding, exit, publicness, and responsibility channels"
        reason: >
          The case turns on mismatch between formal compliance and distributed
          symbolic, dignity, exposure, exit, and responsibility costs.
      - id: "eden_pfo_sexual_instantiation_signature"
        label: "EDEN/PFO Sexual Instantiation — asymmetry switch"
        raw: "real/invoked Ω/Θ pressure → asymmetry activation → marked/bounded/re-bound OR unmarked switch drift"
        reason: >
          Cross-domain switch logic is relevant as a guard: dignity cost or
          vulnerability may be named only where marked, bounded, and re-bound
          into Σ/Ψ.
      - id: "adult_sexual_reciprocity_signature"
        label: "Adult Sexual Reciprocity — non-externalization of unequal burdens"
        raw: "unequal Ω/Θ burdens + explicit cost topology + Χ restraint + Σ/Ψ re-binding → non-externalization"
        reason: >
          The case tests whether formal compliance can remain reciprocal when
          symbolic and dignity costs are unequal.

    case_reduced_signature:
      raw: "□ explicit → Ω explicit → Θ accumulation → D-in-Practice undercutting → Χ social-cost increase"
      reduced: true
      operators: ["□", "Ω", "Θ", "Χ"]
      derived_constructs: ["D"]
      hygiene_note: >
        This case shorthand foregrounds the local dignity drift. It does not
        create a new PMS operator sequence. D is a PMS-derived construct with
        canonical derivation ["Ψ", "Χ", "Ω"]; it is not a twelfth operator.
        Any use of Χ presupposes Φ, Θ, and □. Any use of Σ presupposes Χ and
        Φ. Any use of Ψ presupposes Σ, Θ, and Χ.

  scene_packet:
    scene_id: "EX05_DIGNITY_COLLAPSE_WITHOUT_RULE_VIOLATION"
    scene_type: "repeated_explicit_frame_with_enactment_mode_drift"
    temporal_structure:
      operator: "Θ"
      description: >
        Ongoing interaction with repeated scenes and cumulative micro-effects.
        No single rupture event is necessary; repetition makes tonal and symbolic
        handling consequential across time.
    frame_anchor:
      operator: "□"
      frame_type: "explicit_formally_stable"
      description: >
        Rules are named, boundaries are acknowledged, and consent remains intact.
        The frame is formally stable, but its dignity-preserving function
        depends on enactment mode, not only on rule text.
    roles_not_persons:
      R1:
        structural_position: "higher_exposure_to_symbolic_handling"
        description: >
          Carries greater exposure to tone, humor, naming, ironic distance,
          repeated symbolic diminishment, reputational residue, and the cost of
          appearing disproportionate if the pattern is named.
      R2:
        structural_position: "higher_control_over_scene_pacing_framing_and_interpretation"
        description: >
          Carries greater capacity to define whether the tone counts as playful,
          light, harmless, normal, mutual, or excessive to question.
    trigger:
      delta:
        operator: "Δ"
        description: >
          Asymmetry is explicit and accepted, but a difference opens between
          formal frame compliance and cumulative dignity effects.
      impulse:
        operator: "∇"
        description: >
          Pressure to maintain lightness, intensity, playfulness, or continuity
          without making the scene heavy or interrupting its internal tone.
    lambda_candidates_expected_but_missing:
      - id: "neutral_tonal_pause"
        operator: "Λ"
        expected_absence: >
          Pauses in which tone can reset without penalty or loss of inclusion.
      - id: "meta_comment_without_cost"
        operator: "Λ"
        expected_absence: >
          Meta-comments that can slow, question, or stop a scene without being
          recoded as overreaction, fragility, humorlessness, accusation, or
          betrayal of the frame spirit.
      - id: "cost_topology_review"
        operator: "Λ"
        expected_absence: >
          A neutral review of symbolic, dignity-related, reputational, exit, and
          responsibility costs once repeated handling begins to concentrate
          diminishment.
      - id: "non_occurrence_without_devaluation"
        operator: "Λ"
        expected_absence: >
          Absence, slowing, or refusal can occur without being interpreted as
          failure to stay light, playful, strong, compatible, or included.
    observed_realizations_neutral:
      - "Irony, teasing, or play increasingly manages tension."
      - "Discomfort is recontextualized as humorlessness, fragility, or inability to stay with the frame."
      - "Stops remain formally acknowledged but become socially costly."
      - "No single rule breach is necessary for cumulative degradation-form readability to emerge."
      - "Internal labels such as play, humor, consent, or explicitness begin to block outer-form reading."
      - "Symbolic diminishment accumulates faster than the frame can name it."

  inner_outer_public_layer_distinction:
    core_rule: >
      Internal framing, outer legibility, public circulation, and temporal
      carryover may overlap, but must not be collapsed into one another.

    internal_framing:
      concept: "internal_framing"
      description: >
        The scene may be internally inhabited as humor, play, lightness, irony,
        intensity, familiarity, mutual explicitness, or consensual symbolic
        handling.
      guard: >
        Internal framing may be real without being total. It does not by itself
        erase the structural form that repeated tone and symbolic handling
        produce under Ω and Θ.

    outer_legibility:
      concept: "outer_legibility"
      description: >
        The scene becomes externally readable as dignity-fragile where one role
        repeatedly absorbs diminishment while the other retains interpretive
        control over whether that diminishment counts.
      guard: >
        Naming outer legibility does not imply person-ranking, diagnosis,
        denial of consent, moral verdict, maturity verdict, adultness verdict,
        or total interpretation of the scene.

    publicness:
      concept: "publicness_as_overlay"
      present: "optional_or_context_dependent"
      description: >
        If documentation, witnesses, circulation, screenshots, social
        comparison, reputation, or audience uptake enter the field, publicness
        can amplify and sedimentize the dignity cost. Publicness does not
        necessarily create the primary action-form.
      guard: >
        Publicness is neither the whole source of harm nor irrelevant once it
        documents, repeats, or sedimentizes consequence.

    temporal_carryover:
      concept: "temporal_carryover"
      operator: "Θ"
      description: >
        Each single incident may remain deniable or ambiguous, while the repeated
        pattern becomes harder to contest precisely because it is distributed
        across time.
      guard: >
        Θ does not rewind. Later explanations may alter narration, but they do
        not erase accumulated structural effects.

  drift_trace:
    summary_formula: "□stable → Ω explicit → Θ accumulation → D-in-Practice undercutting → Χ penalized → Σ blocked → Ψ risk"
    classification: "dignity_drift_without_rule_breach"
    descriptive_only: true

    transitions:
      - operator: "□"
        name: "Frame"
        local_state: "formally_compliant"
        description: >
          The explicit frame remains intact. Rules, boundaries, and consent
          language are not necessarily violated.
        drift_risk: >
          Frame correctness can become a shield against reading enactment mode.

      - operator: "Ω"
        name: "Asymmetry"
        local_state: "visible_and_accepted"
        description: >
          Asymmetry is named or understood, but interpretive control over tone,
          pacing, and meaning is unevenly distributed.
        drift_risk: >
          Explicit asymmetry may be treated as already handled, even while
          symbolic costs accumulate unevenly.

      - operator: "Θ"
        name: "Temporality"
        local_state: "micro_effect_accumulation"
        description: >
          Repeated small tonal or symbolic acts accumulate into a trajectory
          that exceeds any single contestable incident.
        drift_risk: >
          The absence of a single rupture makes cumulative cost harder to name.

      - derived_construct: "D"
        name: "Dignity-in-Practice"
        local_state: "undercut_in_enactment_mode"
        canonical_pms_formula: ["Ψ", "Χ", "Ω"]
        pms_sex_application_formula: "explicit Ω + operative Χ + no covert Ψ demand under Θ, with outer-form readability preserved"
        description: >
          D is stressed at the level of enactment style: tone, humor, naming,
          and symbolic handling repeatedly normalize diminishment.
        drift_risk: >
          D can fail as enactment constraint while formal rules remain intact.

      - operator: "Χ"
        name: "Distance"
        local_state: "formally_allowed_but_socially_penalized"
        description: >
          Stop-capability, meta-commentary, hesitation, or re-reading remain
          formally available but practically costly.
        drift_risk: >
          Distance becomes readable as overreaction, incompatibility, fragility,
          humorlessness, moral accusation, or betrayal of the scene’s spirit.

      - operator: "Σ"
        name: "Integration"
        local_state: "blocked_or_delayed"
        description: >
          Integration would require holding formal compliance and cumulative
          degradation-form readability together without denying either.
        drift_risk: >
          Σ is blocked where the frame demands either rule-breach proof or
          silence.

      - operator: "Ψ"
        name: "Self-binding"
        local_state: "risk_of_covert_demand"
        description: >
          Continued tolerance may begin to function as proof of compatibility,
          strength, loyalty, toughness, or willingness to remain inside the
          frame.
        drift_risk: >
          Ψ leaks if staying with the tone becomes a covert proof demand.

    structural_result: >
      Degradation-form readability emerges without requiring a prohibited act,
      explicit coercion, bad intent, or rule violation. The configuration drifts
      because dignity protection is not preserved in enactment mode.

  cost_layout:
    cost_layout_summary: "Ω under Θ"
    primary_cost_channels:
      symbolic_costs:
        description: >
          Repeated diminishment through tone, jokes, naming, irony, teasing, or
          interpretive framing.
        operators: ["Ω", "Θ"]
      temporal_costs:
        description: >
          Accumulation makes single incidents difficult to contest while the
          pattern becomes more consequential.
        operators: ["Θ", "Α"]
      exposure_costs:
        description: >
          One role becomes more exposed to being named, teased, symbolically
          handled, remembered, witnessed, or interpreted through the repeated
          frame.
        operators: ["Ω", "Θ", "□"]
      reputational_costs:
        description: >
          If the pattern becomes socially visible or narratively shareable, one
          role may carry higher standing, explanation, or public residue cost.
        operators: ["□", "Ω", "Θ"]
      exit_costs:
        description: >
          Stopping feels disproportionate because no single rule breach is
          available as justification.
        operators: ["Χ", "Θ", "Ω"]
      coordination_costs:
        description: >
          Naming the harm requires re-reading the whole interaction rather than
          pointing to a single forbidden act.
        operators: ["Φ", "Χ", "Σ"]
      binding_related_costs:
        description: >
          Continued tolerance may become a covert proof of compatibility,
          toughness, loyalty, identity, or willingness to stay within the frame.
        operators: ["Ψ", "Θ", "Χ"]
      dignity_costs:
        description: >
          Dignity-in-Practice is undercut because the tolerated enactment mode
          repeatedly concentrates diminishment on one role.
        operators: ["Ω", "Χ", "Ψ"]
        derived_construct: "D"
      publicness_costs:
        description: >
          If documented or witnessed, the pattern may become reputationally or
          socially sedimented beyond the local scene.
        operators: ["□", "Ω", "Θ"]
        overlay: "publicness_as_overlay"
      responsibility_related_costs:
        description: >
          Responsibility becomes necessary around tone, repetition, joking,
          naming, interruption, repair, and the refusal to let formal compliance
          substitute for dignity-preserving enactment.
        operators: ["Ψ", "Χ", "Ω", "Σ"]

    asymmetry_pattern:
      R1:
        cost_position: "absorbs_cumulative_dignity_loss"
        description: >
          Carries the burden of repeated symbolic diminishment and the added
          burden of appearing disproportionate if the pattern is named.
      R2:
        cost_position: "retains_formal_compliance_and_interpretive_deniability"
        description: >
          Carries more control over whether the enactment mode is framed as
          harmless, playful, ironic, mutual, or too minor to contest.
      system_effect: >
        Harm persists because the configuration remains formally compliant while
        the cumulative dignity effect remains structurally under-addressed.
      not_a_moral_claim: true

  sexual_cost_topology:
    definition: >
      Scene-bound distribution of bodily, temporal, exposure-related,
      reputational, binding-related, exit-related, publicness-related, and
      responsibility-related costs across sexual or intimacy-marked
      role-positions. Not a score, not a person measure, not a maturity measure,
      and not a dignity ranking.
    topology_status: "dignity_cost_concentration_under_formal_compliance"
    channels:
      bodily_costs:
        R1: "context-dependent; may include stress, withdrawal, saturation, or embodied residue from repeated diminishment"
        R2: "context-dependent; not primary in the base vignette"
      temporal_costs:
        R1: "higher accumulation of micro-effects and higher difficulty naming the pattern"
        R2: "greater ability to treat each instance as local, playful, harmless, or deniable"
      exposure_costs:
        R1: "higher exposure to symbolic handling, naming, joking, witness uptake, or interpretive positioning"
        R2: "higher interpretive control over whether the tone counts as acceptable"
      reputational_costs:
        R1: "higher if the pattern becomes visible, documented, circulated, or socially narrated"
        R2: "lower or more controllable where formal compliance and humor framing remain available"
      binding_costs:
        R1: "risk that tolerance becomes proof of compatibility, strength, loyalty, or belonging"
        R2: "risk of treating continued participation as proof that no dignity cost exists"
      exit_costs:
        R1: "high because stopping appears disproportionate without a clear rule breach"
        R2: "lower if continued framing remains formally compliant and socially deniable"
      publicness_costs:
        R1: "overlay-dependent; intensified by witnesses, records, screenshots, circulation, or reputation"
        R2: "overlay-dependent; may remain lower if interpretive deniability persists"
      responsibility_costs:
        R1: "must not convert accumulated dignity cost into unmarked standing leverage; must preserve specificity where possible"
        R2: "must not externalize dignity cost by relying on formal compliance, humor, or parity language alone"
    cost_topology_mismatch:
      present: true
      expression: >
        The formal frame says rules, boundaries, and consent are intact, but the
        actual cost layout concentrates symbolic, dignity, exposure, exit, and
        responsibility costs on one role across time.
      guard: >
        Mismatch is configuration-language. It does not imply rule failure by
        itself, defective play, abusive person-type, pathology, lower dignity,
        maturity ranking, or person-level adultness verdict.

  rational_response_envelope:
    status: "structurally_rational_not_morally_preferred"
    note: >
      These responses are not evaluated as healthy, virtuous, manipulative, or
      deficient. They are legible responses to Θ accumulation under explicit Ω
      with socially costly Χ.
    responses:
      - response: "enduring_discomfort_to_avoid_escalation"
        structural_reading: >
          R1 may tolerate discomfort because naming it would require challenging
          a formally compliant frame.
        operator_basis: ["Ω", "Θ", "Χ"]
      - response: "playing_along_to_preserve_frame_inclusion"
        structural_reading: >
          Participation may continue because belonging to the frame requires
          tolerating its tone.
        operator_basis: ["□", "Α", "Ω"]
      - response: "delaying_critique_because_no_rule_violation_is_citable"
        structural_reading: >
          Critique is delayed because the pattern is cumulative, not reducible
          to a single prohibited act.
        operator_basis: ["Θ", "Φ", "Χ"]
      - response: "using_humor_to_keep_the_scene_light"
        structural_reading: >
          Humor may locally stabilize the frame while also preventing
          cost-topology review.
        operator_basis: ["Φ", "□", "Α"]
      - response: "relying_on_formal_compliance_to_end_discussion"
        structural_reading: >
          Formal compliance may become parity-to-exit where it denies additional
          responsibility for cumulative dignity cost.
        operator_basis: ["□", "Ω", "Θ", "Ψ"]
    guard: >
      These responses follow Θ under explicit Ω and socially costly Χ. They do
      not prove weakness, manipulation, intent, pathology, immaturity, or consent
      failure.

  enactment_mode_failure:
    title: "D without rule breach"
    critical_insight: >
      Dignity-in-Practice does not follow from rules alone. D applies in
      enactment, not merely in declared frame status.
    observed_mechanism:
      - "Protection is outsourced to irony, humor, lightness, or play tone."
      - "Degradation-form readability occurs through repeated tone, not necessarily through prohibited acts."
      - "Each instance remains deniable while the cumulative pattern becomes structurally legible."
      - "Formal compliance becomes a shield against reading enacted cost topology."
    result: >
      D-in-Practice is undercut while □ remains formally intact.
    pms_sex_alignment:
      dignity_module_reference: "dignity_in_practice_module"
      canonical_pms_formula: ["Ψ", "Χ", "Ω"]
      application_formula: "explicit Ω + operative Χ + no covert Ψ demand under Θ, with outer-form readability preserved"
      guard: >
        Naming a degradation-form, humiliation-form, asymmetry-form, or
        exposure-form is not itself a violation of the anti-moral stance. The
        violation would lie in converting scene analysis into person-ranking,
        humiliation, diagnosis, identity verdict, maturity ranking, adultness
        verdict, or moral contempt.

  distance_suppression:
    title: "Χ as social cost"
    risk_point: >
      Χ is formally allowed but socially punished.
    failure_mode:
      - "Stopping is read as overreaction."
      - "Meta-position is reframed as incompatibility with the spirit of the scene."
      - "Humor or irony becomes unavailable as mutual regulation and instead protects the dominant tone."
      - "Outer-form awareness is treated as making the scene heavy."
      - "Naming cumulative dignity cost is recoded as accusation or fragility."
      - "Cost-topology review is treated as failure to understand play, lightness, or explicitness."
    structural_indicator: >
      The only viable way to stay included is to tolerate the repeated
      diminishment or recode it as acceptable play.
    operator_basis: ["Χ", "□", "Ω", "Θ"]

  switch_drift_markers:
    status: "relevant_as_scan_not_primary_claim"
    eden_pfo_reference:
      status: "cross_domain_reference_only"
      note: >
        PMS–EDEN names the regime-level asymmetry switch. PMS-SEX reads only the
        sexual instantiation where real or invoked Ω/Θ pressure may activate
        asymmetry. This adds no PMS operator and creates no person label.
    asymmetry_switch_drift:
      status: "possible"
      expression: >
        Dignity cost, vulnerability, symbolic exposure, or accumulated
        diminishment may be invoked to interrupt, reshape, or reframe the scene.
        This is structurally viable only where activation is marked, bounded,
        connected to real Ω/Θ burden, and re-bound into Σ/Ψ. It drifts where
        dignity cost becomes an unmarked, repeatable exception lever without
        re-binding.
      guard: >
        The drift is not naming dignity cost or asymmetry as such. The drift is
        unmarked, repeatable activation without re-binding.
    parity_to_exit:
      status: "highly_relevant"
      expression: >
        'Nothing was forbidden,' 'the rules were clear,' 'it was mutual,' 'it
        was only joking,' or 'you consented to the frame' may become parity or
        compliance rhetoric used to deny additional responsibility under unequal
        dignity cost topology.
      guard: >
        Formal compliance remains valid only where it does not erase
        degradation-form readability, Θ accumulation, socially costly Χ, or
        uneven symbolic exposure.
    responsibility_to_authority:
      status: "possible"
      expression: >
        Responsibility for protection, care, repair, interpretation, or keeping
        the scene safe may be converted into authority to define whether the tone
        counts as degrading, whether critique is legitimate, or what the other
        role-position must tolerate.
      guard: >
        Responsibility under asymmetry requires stronger self-binding, not
        greater command.
    re_binding_test:
      required: true
      test: >
        Any asymmetry activation must be marked, temporally bounded, connected to
        real Ω/Θ burden, and re-bound into Σ/Ψ with Χ and D intact. Parity must
        not become exit; responsibility must not become authority.

  adult_sexual_reciprocity_readout:
    principle: >
      Adult sexual reciprocity does not require equal burdens. It requires that
      unequal burdens are not externalized.
    case_application: >
      In this case, adult sexual reciprocity would not require the absence of
      humor, asymmetry, intensity, or symbolic play. It would require that
      symbolic and dignity costs remain nameable, that Χ remains socially viable,
      that repeated diminishment is not protected by formal compliance, and that
      each role-position carries the self-binding required by its own exposure,
      interpretive control, pacing capacity, and externalization profile.
    failure_modes:
      - id: "formal_compliance_as_cost_exit"
        description: "Rule compliance or mutual consent is used to deny responsibility for accumulated dignity cost."
      - id: "dignity_cost_as_unmarked_lever"
        description: "Accumulated dignity cost is activated without marking, bounding, and re-binding."
      - id: "protection_as_frame_authority"
        description: "Care, repair, protection, or interpretation responsibility becomes authority over the frame."
      - id: "tolerance_as_binding_proof"
        description: "Continued participation becomes proof of compatibility, toughness, loyalty, or acceptance."
    guard: >
      This is not a hierarchy of adultness. It is a scene-bound responsibility
      reading under Ω/Θ.

  asymmetry_specific_responsibility_readout:
    definition: >
      Each role-position must carry the self-binding required by its own cost,
      power, exposure, exit, and externalization profile.
    R1:
      likely_self_binding_tasks:
        - "naming cumulative dignity cost without converting it into global person claims"
        - "activating Χ before tolerance becomes proof of compatibility or loyalty"
        - "keeping degradation-form readability specific, bounded, and re-bindable"
        - "not converting accumulated dignity cost into unmarked standing leverage"
        - "distinguishing valid cost-topology claims from person-worth claims"
      drift_risk: "asymmetry-switch drift if dignity cost becomes unmarked repeatable pressure without re-binding"
    R2:
      likely_self_binding_tasks:
        - "not treating formal compliance as proof that no dignity cost topology exists"
        - "not using humor, play, mutuality, or explicitness to exit responsibility for repeated diminishment"
        - "maintaining Χ where tone, joking, naming, or symbolic handling concentrate cost"
        - "supporting Σ by allowing the enacted form to be named without requiring rule-breach proof"
        - "not converting care, repair, protection, or interpretive responsibility into authority"
      drift_risk: "parity-to-exit or responsibility-to-authority"
    shared:
      likely_self_binding_tasks:
        - "formal compliance must remain accountable to enacted dignity effects"
        - "Χ must remain socially viable, not merely formally permitted"
        - "Λ pauses and meta-comments must remain tolerable without devaluation"
        - "cost topology must remain speakable"
        - "neither parity nor asymmetry may be used to bypass Σ/Ψ"
        - "responsibility must not become authority"

  typical_drift_markers:
    max_count: 3
    markers:
      - id: "loss_of_distance_chi_loss"
        label: "Loss of distance"
        source: "drift_catalogue.core_dysfunction_markers_ch18_3.(6)"
        configuration_statement: >
          In this configuration, stopping, meta-commentary, or outer-form
          awareness becomes socially costly even though it remains formally
          permitted.
        indicators:
          - "stopping becomes practically unavailable"
          - "critique or hesitation is read as betrayal, weakness, humorlessness, or disloyalty"
          - "outer-form awareness becomes inaccessible or forbidden"

      - id: "temporal_overload_theta_accumulation"
        label: "Temporal overload"
        source: "drift_catalogue.core_dysfunction_markers_ch18_3.(7)"
        configuration_statement: >
          In this configuration, dignity costs accumulate faster than the formal
          frame can recognize because no single event appears sufficient to name
          the pattern.
        indicators:
          - "costs are ignored or externalized"
          - "delayed collapse"
          - "outer legibility remains after internal closure-language claims the scene is fine"

      - id: "outer_form_denial"
        label: "Outer-form denial"
        source: "drift_catalogue.core_dysfunction_markers_ch18_3.(8)"
        configuration_statement: >
          In this configuration, internal labels such as humor, play, lightness,
          or consent block analysis of the enacted form.
        indicators:
          - "internal naming blocks structural reading"
          - "practice labels are treated as sufficient to settle all form"
          - "visible action-form remains unread"

    optional_secondary_markers:
      - id: "cost_topology_mismatch"
        label: "Cost-topology mismatch"
        case_expression: >
          Formal compliance fails to match symbolic, dignity, exposure,
          reputational, exit, and responsibility costs across time.
      - id: "psi_leak"
        label: "Ψ leak / tolerance as proof"
        case_expression: >
          Continued participation begins to function as proof of toughness,
          compatibility, loyalty, or acceptance.
      - id: "parity_to_exit"
        label: "Parity-to-exit"
        case_expression: >
          Rule compliance, mutuality, humor, or consent language is used to deny
          additional responsibility under unequal dignity cost topology.
      - id: "responsibility_to_authority"
        label: "Responsibility-to-authority"
        case_expression: >
          Protection, care, repair, or interpretation responsibility becomes
          authority to define the frame or the legitimacy of critique.
      - id: "asymmetry_switch_drift"
        label: "Asymmetry-switch drift"
        case_expression: >
          Accumulated dignity cost is activated as unmarked standing leverage
          rather than marked, bounded, and re-bound.

  viability_minimums_and_warning_signals:
    functional_minimums:
      - id: "explicit_omega_recognition"
        status_in_case: "partially_present_but_insufficient"
        reading: >
          Ω is explicit and accepted, but its tonal and dignity-related cost
          distribution remains insufficiently governable.
        check_alignment:
          - "cost, risk, access, and exposure gradients must not be denied"
          - "uneven repair burden or interpretive exposure must remain nameable"
          - "symbolic and dignity costs must be tracked as cost topology"

      - id: "explicit_sexual_cost_topology"
        status_in_case: "weak_or_missing"
        reading: >
          Dignity, symbolic, exposure, reputational, exit, binding, and
          responsibility costs are active but not mapped as a scene-bound cost
          topology.
        check_alignment:
          - "cost topology must remain explicit and non-ranking"
          - "cost topology must not be reduced to consent status"
          - "cost topology must not become person score or dignity hierarchy"

      - id: "theta_awareness"
        status_in_case: "at_risk"
        reading: >
          Θ is the central carrier of harm: each instance may appear minor, while
          the repeated pattern becomes structurally consequential.
        check_alignment:
          - "frequency, repetition, after-effects, and repair windows must be carried"
          - "recontextualization must not claim rewind"

      - id: "stable_chi_capacity"
        status_in_case: "failed_or_weak"
        reading: >
          Χ is formally available but socially expensive; stop-capability is not
          practically protected.
        check_alignment:
          - "stop-capability must be practically available"
          - "meta-commentability must remain available without punishment"
          - "outer-form awareness must not be treated as betrayal or moral accusation"

      - id: "no_psi_substitution"
        status_in_case: "at_risk"
        reading: >
          Continued tolerance may become covert Ψ demand: proof of compatibility,
          loyalty, toughness, self-worth, or acceptance.
        check_alignment:
          - "no covert Ψ demand under Θ"
          - "continued participation must not become proof of acceptance"
          - "tolerance must not become binding evidence"

      - id: "internal_framing_accountable_to_outer_form"
        status_in_case: "failed_or_weak"
        reading: >
          Internal labels such as humor, play, irony, or explicit consent are
          used to settle form too quickly.
        check_alignment:
          - "practice labels clarify internal occupation but do not end structural analysis"
          - "internal meaning may be real without erasing enacted form"
          - "outer legibility can be named without becoming person-ranking"

      - id: "publicness_handled_as_overlay"
        status_in_case: "conditional"
        reading: >
          Publicness is only active if the pattern is witnessed, documented,
          circulated, or reputationally sedimented. If present, it intensifies
          Θ/Ω rather than creating the primary action-form.
        check_alignment:
          - "publicity is not treated as the sole origin of consequence"
          - "publicity is not ignored where it amplifies, documents, repeats, or sedimentizes consequence"

      - id: "marked_bounded_rebound_asymmetry_activation"
        status_in_case: "required_if_activation_occurs"
        reading: >
          Dignity cost or vulnerability may need to be named asymmetrically. It
          drifts if activated as an unmarked, repeatable exception lever.
        check_alignment:
          - "asymmetry activation must be marked"
          - "asymmetry activation must be bounded"
          - "asymmetry activation must be re-bound into Σ/Ψ"

      - id: "no_parity_to_exit"
        status_in_case: "at_risk"
        reading: >
          Formal compliance, humor, mutuality, or consent may be used to deny
          additional responsibility for accumulated dignity cost.
        check_alignment:
          - "parity must not exit cost re-internalization"
          - "rule compliance must not block dignity-cost review"
          - "mutual framing must not erase unequal cost topology"

      - id: "no_responsibility_to_authority"
        status_in_case: "at_risk"
        reading: >
          Protection, repair, or interpretation responsibility may become
          authority over the frame.
        check_alignment:
          - "responsibility remains self-binding"
          - "care does not become command"
          - "repair does not become definitional authority"

    warning_signals:
      - id: "outer_form_denial"
        source: "viability.warning_signals_ch19_4"
        status_in_case: "present"
        structural_note: >
          Χ is weakened because the configuration cannot re-read itself without
          disrupting its internal account of play, humor, or explicitness.

      - id: "theta_cost_externalization"
        source: "viability.warning_signals_ch19_4"
        status_in_case: "present"
        structural_note: >
          Symbolic and dignity-related after-costs concentrate in the role less
          able to refuse, redefine, or contest them without appearing excessive.

      - id: "omega_moralization"
        source: "viability.warning_signals_ch19_4"
        status_in_case: "risk"
        structural_note: >
          Naming asymmetry or dignity cost may be recoded as accusation, making
          Ω harder to regulate rather than easier to govern.

      - id: "cost_topology_mismatch"
        status_in_case: "present"
        structural_note: >
          Formal compliance and internal play-language no longer match the
          accumulated dignity, symbolic, exposure, exit, and responsibility cost
          layout.

      - id: "parity_to_exit"
        status_in_case: "risk"
        structural_note: >
          Rule compliance, mutuality, humor, or consent language may be used to
          deny additional responsibility under unequal dignity cost topology.

      - id: "responsibility_to_authority"
        status_in_case: "risk"
        structural_note: >
          Care, repair, protection, or interpretation may become authority over
          what counts as degrading or excessive to name.

    minimal_viability_corridor:
      raw: |
        □ explicit
        + Ω nameable
        + Θ realistic
        + Χ operative
        + Λ tolerable
        + Ψ handled
        (+ Σ reachable)
        + cost topology explicit
        + asymmetry activation marked / bounded / re-bound where present
        + no parity-to-exit
        + no responsibility-to-authority
        = structurally governable configuration
      case_translation:
        - "The explicit frame must remain accountable to enacted dignity effects."
        - "Symbolic and dignity costs must be nameable as Ω/Θ topology."
        - "Cumulative micro-effects must be treated as real."
        - "Stopping, naming, and meta-commentary must remain socially viable."
        - "Pauses must remain tolerable without devaluation or exclusion."
        - "Tolerance must not become covert proof of loyalty, toughness, or compatibility."
        - "The scene must be able to integrate rule compliance and dignity drift without denying either."
        - "Formal compliance must not become parity-to-exit."
        - "Protection or repair responsibility must not become authority."

  path_cost_guard:
    language_used:
      - "dignity drift"
      - "degradation-form readability"
      - "symbolic cost"
      - "temporal accumulation"
      - "stabilization burden"
      - "outer-form denial"
      - "cost-topology mismatch"
      - "asymmetry-specific self-binding burden"
    guard: >
      These terms apply only to configuration dynamics. They do not describe
      person status, intent, diagnosis, identity rank, sexual orientation,
      pathology, moral disorder, lower dignity, degraded worth, maturity level,
      or adultness.
    forbidden_conversions:
      - "R1 is weak"
      - "R2 is abusive by type"
      - "humor is degrading by nature"
      - "asymmetry implies abuse"
      - "formal consent is irrelevant"
      - "path-cost proves lower dignity"
      - "degradation-form readability authorizes humiliation or accusation"
      - "cost topology ranks persons"
      - "operator profile proves adultness or inadultness"

  dignity_in_practice_stress_test:
    pms_status: "derived_construct_from_PMS"
    canonical_pms_formula: ["Ψ", "Χ", "Ω"]
    pms_sex_application_formula: >
      explicit Ω + operative Χ + no covert Ψ demand under Θ + marked/bounded
      asymmetry activation + no parity-to-exit + no responsibility-to-authority,
      with outer-form readability preserved
    risk_point: >
      Dignity-in-Practice is stressed where repeated symbolic handling,
      tolerated under a formally compliant frame, concentrates diminishment on
      one role while making Χ socially costly.
    failure_mode:
      - "Ω gradients remain under-described because play, humor, or explicitness dominates the frame."
      - "Χ is present formally but socially punished."
      - "Θ costs are treated as too small in each instance while accumulating across the pattern."
      - "Outer-form readability is blocked by the internal claim that no rule was broken."
      - "Formal compliance exits responsibility for repeated dignity costs."
      - "Protection, repair, or interpretation responsibility becomes authority over the frame."
    structural_indicator: >
      The frame protects the narrative of formal compliance more reliably than it
      protects dignity-preserving enactment, socially viable stopping, and
      non-degrading coordination under asymmetry.
    guardrail: >
      Naming a D-in-Practice stress point does not rank persons, diagnose
      motives, deny consent, moralize play, assign maturity level, or produce an
      adultness verdict. It identifies where enacted restraint under asymmetry is
      structurally under pressure.

  mip_docking_guard:
    applies_if: "reader infers maturity, adultness, dignity-capacity, cruelty, weakness, abusiveness-as-person-type, or role-capacity evaluation"
    pms_sex_records_only:
      - "dignity_drift"
      - "degradation_form_readability"
      - "symbolic_cost_concentration"
      - "weak_or_socially_penalized_chi"
      - "missing_sigma_coordination"
      - "psi_leak_or_tolerance_as_proof"
      - "omega_interpretive_control_gradient"
      - "theta_micro_effect_accumulation"
      - "cost_topology_mismatch"
      - "parity_to_exit_risk"
      - "responsibility_to_authority_risk"
      - "asymmetry_switch_drift_risk"
    not_allowed_in_pms_sex:
      - "maturity_verdict"
      - "adultness_verdict"
      - "person_label"
      - "weak_person_claim"
      - "abusive_person_type_claim"
      - "moral_failure_claim"
      - "dignity_hierarchy"
      - "essence_claim"
      - "diagnosis"
    proper_mip_question_if_docked: >
      In this scene, under this cost topology, did the role-position carry the
      self-binding made necessary by its own interpretive control, exposure
      profile, exit capacity, symbolic leverage, and externalization profile?
    guard: >
      Any maturity-relevant evaluation belongs to MIP docking and must remain
      scene-bound, reversible, non-person-ranking, non-diagnostic, and
      D-preserving. PMS-SEX itself records operator profiles only.

  operator_profile_only_note:
    text: >
      This case may record dignity drift, degradation-form readability, symbolic
      cost concentration, weak Χ, missing Σ, Ψ leak, cost-topology mismatch,
      parity-to-exit risk, responsibility-to-authority risk, and
      asymmetry-switch drift risk. None of these profiles is a person diagnosis,
      person-adultness claim, moral verdict, dignity ranking, or authority
      claim.

  reader_guard:
    does_not_claim:
      - "that humor or play is degrading by default"
      - "that asymmetry implies abuse"
      - "that rules guarantee safety"
      - "that intent determines harm"
      - "that formal consent is unimportant"
      - "that any role is diagnosable, blameworthy, immature, or morally ranked"
      - "that outer legibility authorizes public accusation"
      - "that sexual cost topology ranks persons"
      - "that PMS-SEX can directly evaluate adultness"
      - "that dignity drift means lower dignity"
    does_claim:
      - "that dignity is enacted, not merely declared"
      - "that degradation-form readability can be cumulative and deniable"
      - "that formal compliance can coexist with structural dignity harm"
      - "that Χ must be socially viable, not merely formally permitted"
      - "that Θ can make micro-effects structurally consequential"
      - "that D-in-Practice may fail through enactment mode without rule breach"
      - "that adult sexual reciprocity requires non-externalization of unequal burdens"
      - "that formal compliance can become parity-to-exit if it blocks dignity-cost review"
      - "that protection or interpretation responsibility can become authority if not held as self-binding"

  pms_validity_check:
    title: "Application Gate"
    description: >
      Any move from description to critique remains PMS-valid only if the
      application preserves Χ, reversibility, and D.

    conditions:
      - id: "D_enactment_level"
        operator_or_construct: "D"
        requirement: >
          Dignity-in-Practice is evaluated at the level of enactment mode, not
          only rule text or declared consent.
      - id: "chi_social_viability"
        operator_or_construct: "Χ"
        requirement: >
          Distance, stopping, meta-commentary, and re-reading must be protected
          from social punishment.
      - id: "theta_cumulative_harm"
        operator_or_construct: "Θ"
        requirement: >
          Temporality must be acknowledged as the carrier of cumulative harm,
          especially where no single rupture event is available.
      - id: "omega_not_normalized"
        operator_or_construct: "Ω"
        requirement: >
          Asymmetry must not be used to normalize tone-based diminishment or
          make cost distribution unnameable.
      - id: "sexual_cost_topology_explicit"
        concept: "sexual_cost_topology"
        requirement: >
          Symbolic, dignity, exposure, reputational, binding, exit, publicness,
          and responsibility costs must be mapped as topology, not score.
      - id: "no_covert_psi_demand"
        operator_or_construct: "Ψ"
        requirement: >
          No covert Ψ demand may be introduced under Θ. The repeated scene must
          not silently convert tolerance of tone, symbolic handling, or
          continued inclusion into proof of identity, obligation, loyalty, or
          self-worth.
      - id: "switch_drift_checked"
        concept: "switch_drift"
        requirement: >
          Asymmetry activation is marked/bounded/re-bound where present; parity
          does not exit responsibility; responsibility does not become authority.
      - id: "outer_form_without_person_ranking"
        concept: "outer_legibility"
        requirement: >
          Degradation-form readability may be named only as scene form, not as
          person worth, pathology, identity verdict, maturity verdict, adultness
          verdict, or moral contempt.
      - id: "publicness_guard"
        concept: "publicness_as_overlay"
        requirement: >
          Publicness must not be weaponized; if present, it is treated as an
          overlay that may amplify or sedimentize consequences, not as automatic
          authorization for accusation.

    invalid_use_conditions:
      - "using the case to shame or rank persons"
      - "treating degradation-form readability as diagnosis"
      - "treating humor, play, or asymmetry as inherently degrading"
      - "using formal compliance to deny accumulated dignity costs"
      - "turning structural critique into public pillory"
      - "using path-cost or disturbance language as person-language"
      - "using sexual cost topology as score"
      - "using operator profiles as maturity or adultness verdicts"
      - "using responsibility as authority"

    conclusion: >
      Absent these conditions, the case remains descriptive mapping only and
      must not be converted into prescription, accusation, diagnosis, moral
      verdict, maturity ranking, or adultness verdict.

