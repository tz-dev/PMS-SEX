    internal_outer_public_relation: "divergent"
    internal_framing_result: "Internally, the recurrence remains legible as desire, preference, attraction, or intensity."
    outer_legibility_result: "Externally, the same recurrence is legible as self-undercutting because it erodes responsiveness, novelty, direct otherness, or after-scene governability."
    publicness_result: "No publicness overlay is specified; the main publicness reading is suspended."
    visible_form_totalization_risk: "medium"
    result: "The case depends on distinguishing desire's internal felt authority from the outer and temporal form of repeated condition erosion."
    guardrail: "Internal meaning may be real without erasing outer form; outer legibility may be named without ranking persons."

