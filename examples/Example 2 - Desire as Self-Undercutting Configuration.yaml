          - "Repetition begins to replace renewed scene-readability."
          - "The pattern remains attractive as pattern even while its enabling conditions weaken."
        counter_evidence:
          - "The reading would weaken if each recurrence remained genuinely re-readable, interruptible, and condition-preserving."
        not_a_person_label: true
      - drift_ref: "theta_overload"
        support: "strong"
        operator_basis: ["Θ", "Ω", "Α", "Χ"]
        evidence_basis:
          - "The case sentence directly states that repetition weakens the conditions that made the pattern desirable."
          - "Temporal accumulation is therefore not incidental but constitutive."
        counter_evidence:
