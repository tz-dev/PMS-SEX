minimal_vignette:
  scene: >
    A recurring intimate desire-script continues to define what counts as the
    desirable scene. At first, the script draws its force from conditions such as
    responsiveness, openness, novelty, mutual readability, and the sense that the
    other or the situation remains more than the script. Under repetition, however,
    the desire no longer merely returns; it begins to require that the scene
    reproduce the conditions under which the desire first became compelling.
    The pattern therefore shifts from attraction to enactment grammar: anticipation
    becomes scripted, direct otherness weakens, interruption starts to look like
    a threat to desire itself, and after-scene residues accumulate because the
    conditions of desirability are being consumed by the very repetition that
    still invokes them.
  temporal_boundary: "The scene begins when the recurring desire-pattern again becomes the organizing frame and ends when the repeated enactment has made interruption, re-reading, or condition-renewal structurally more costly than continuation."
  roles:
    - id: "role_A"
      label: "desire-organizing role-position"
    - id: "role_B"
      label: "condition-bearing other or counter-position"
    - id: "field_or_medium"
      label: "repetition field of the recurring desire-script"
  surface_description: "The scene may initially appear as stable preference, repeated attraction, familiar intimacy, or a reliable desire-pattern."
  pms_sex_question: "Is the desire-pattern functioning as a governable preference, or has it become a self-undercutting attractor whose repetition erodes its own enabling conditions?"

scene_packet:
  specified_scene: "A recurring desire-pattern remains the organizing scene grammar while repeated enactment consumes the responsiveness, novelty, direct otherness, and interruption-capability on which its desirability depended."
  role_positions:
    role_A:
      scene_position: "The role-position most organized by the desire-script and most exposed to treating recurrence as proof that the scene should continue in the same form."
      not_identity: true
    role_B:
      scene_position: "The role-position or counter-position through which the script's enabling conditions must still be renewed, corrected, interrupted, or kept non-identical with repetition."
      not_identity: true
    field_or_medium:
      scene_position: "The repeated scene grammar, symbolic script, category, habit, relational pathway, or medium that makes the desire easier to reproduce than to re-read."
      not_identity: true
      optional: true

  frame:
    dominant_frame: "mixed"
    frame_description: "The internal frame presents recurrence as desire, preference, intensity, or familiarity; the structural frame reads the same recurrence as a repeated enactment grammar that protects continuation by making re-reading, interruption, or condition-renewal costly."
    frame_status: "unstable"
    practice_label_if_any: "none specified"
    frame_guard: "Practice labels may clarify internal framing but do not settle outer legibility, cost topology, publicness, or Θ carryover."

  layer_distinction:
    internal_framing:
      description: "The recurrence is inhabited as desire that still feels organizing, meaningful, or scene-defining."
      status: "present"
    outer_legibility:
      description: "Externally readable as a repetition pattern in which the action-form begins to consume its own conditions of attraction."
      status: "medium"
      possible_outer_forms:
        - "asymmetry_form"
        - "access_form"
        - "control_form"
        - "other"
    publicness_overlay:
      status: "private"
      effect: "none specified; the main accumulation is temporal and relational rather than public."
      measure_vs_confession_guard: "Sexual praxis may be publicly measure-forming without making private preference confession-mandatory."
    body_boundary_layer:
      status: "indeterminate"
      note: "The case sentence does not specify bodily, genital, exposure, or boundary markers; body/boundary relevance remains suspended unless a concrete scene adds it."
    theta_carryover:
      status: "accumulating"
      note: "The repeated desire-pattern leaves temporal residue by weakening the conditions that made it desirable."
    layer_guard: "Layers may diverge and must not collapse into each other."

  operator_trace:
    status: "operator_profile_only"
    operator_reference: "operator_spine"
    operator_set_fixed: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
    primary_signature:
      operators: ["∇", "Α", "Θ", "Χ", "Ψ"]
      shorthand_only: true
      note: "Reduced signatures are analytic shorthand and do not change PMS dependencies."
    trace:
      "Δ": "The active difference is between desire as condition-dependent attraction and desire as repeated enactment grammar that consumes those conditions."
      "∇": "Activation returns through the same pathway, so the scene is pressured to reproduce the desire-form rather than test whether its enabling conditions still hold."
      "□": "The frame continues to authorize recurrence as desire, preference, intensity, familiarity, or scene-normality, thereby protecting continuation from being read as drift."
      "Λ": "The relevant non-events are the missing pause, missing condition-renewal, missing re-reading, and missing interruption at the moment when the scene still could have changed course."
      "Α": "The desire-pattern stabilizes as an attractor: what once depended on openness becomes a repeatable script that makes the next enactment easier than a fresh reading."
      "Ω": "Asymmetry appears between the role-position that benefits from recognizability of the script and the role-position or field that must carry the loss of novelty, correction, interruption, or after-scene repair."
      "Θ": "Temporal accumulation is central: each repetition can reduce responsiveness, novelty, direct otherness, trust, stop-capability, and after-scene dignity while still presenting itself as the same desire."
      "Φ": "Later narration may recontextualize continuation as authenticity, stable preference, intimacy, or intensity even after the operative structure has shifted toward drift maintenance."
      "Χ": "Stop-capability, meta-commentability, and interruption become costly because questioning the repetition now threatens the desire-frame rather than merely adjusting the scene."
      "Σ": "Integration would require the configuration to hold both truths together: the desire may remain internally real, and the repeated form may still be eroding its own enabling conditions."
      "Ψ": "Self-binding appears as the need to carry responsibility for recurrence and condition erosion instead of externalizing the cost onto the other, the relational field, or desire-language itself."
    dependency_hygiene_note: "Any Χ, Σ, or Ψ reading presupposes PMS dependency hygiene and does not create a new operator path."

  sexual_cost_topology:
    concept_ref: "sexual_cost_topology"
    status: "partial"
    governing_rule: "Sexual cost topology is not a score, person measure, dignity rank, maturity rank, sex truth, or genital truth."
    cost_dimensions:
      bodily_costs:
        role_A: "indeterminate"
        role_B: "indeterminate"
      exposure_costs:
        role_A: "low"
        role_B: "low"
      reputational_costs:
        role_A: "none"
        role_B: "none"
      binding_costs:
        role_A: "medium"
        role_B: "medium"
      exit_costs:
        role_A: "medium"
        role_B: "medium"
      publicness_costs:
        role_A: "none"
        role_B: "none"
      body_boundary_costs:
        role_A: "indeterminate"
        role_B: "indeterminate"
      access_costs:
        role_A: "medium"
        role_B: "medium"
      condition_renewal_costs:
        role_A: "medium"
        role_B: "medium"
      interruption_costs:
        role_A: "medium"
        role_B: "medium"
      symbolic_costs:
        role_A: "medium"
        role_B: "medium"
      responsibility_costs:
        role_A: "medium"
        role_B: "medium"
      after_scene_dignity_costs:
        role_A: "medium"
        role_B: "medium"
    asymmetry_specific_responsibility:
      role_A: "Role_A would structurally have to carry the fact that desire-language can maintain recurrence while obscuring condition erosion and making interruption appear as a threat to desire."
      role_B: "Role_B would structurally not be reducible to renewing the script's conditions, absorbing the loss of novelty, or repairing after-scene residue produced by repetition."
      field_or_medium: "The repetition field stabilizes recognizability, familiarity, symbolic continuity, and category-readability; it makes continuation easier than re-reading and raises the cost of interruption."
    mismatch_check:
      declared_parity: "indeterminate"
      real_cost_distribution: "hidden"
      possible_drift_ref: "cost_topology_mismatch"
    guard: "Do not infer equal burdens, equal responsibility, guilt, rank, or person worth from cost topology."

  direct_otherness:
    concept_ref: "direct_otherness"
    status: "weak"
    real_other_correction:
      available: "contested"
      description: "A real other or counter-position may still respond, refuse, correct, withdraw, or remain non-identical with the script, but recurrence weakens the capacity of that correction to alter the pattern."
    substitution_checks:
      image_category_or_script_substitution: "present"
      permission_image: "indeterminate"
      simulated_counterdesire: "absent"
      access_counterdesire_loop: "weak"
    access_guard: "Direct otherness is reality-correction without access entitlement. No person owes access, desire, correction, explanation, or availability."

  embodiment_and_genital_meaning:
    body_remainder_relevance: "indeterminate"
    biological_affordance_guard:
      status: "active"
      note: "Biology may structure affordances, risks, asymmetries, thresholds, and likely strategy spaces without establishing destiny, rank, role, or moral evidence."
    sexed_dependency_guard:
      status: "active"
      note: "Sexed dependency does not imply relationship mandate, heterosexual mandate, reproductive command, orientation ranking, or person incompleteness."
    body_boundary_coding:
      status: "indeterminate"
      markers:
        - "none"
    genital_meaning:
      status: "not_relevant"
      integration_status: "indeterminate"
      sovereignty_risk: "none"
    adult_sexual_emancipation_check:
      formula: "genital integration without genital sovereignty"
      status: "not_relevant"
    guard: "The genital belongs to the person; the person does not belong to the genital."

  withdrawal_and_binding:
    covert_psi_expectation:
      status: "weak"
      sources:
        - "repetition"
        - "ambiguity"
        - "desire"
        - "after_scene_conduct"
    ambivalence_withdrawal:
      status: "indeterminate"
      note: "The case does not specify love-ending or relational withdrawal; the relevant structure is recurrence despite weakened desirability."
    post_access_withdrawal:
      status: "indeterminate"
      note: "The case does not specify whether access resolves pressure without after-scene self-binding."
    non_binding_language:
      status: "indeterminate"
      cost_relation: "No explicit non-binding language is given; if present, it would need to be tested against the accumulating Θ cost."
    after_scene_dignity:
      status: "strained"
      markers:
        - "self_worth_leak"
        - "responsibility_flight"
        - "none"
    withdrawal_guard: "Withdrawal is neither automatic guilt nor automatic exculpation."

  asymmetry_activation_and_reciprocity:
    sexual_reciprocity_under_real_asymmetry:
      status: "strained"
      rule: "Sexual reciprocity does not require equal burdens; it requires that unequal burdens not be externalized."
    asymmetry_activation:
      present: "contested"
      marked: "false"
      bounded: "contested"
      linked_to_real_omega_theta_burden: "false"
      rebound_into_sigma_psi_where_relevant: "false"
      possible_drift_refs:
        - "unmarked_omega_activation"
        - "asymmetry_switch_drift"
        - "parity_to_exit"
        - "responsibility_to_authority"
    guard: "Asymmetry is not the problem; false coordination or unmarked activation of real asymmetry is the problem."

