  paper_refs: ["Ch. 0.6b", "Ch. 15", "Ch. 21.3", "Ch. 22.2", "Ch. 23.4b", "Ch. 24.3", "Appendix B", "Appendix C.5", "Appendix D.8"]
  allowed_language:
