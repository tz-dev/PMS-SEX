# PMS-SEX — Compact Machine Profile
# Paper: "PMS-SEX — From Impulse to Self-Binding: A Praxeological Grammar of Sexuality (Δ–Ψ)"
# Role: paper-specific PMS application overlay
# Constraint: no operator redefinition, no person verdict, no diagnosis, no practice guidance
# Validity gate: Χ + reversibility + Dignity-in-Practice

schema_version: "PMS-SEX_PROFILE"
profile_format: "compact_machine_profile"

schema_meta:
  model_name: "PMS–SEX Application Profile"
  model_short: "PMS-SEX"
  status: "application_overlay"
  profile_role: "paper_specific_profile"
  profile_id: "PMS-SEX"
  machine_priority: true
  human_exposition_level: "compressed"
  authors:
    - name: "T. Zöller"
      role: "originator"
    - name: "ChatGPT (GPT-5.5 Thinking)"
      role: "formalization_assistant"
  description: >
    Compact machine-readable application profile for PMS-SEX. The profile maps
    the sexual-praxeological grammar of the paper onto the canonical PMS
    operator spine Δ–Ψ. It defines domain concepts, drift profiles, viability
    conditions, dignity guards, MIP docking boundaries, and analysis pipelines
    without redefining PMS operators or converting structural readings into
    person verdicts.

source_model:
  primary_profile:
    name: "PMS-SEX"
    title: "PMS-SEX — From Impulse to Self-Binding: A Praxeological Grammar of Sexuality (Δ–Ψ)"
    status: "canonical_paper_reference"
  depends_on:
    model_name: "Praxeological Meta-Structure"
    model_short: "PMS"
    schema_version: "PMS_1.3"
    status: "repository_reference"
  docking_models:
    - model_short: "MIP"
      model_name: "Maturity in Practice"
      role: "optional_evaluative_interface"
    - model_short: "PMS-EDEN"
      model_name: "PMS–EDEN"
      role: "cross_domain_asymmetry_switch_reference"
  conformity:
    base_schema_version: "PMS_1.3"
    canonical_operator_spine: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
    repository_dependency_order_preserved: true
    no_new_meta_axioms: true
    no_operator_redefinition: true
    no_dependency_rewrite: true
    no_derived_axis_rewrite: true
    no_direct_adultness_verdict: true
    overlay_only: true
  layer_rule: >
    PMS-SEX is an application overlay on PMS. It may introduce domain concepts,
    reduced signatures, drift profiles, viability conditions, and docking guards,
    but it must not alter PMS operators, dependencies, or axioms. MIP docking
    may add evaluative critique only through an explicit layer shift.

