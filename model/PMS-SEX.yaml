  note: "Compressed chapter closure markers; not analytic rules."

  markers:
    ch1: "Sexuality is not optional enactment but recurring praxis pressure: what matters is how a configuration carries ∇ under □ across Λ and Θ."
    ch2: "Drive does not disappear when it is suppressed; it reappears later as absence, habit, and accumulated cost."
    ch3: "What makes a sexual situation consequential is not what was meant, but how the situation was framed."
    ch4: "Asymmetry is not a moral charge but sexual cost topology."
    ch5: "Time does not pause sexuality: postponement redistributes costs, repetition stabilizes patterns, categories normalize, and withdrawal must carry the expectations it helped structure."
    ch6: "Leaving changes what comes next, not what already counts."
    ch7: "When a situation carries expectations, silence is not neutral."
    ch8: "What repeats becomes easier, what is easier becomes default, and what becomes default shapes who carries the costs."
    ch9: "Redirection does not remove pressure; it moves it."
    ch10: "Distance does not end pressure; it makes stopping possible before pressure turns into a path."
    ch11: "Integration holds conflicting demands together without exporting the conflict elsewhere."
    ch12: "Sexuality starts to cost when scenes stop being local and begin to count across time."
    ch13: "The body keeps the record, and the real other remains free to refuse the script."
    ch14: "What keeps happening is often less about who someone is than about how the situation is weighted."
    ch15: "Deviance is not who someone is, but what a situation becomes when handling, category, genital meaning, withdrawal, or correction failure hardens into a path."
    ch16: "Intensity does not create the danger; unmatched intensity does."
    ch17: "Suspending self-binding can work locally only while the situation explicitly carries the cost topology it creates."
    ch18: "Dysfunction is prepared where Ψ leaks, Ω steers, Χ collapses, Α fixates, Θ breaks exit fiction, and reciprocity fails through drift."
    ch19: "Functional practice is defined by governability, not normality."
    ch20: "Minimal psychology signals drift persistence; it does not explain desire."
    ch21: "Dignity in sexual practice is about how asymmetry is carried, not who someone is."
    ch22: "PMS-SEX explains structure; MIP explains when critique is legitimate."
    ch23: "PMS-SEX remains valid by stopping where other lenses begin."
    ch24: "PMS-SEX remains valid by saying not what persons are, but what configurations do over time."

  final_closing_marker: "Adult Sexual Emancipation = genital integration without genital sovereignty."

