    Disturbance-language is admissible only as configuration-language.
    The moment it becomes person-language, diagnosis, rank, orientation taxonomy,
    or humiliation, it leaves PMS-SEX.

# -----------------------------------------------------------------------------
# Drift catalogue (core PMS-SEX drift markers + corridors)
# -----------------------------------------------------------------------------
drift_catalogue:
  core_dysfunction_markers_ch18_3:
    paper_refs: ["Ch. 18.3", "Appendix C.3"]
    reading_rule: >
      Each marker is a configuration statement (“in this configuration…”), not
      a label. Markers describe predictable structural consequences of operator
      constellations; they are scene-bound, revisable, and non-diagnostic.

    "(1) Covert self-binding demand (Ψ leak)": |
      In this configuration, meaning and identity-relevant stakes enter a frame
      narrated as limited, suspended, local, or non-binding.

      Typical indicators:
        - implicit expectations (“this must mean…”)
        - jealousy as rule-substitute or possession logic inside a play frame
        - meaning claims without explicit frame legibility
        - local enactments treated as identity proofs
        - practice labels used to deny that binding has already become active

      Structural result:
        Ψ(binding) becomes operative although suspension is asserted; attribution
        is silently demanded while the frame cannot carry binding explicitly.

    "(2) Asymmetry escalation (Ω escalation)": |
      In this configuration, asymmetry increases while remaining unacknowledged
      inside the frame.

      Typical indicators:
        - boundary testing against stop markers
        - access pressure around time, body, availability, attention, or repair
        - power shifts without explicit rule updates
        - uneven refusal, exit, fallout, or definitional capacity
        - exposure gradients treated as mutual when structurally uneven

      Structural result:
        Ω(asymmetry) is not managed; Ω becomes a steering variable.

    "(3) Pseudo-symmetry": |
      In this configuration, equality rhetoric functions as a lid on cost
      description.

      Typical indicators:
        - “we both want it” or “it’s equal” as stabilizing narrative
        - consent language used to block analysis of unequal exposure
        - mutuality claims covering unequal after-costs
        - exposure and cost asymmetry persisting through temporality, body
          remainder, outer legibility, or publicness overlays

      Structural result:
        Conflict becomes non-negotiable because Ω must not be named inside □.

      Consent guard:
        This does not deny consent as an internal or legal/practical frame
        condition. It only states that consent-language does not by itself settle
        cost distribution.

    "(4) Non-event escalation (Λ as steering)": |
      In this configuration, absence becomes an active steering mechanism.

      Typical indicators:
        - withdrawal used as leverage
        - devaluation through non-occurrence
        - silence or indeterminacy functioning as control
        - chronic “maybe,” “later,” or “nothing happened” structures
        - unmarked withholding inside expectation-bearing frames

      Structural result:
        Λ(non-event) shapes practice more than enactment; coordination shifts
        into interpretation and guessing rather than explicit frame work.

    "(5) Attractor fixation (Α compulsivity)": |
      In this configuration, stabilization flips into fixation.

      Typical indicators:
        - practice becomes non-substitutable (“only this works”)
        - repetition replaces choice
        - frame breadth shrinks
        - practice labels protect the route from re-reading
        - alternatives lose practical attractiveness, availability, or recognizability

      Structural result:
        Α(attractor) binds more strongly than intention.

    "(6) Loss of distance (Χ loss)": |
      In this configuration, the meta-layer collapses.

      Typical indicators:
        - stopping becomes practically unavailable
        - critique or hesitation is read as betrayal, attack, weakness, or disloyalty
        - humor, de-escalation, and outside view disappear
        - internal labels replace re-reading
        - outer-form awareness becomes inaccessible or forbidden

      Structural result:
        Self-correction fails. Without Χ, drift cannot be intercepted early.

    "(7) Temporal overload (Θ accumulation)": |
      In this configuration, costs accumulate faster than the frame can carry.

      Typical indicators:
        - costs are ignored or externalized
        - exit fictions persist
        - collapse becomes abrupt
        - publicness documents or sedimentizes already active costs
        - outer legibility remains after internal closure-language claims the
          scene is over

      Structural result:
        Exit collapse replaces orderly ending: Θ does not rewind, and Α holds
        the configuration in place too long for low-cost exit to remain plausible.

    "(8) Outer-form denial": |
      In this configuration, internal framing or later recontextualization blocks
      analysis of enacted form.

      Typical indicators:
        - “it was play,” “service,” “authenticity,” “devotion,” or “consent” is
          used to end structural reading
        - re-description replaces cost layout
        - outer legibility is treated as hostile, irrelevant, or merely public
          misunderstanding

      Structural result:
        The scene loses its capacity to read itself. Internal meaning may be
        real, but it does not erase the action-form that has become structurally
        effective under asymmetry, exposure, repetition, and time.

  dynamic_chains_ch18_4:
    paper_refs: ["Ch. 18.4", "Appendix D.4"]
    primary_chain:
      raw: "Ψ leak → Ω escalation → Χ loss → Α fixation → Θ overload → exit collapse"
      reading: >
        Once meaning and attribution become covert, Ω more easily becomes a
        steering variable inside □. When Χ is not operational, the script
        hardens through Α and temporal costs accumulate until the exit fiction
        breaks.
    secondary_chain:
      raw: "internal-label capture → outer-form denial → publicness confusion → delayed cost recognition"
      reading: >
        Practice labels or self-description settle the internal story while
        enacted form remains structurally readable. Public reaction is then
        treated either as the whole problem or as irrelevant.

# -----------------------------------------------------------------------------
# Viability (functional minimum + warnings + corridor overlay)
# -----------------------------------------------------------------------------
viability:
  functional_minimum_conditions_ch19_3:
    paper_refs: ["Ch. 19.3", "Appendix D.5"]
    note: >
      Functional minimum conditions describe when a configuration remains
      structurally governable under Ω/Θ/Λ, without systematic D violation,
      without exit fictions, and without using internal labels to erase enacted
      form. Criteria only; no how-to.

    conditions:
      - id: "explicit_omega_recognition"
        label: "Explicit Ω recognition"
        minimal_form: "Ω(asymmetry) must be nameable and regulable within the frame."
        checks:
          - "cost, risk, access, and exposure gradients are not denied"
          - "equality rhetoric is not used as a substitute for management"
          - "uneven exit capacity, repair burden, or reputational exposure remains nameable"

      - id: "theta_awareness"
        label: "Θ awareness"
        minimal_form: "Consequences are treated as real: exit realism."
        checks:
          - "frequency, repetition, after-effects, and repair windows are carried"
          - "just-this-once narratives do not override visible accumulation"
          - "recontextualization does not claim rewind"
          - "exit is treated as trajectory change, not reset"

      - id: "stable_chi_capacity"
        label: "Stable Χ capacity"
        minimal_form: "Χ(distance) is operative, not ornamental."
        checks:
          - "stop-capability is practically available"
          - "distance can be activated before escalation becomes irreversible"
          - "meta-commentability remains available without punishment"
          - "outer-form awareness is not treated as betrayal or moral accusation"

      - id: "no_psi_substitution"
        label: "No Ψ substitution"
        minimal_form: "No Ψ leak as the default carrier of stakes."
        checks:
          - "sexual practice does not substitute for integration, self-worth, identity proof, or relationship clarification"
          - "meaning demands do not cross frame boundaries covertly"
          - "local scenes are not silently converted into commitment tests"
          - "non-binding language does not conceal active binding effects"

      - id: "lambda_tolerance_without_escalation"
        label: "Λ tolerance without escalation"
        minimal_form: "Λ(non-event) can exist without becoming steering or coercion."
        checks:
          - "pause, fatigue, unavailability, cancellation, and hesitation are tolerable"
          - "Λ is not recoded into control, punishment, devaluation, or possession"
          - "absence remains legible without forcing interpretive guessing"
          - "non-occurrence does not become the primary steering instrument"

      - id: "internal_framing_accountable_to_outer_form"
        label: "Internal framing remains accountable to outer form"
        minimal_form: "Internal framing does not erase outer structural form."
        checks:
          - "practice labels clarify internal occupation but do not end structural analysis"
          - "internal meaning is allowed to be real without erasing enacted form"
          - "outer legibility can be named without becoming person-ranking"
          - "consent, play, devotion, service, or authenticity language does not block cost-layout analysis"

      - id: "publicness_handled_as_overlay"
        label: "Publicness is handled as overlay"
        minimal_form: >
          Publicness modifies readability and consequence without being confused
          with their necessary origin.
        checks:
          - "publicity is not treated as the sole origin of consequence"
          - "publicity is not ignored where it amplifies, documents, repeats, or sedimentizes consequence"
          - "publicness remains distinguished from primary scene legibility"
          - "reputational or documentary effects are tracked as Θ/Ω intensifiers"

  warning_signals_ch19_4:
    paper_refs: ["Ch. 19.4", "Ch. 18.4"]
    note: >
      Warning signals indicate increased drift potential toward coercion, harm,
      or destructive dynamics. They are configuration markers only and do not
      label persons.

    signals:
      - id: "phi_narrative_inflation"
        label: "Φ narrative inflation"
        structural_note: "Φ substitutes for Σ(integration)."
        indicators:
          - "reframing repeatedly covers costs or asymmetry"
          - "clarification and cost naming are replaced by re-description"
          - "later meaning claims erase prior action-form"
          - "internal description moves while Α/Ω/Θ remain unchanged"

      - id: "mono_frame"
        label: "Narrowing of □ alternatives"
        structural_note: "Α(attractor) monopolizes □(frame)."
        indicators:
          - "only one frame works"
          - "alternatives are devalued or rendered impossible"
          - "practice labels protect the dominant frame from re-reading"
          - "the frame becomes readable only through one script"

      - id: "omega_moralization"
        label: "Ω moralization instead of regulation"
        structural_note: "Ω is handled ideologically, increasing pseudo-symmetry risk."
        indicators:
          - "asymmetry is negotiated via guilt or entitlement"
          - "if-you-loved-me logic becomes steering"
          - "naming asymmetry is treated as accusation"
          - "outer-form analysis collapses into blame"

      - id: "persistence_despite_structural_undercutting"
        label: "Persistence despite clear structural undercutting"
        structural_note: "Α + Θ overrun Χ."
        indicators:
          - "repetition continues despite bodily, reputational, binding-related, or D-violating costs"
          - "exit is imagined but not executed"
          - "harm is recognized but not structurally interrupted"
          - "insight does not alter the operator chain"

      - id: "theta_cost_externalization"
        label: "Externalization of Θ costs"
        structural_note: "Θ costs are shifted asymmetrically through Ω(layout)."
        indicators:
          - "bodily, reputational, emotional, social, exposure-related, or binding-related consequences are offloaded"
          - "short-term relief stabilizes the configuration at another role’s expense"
          - "after-costs concentrate in roles less able to refuse or redefine them"
          - "publicness may sedimentize externalized costs without creating them"

      - id: "outer_form_denial"
        label: "Outer-form denial"
        structural_note: "Χ is weakened because the configuration cannot re-read itself."
        indicators:
          - "internal naming blocks structural reading"
          - "consent-language or practice labels are treated as sufficient to settle all form"
          - "outer legibility is treated as moralistic, hostile, or public misunderstanding"
          - "visible action-form remains unread"

      - id: "publicness_confusion"
        label: "Publicness confusion"
        structural_note: "Publicness is misread as origin or as nothing rather than as overlay."
        indicators:
          - "publicity is treated as the whole source of harm"
          - "publicity is treated as irrelevant despite amplification or documentation"
          - "audience reaction replaces scene analysis"
          - "documentation, circulation, or reputation effects are denied until they harden"

  minimal_viability_corridor_appendix_D5:
    paper_refs: ["Appendix D.5"]
    raw: |
      □ explicit
      + Ω nameable
      + Θ realistic
      + Χ operative
      + Λ tolerable
      + Ψ handled
      (+ Σ reachable)
      = structurally governable configuration
    guard: >
      This corridor expresses structural governability only. It makes no moral
      claim, defines no normality threshold, and does not prescribe action.
    expansion_note: >
      Internal framing accountability and publicness-as-overlay are handled in
      Ch. 19.3, Ch. 19.4, Appendix D.6, and Appendix D.7. They remain binding
      layer guards, but are not part of the compressed Appendix D.5 raw formula.

# -----------------------------------------------------------------------------
# Modulators (non-operator weightings; "types without typing")
# -----------------------------------------------------------------------------
modulators:
  paper_refs: ["Ch. 14", "Ch. 0.6", "Appendix C.3"]
  basic_rule_ch14_2: |
    Modulators are praxeological, not psychological.

    They operate through frames (□), repetition, and cost layouts rather than
    through motive narratives. They are changeable because frames and handling
    can change, and they are not arbitrary because path dependence remains active
    once scripts have stabilized and costs have accumulated.

    A modulator is best read as a weighting that makes a particular operator
    chain pull faster or more persistently in a configuration, without typing
    persons or explaining inner causes.

  minimal_formula_ch14_3: |
    Minimal operatorial background for modulators:

      Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ

    Modulators do not add new operators. They weight the likelihood and dominance
    of existing operators by shaping scene conditions, repetition, cost layouts,
    outer legibility, publicness overlays, and handling capacity.

  central_modulators_ch14_4:
    "14.4.1 □₀ Early framing": |
      Weights how later frames can be set and maintained.

      Key dimensions:
        - speakability vs unspeakability
        - order vs chaos in scene grammar
        - boundary clarity vs boundary ambiguity
        - internal naming vs outer-form accountability

      Structural effect:
        Strong □₀ increases later frame stability under pressure.
        Weak □₀ increases ambiguity, implicit rules, and retroactive rewriting.

    "14.4.2 Ω₀ Asymmetry calibration": |
      Weights how asymmetry is noticed, named, and regulated.

      Key dimensions:
        - proximity / distance coordination
        - control vs exposure
        - availability and choice power
        - capacity to name cost gradients without moralization

      Structural effect:
        Calibrated Ω₀ supports regulation of gradients inside □.
        Blurred Ω₀ increases pseudo-symmetry until Θ forces cost visibility.

    "14.4.3 Λ density": |
      Weights how often non-occurrence becomes structurally active.

      Key dimensions:
        - frequency of withdrawal, rejection, hesitation, cancellation, or indeterminacy
        - chronic mismatch between expectation and enactment
        - “nothing happened” structures that nevertheless carry cost

      Structural effect:
        Higher Λ density raises interpretive pressure and substitute-script
        formation without implying motive or intent.

    "14.4.4 Θ stability": |
      Weights how sequences connect over time.

      Key dimensions:
        - continuity vs fragmentation
        - repeatability vs volatility
        - sustained commitments vs discontinuous episodes
        - whether publicness or documentation sedimentizes temporal cost

      Structural effect:
        Stable Θ makes path dependence and cumulative costs legible early.
        Fragmented Θ can obscure exit realism through narrative resets.

    "14.4.5 Φ habituation": |
      Weights how often tension is handled by re-framing.

      Key dimensions:
        - reinterpretation as tension reduction
        - narrative repair as default stabilization
        - frequent switching of what the scene “really was”
        - recontextualization used to erase outer form

      Structural effect:
        High Φ habituation can stabilize locally but increases risk of
        pseudo-resolution when Α scripts, Ω gradients, and Θ accumulation remain
        unchanged.

    "14.4.6 Χ mode": |
      Weights what distance does in practice.

      Key dimensions:
        - distance as protection
        - distance as control
        - distance as devaluation
        - distance as meta-capacity
        - outer-form awareness as available or forbidden

      Structural effect:
        Χ as meta-capacity supports regulation and repair.
        Χ collapsed into control or devaluation produces brittle stability.

    "14.4.7 Publicness / media modulators": |
      Publicness and media modulators function as □ frame extensions, not causes.

      Key dimensions:
        - visibility and documentation
        - comparison pressure and reputational stakes
        - stigma vs normalization regimes
        - circulation and sedimentation of outer legibility

      Structural effect:
        Increased publicness can harden Θ costs and amplify Ω gradients, making
        exit, reinterpretation, and repair more expensive. These effects are read
        as frame overlays, not inner-state explanations.

  interplay_ch14_5: |
    Modulators operate in combination, not isolation.

    Typical configuration patterns:
      - Λ-dense + Χ-weak + Θ-fragmented:
          brittle stabilization; pressure rises, stop-capability fails in
          practice, and scripts consolidate as compensation.
      - Ω₀ blurred + □ unstable:
          pseudo-symmetry; costs distribute unevenly while the frame remains
          narratively “equal,” until Θ forces conflict visibility.
      - Φ-high + Σ-weak:
          narrative inflation; re-framing substitutes for synthesis.
      - internal-label capture + publicness confusion:
          internal description blocks outer-form analysis while publicity is
          treated either as the whole problem or as irrelevant.

    These patterns are legibility shortcuts, not predictions about persons.

  demarcation_ch14_6: |
    Modulator ≠ character.
    Modulator ≠ blame.
    Modulator ≠ diagnosis.
    Modulator ≠ sexual identity.
    Modulator ≠ orientation taxonomy.

    Modulators describe conditions under which configurations stabilize, drift,
    or remain governable. They do not assign value to persons and do not claim
    inner causes.

# -----------------------------------------------------------------------------
# Minimal psychology adapter (Ch. 20) — structural self-check only
# -----------------------------------------------------------------------------
minimal_psychology_adapter:
  paper_refs: ["Ch. 20", "Ch. 18", "Ch. 19"]
  title: "Minimal Psychology as a Structural Self-Check Adapter"
  note: >
    Restricted use; outputs structural alarm only. Non-diagnostic,
    non-interpretive, scene-bound, and dignity-preserving.

  purpose_and_boundary_ch20_1: |
    “Minimal psychology” is a name for a structural self-check adapter, not a
    psychological explanatory layer.

    It activates where drift markers from Chapter 18 and viability failures from
    Chapter 19 are already structurally legible, yet repetition continues
    unchanged because structural description alone no longer interrupts the path.

    Boundaries:
      - no diagnosis
      - no motive theory
      - no person typing
      - no identity ranking
      - no moral evaluation
      - no therapeutic method
      - no conversion into clinical taxonomy

  activation_conditions_ch20_2: |
    The adapter activates only when all of the following hold:

      - drift markers from Chapter 18 are present,
      - minimal viability conditions from Chapter 19 are no longer restoring correction,
      - the configuration is still carried voluntarily and repeatedly.

    Typical activation contexts:
      - Ψ leak has been named, but repetition continues,
      - Ω costs are legible, but still accepted or externalized,
      - Θ damage is foreseeable, but stop-capability keeps failing,
      - Χ exists formally, but is not enacted in time,
      - practice labels continue to block outer-form analysis,
      - publicness is blamed or ignored while the enacted configuration remains unchanged.

  guiding_question_ch20_3: |
    Primary structural question:

      “What structural role is this desire playing in this configuration?”

    The colloquial form “Why do I really desire X?” is admissible only if
    immediately translated back into the structural question above.

    Constraints:
      - hypothetical, not confessional,
      - targets pattern continuity, not inner truth,
      - tests whether desire-language or desire-orientation functions as a drift carrier,
      - returns attention to enacted form, cost layout, stop-capability, and accumulated consequence,
      - may not override outer legibility with a deeper self-story.

  permitted_warning_hypothesis_ch20_4: |
    Under sustained drift, one limited hypothesis becomes admissible:

      In this configuration, desire-language may be functioning as a
      drift-maintaining mechanism rather than as play, exploration, negotiated
      intensity, or bounded practice.

    This hypothesis does not explain desire. It is never confirmed
    psychologically; it is only structurally tested against enacted patterns.

  test_criteria_ch20_5:
    - id: "D_in_Practice_failure"
      label: "Repeated D-in-Practice failure"
      indicators:
        - "enactments repeatedly undermine Dignity-in-Practice"
        - "degradation-near or humiliation-form scripts appear without play-reversibility"
        - "boundary violations recur despite explicit recognition"
        - "outer-form naming is blocked by internal labels"
        - "asymmetry is intensified while denied"
      guard: >
        This does not mean a person has lower dignity. It means the configuration
        repeatedly fails to preserve Dignity-in-Practice as an enactment constraint.

    - id: "theta_damage_despite_knowledge"
      label: "Θ damage despite knowledge"
      indicators:
        - "foreseeable harm is explicitly acknowledged"
        - "repetition continues unchanged"
        - "accumulation accelerates while stop-capability weakens"
        - "exit fictions remain active"
        - "publicness, documentation, bodily effects, or binding residues are minimized until they harden"

    - id: "progressive_frame_narrowing"
      label: "Progressive frame narrowing"
      indicators:
        - "alternatives lose attractiveness or feasibility"
        - "avoidance and substitution become structurally unavailable"
        - "one script dominates despite rising costs"
        - "practice labels become shields against re-reading"
        - "internal meaning expands while frame breadth contracts"

    - id: "desire_used_against_chi"
      label: "Desire used against Χ"
      indicators:
        - "desire is invoked to bypass stopping, hesitation, or meta-commentary"
        - "distance is treated as betrayal of authenticity"
        - "I want this or this is who I am replaces frame analysis"
        - "internal desire-language prevents outer-form reading"

    - id: "publicness_displacement"
      label: "Publicness displacement"
      indicators:
        - "public reaction is treated as the whole problem"
        - "publicness is denied despite documentation or circulation"
        - "the enacted configuration remains unread because focus moves entirely to audience response"

  output_format_ch20_6: |
    Output is invariant and minimal. No explanation is permitted.

    Allowed alarm statements:
      - “In this configuration, drift persistence is present.”
      - “The configuration is no longer correcting itself structurally.”
      - “Distance (Χ), frame clarity (□), and Θ realism require reactivation.”
      - “Internal framing is no longer sufficient to settle the enacted structure.”
      - “Outer legibility and cost distribution require re-reading without person-ranking.”

    No conclusions about character, pathology, motive, identity, orientation,
    or worth are permitted.

# -----------------------------------------------------------------------------
# Dignity-in-Practice module (Ch. 21)
# -----------------------------------------------------------------------------
dignity_in_practice_module:
  paper_refs: ["Ch. 21", "Ch. 0.2", "Ch. 0.9", "Appendix B"]
  pms_status: "derived_construct_from_PMS"
  canonical_pms_formula: ["Ψ", "Χ", "Ω"]
  pms_sex_application_formula: "explicit Ω + operative Χ + no covert Ψ demand under Θ, with outer-form readability preserved"
  application_guard: >
    D-compliance in PMS-SEX also requires that internal framing not erase
    outer-form readability. This is an application-side guard, not a revision
    of PMS-D.
  principle: >
    D applies in enactment, not as status. PMS-SEX has no entitlement to the
    person: no authority over motives, worth, identity, biography, orientation,
    or what someone “really is.” PMS-SEX has only entitlement to D in enactment:
    restraint, respect, and non-degradation within the accepted frame.
  outer_form_guard: >
    Naming an externally readable humiliation-form, degradation-form,
    asymmetry-form, or exposure-form is not itself a violation of the
    anti-moral stance. The violation would lie in converting scene analysis into
    person-ranking, humiliation, diagnosis, identity verdict, or moral contempt.
  critique_language:
    not_justified_when:
      - "frame respect is maintained"
      - "no D-in-Practice failure in enactment occurs"
      - "no Ω escalation occurs"
      - "no Ψ leak occurs"
      - "outer-form naming remains non-punitive"
      - "publicness is not weaponized"
    structurally_legible_when:
      - "Ψ leak appears"
      - "Ω escalation appears"
      - "pseudo-symmetry makes costs unnameable"
      - "Θ consequences are ignored or externalized"
      - "outer-form denial blocks scene readability"
      - "publicness is weaponized or denied"
  guardrail: >
    D remains protection-first. Any use of D for shaming, public pillory,
    identity labeling, orientation ranking, diagnosis, or person degradation is
    a misuse pattern and becomes critique-relevant itself.

# -----------------------------------------------------------------------------
# MIP docking interface (Ch. 22)
# -----------------------------------------------------------------------------
mip_docking_interface:
  paper_refs: ["Ch. 22", "Ch. 0.10", "Appendix A"]
  status: "optional_evaluative_interface"
  separation_rule: >
    PMS-SEX explains how sexual practice works structurally. MIP explains when
    critique is legitimate in system and publicity contexts. Docking is a
    context shift, not a merger.
  no_back_projection:
    - "MIP must not import moral psychology into PMS-SEX's descriptive layer."
    - "PMS-SEX must not smuggle evaluation as neutral description."
    - "Outer structural legibility at the PMS-SEX layer does not by itself authorize public critique."
    - "Higher path-cost or disturbance does not by itself establish immaturity, blame, pathology, or moral failure."
  docking_axes:
    A:
      name: "Awareness"
      meaning: "structural awareness, not psychological insight"
    C:
      name: "Coherence"
      meaning: "stability over time under Θ + Λ + □"
    R:
      name: "Responsibility"
      meaning: "self-binding and consequence handling under Ω + Θ"
    P:
      name: "Power"
      meaning: "real agency, alternatives, and choice capacity"
  axis_guard: >
    A/C/R/P here are MIP docking axes for evaluative critique. They do not modify
    PMS-derived axes (A, C, R, E, D), introduce a new PMS primitive, or replace
    PMS operator derivation.
  IA_box:
    T:
      name: "Transparent"
      question: "Was the asymmetry legible?"
    J:
      name: "Justified"
      question: "Was it grounded in a protected good or legitimate constraint?"
    TB:
      name: "Time-bound"
      question: "Was it limited and reviewable?"
    R:
      name: "Reversible"
      question: "Were correction and exit pathways structurally available?"
  guard_clause: >
    PMS-SEX outer-form naming does not automatically license public accusation.
    MIP critique does not retroactively convert PMS-SEX structural descriptions
    into moral verdicts.

# -----------------------------------------------------------------------------
# Limits and scope discipline (Ch. 23)
# -----------------------------------------------------------------------------
limits_and_extensions:
  paper_refs: ["Ch. 23", "Ch. 24.4", "Appendix A"]
  structural_limits:
    PMS_SEX_models:
      - "scenes and enactments"
      - "frames and frame stability"
      - "asymmetries and cost layouts"
      - "repetition, trajectories, and irreversibility"
      - "non-events, absence, and expectation fields"
      - "outer legibility and publicness overlays"
      - "drift, stabilization, and exit conditions"
    PMS_SEX_does_not_model:
      - "persons"
      - "personality, disposition, or character"
      - "inner motives, drives, or experiential qualities"
      - "developmental histories or causal psychologies"
      - "sexual identity, orientation, or worth"
      - "individual responsibility beyond structural attribution"
  configuration_scope:
    note: >
      PMS-SEX does not claim isomorphism across all sexual configurations.
      Configurations shaped by different public, institutional, identity, or
      community-legibility conditions may exhibit different Ω, □, Λ, Θ, and Ψ
      profiles.
    guard: >
      Identical practice labels do not imply identical structure. Internal
      framing does not settle outer form. Public discourse does not exhaust
      scene legibility.
  psychology_scope:
    note: >
      Psychology is subordinated, not denied. It may refine a reading only after
      structural reconstruction via Δ–Ψ, cost layout, outer legibility, and
      publicness overlays have already been reconstructed.
    forbidden_uses:
      - "bypassing Ω accounting"
      - "dissolving Θ irreversibility"
      - "personalizing what remains structurally induced"
      - "erasing outer form with inner narrative"
      - "converting drift into diagnosis"
      - "converting path-cost into identity rank"
      - "short-circuiting Χ and reversibility"
  non_capture_openness:
    note: >
      PMS-SEX does not assume that every sexually marked configuration can be
      fully rendered without remainder in its own grammar.
    guard: >
      Translation into PMS terms does not prove exhaustive capture, and refusal
      of PMS terms does not automatically indicate denial, immaturity, or drift.
  explicit_exclusions:
    - "no how-to guidance"
    - "no risk-management manual"
    - "no therapeutic, clinical, medical, or forensic authority"
    - "no optimization logic for desire, bonding, or satisfaction"
    - "no taxonomy of sexual identities or orientations"
    - "no diagnosis of persons, groups, practices, or communities"
    - "no moral ranking from statistical default, lower entropy, or stronger canalization"

# -----------------------------------------------------------------------------
# Appendix glossary concepts
# -----------------------------------------------------------------------------
glossary_concepts:
  paper_refs: ["Appendix B"]

  scene:
    definition: "A bounded enactment unit rendered legible by a frame (□) and carried through time (Θ)."

  configuration:
    definition: "A concrete arrangement of operators as enacted; not a person, trait, identity, or diagnosis."

  drift:
    definition: "Predictable movement toward instability or harm when costs accumulate faster than regulation capacity."

  viability:
    definition: "Structural capacity of a configuration to remain governable under Ω, Θ, and Λ without systematic D violation or exit fiction."

  cost_layout:
    definition: "Patterned distribution of burdens, risks, exposure, and consequences across roles and time: Ω under Θ."

  exit_realism:
    definition: "Whether stopping, leaving, or undoing remains practically available under accumulated costs."

  pseudo_symmetry:
    definition: "Frame rhetoric that denies real asymmetry, rendering costs unnameable and conflict non-negotiable."

  narrative_substitution:
    definition: "Use of recontextualization (Φ) to claim resolution while structural costs and scripts remain unchanged."

  frame_narrowing:
    definition: "Loss of alternative viable scenes; one script becomes non-substitutable through Α monopolization."

  drift_marker:
    definition: "A structural signal indicating elevated risk of destructive dynamics."

  outer_legibility:
    definition: >
      The structurally readable action-form a scene presents under visible
      asymmetry, exposure, markedness, repetition, and consequence, independent
      of whether internal framing confirms or contests that readability.

  internal_framing:
    definition: >
      How a scene is inhabited, narrated, or lived from within the configuration.

  pre_reflective_readability:
    definition: >
      Early or immediate scene-legibility of marked configurations prior to
      elaborate internal translation or justificatory narration.

  publicness_as_overlay:
    definition: >
      Publicness as a frame-extension that distributes, amplifies, documents,
      repeats, or sedimentizes a scene’s readability and consequences without
      necessarily generating the scene’s primary form.

  humiliation_form_exposure_form:
    definition: >
      Structurally readable action-form characterized by marked asymmetry,
      exposure concentration, degradation-nearness, or public/visible
      vulnerability. Scene form, not person worth.

  entropic_path_structure:
    definition: >
      A configuration’s degree of stabilization difficulty under frame,
      attractor formation, asymmetry, temporality, distance, integration, and
      self-binding. Structural path-cost, not person worth or clinical status.

  neutral_disturbance:
    definition: >
      Strictly structural term for deviation, perturbation, instability, or
      added stabilization burden within a configuration. No moral failure,
      diagnosis, pathology, lower dignity, or degraded personhood.

  path_cost:
    definition: >
      Operator-work required for a configuration to remain coherent, reversible,
      non-coercive, and dignity-preserving over time.

  stabilization_burden:
    definition: >
      Amount of framing, distance, integration, self-binding discipline, or cost
      accounting required to keep a configuration from narrowing, externalizing
      costs, or collapsing under recurrence.

  configuration_level_deviation:
    definition: >
      Structural divergence from a lower-cost or more strongly stabilized path.
      Applies to scene organization and operator dynamics, not to persons,
      identities, orientations, or ontological status.

# -----------------------------------------------------------------------------
# One-line markers (quote-ready) — chapter closures
# -----------------------------------------------------------------------------
chapter_one_line_markers:
  paper_refs: ["Ch. 1–24", "Ch. 24.3", "Ch. 24.4"]
  note: "Quote-ready one-line markers from chapter closures or final guard."
  markers:
    "1": "Sexuality is not optional enactment but recurring praxis pressure: what matters is how a configuration carries ∇ under □ across Λ and Θ."
    "2": "Drive does not disappear when it is suppressed; it reappears later as absence, habit, and accumulated cost."
    "3": "What makes a sexual situation consequential is not what was meant, but how the situation was framed—and when framing is unclear, costs do not vanish, they drift."
    "4": "Asymmetry is not a moral charge but a cost layout: if uneven exposure is not handled in the situation, it resurfaces later as conflict and accumulated consequence."
    "5": "Time does not pause sexuality: postponement redistributes costs, repetition stabilizes patterns, and consequences grow even when nothing seems to happen."
    "6": "Leaving changes what comes next, not what already counts: exits redirect trajectories, but time keeps the bill."
    "7": "When a situation carries expectations, silence is not neutral: absence does work, shifts burdens, and shapes what comes next."
    "8": "What repeats becomes easier, what is easier becomes default, and what becomes default quietly shapes who carries the costs."
    "9": "Redirection does not remove pressure; it moves it, changing who carries the costs and where they show up."
    "10": "Distance does not end pressure; it makes stopping possible before pressure turns into a path."
    "11": "Integration is the ability to hold conflicting demands together; when it is unavailable, stability is usually bought by pushing the conflict somewhere else."
    "12": "Sexuality starts to cost when scenes stop being local and begin to count across time."
    "13": "No matter how the story is told, the body keeps the record."
    "14": "What keeps happening is often less about who someone is than about how the situation is weighted."
    "15": "Deviance is not who someone is, but what a situation becomes when one way of handling keeps working and nothing interrupts it."
    "16": "Intensity does not create the danger; unmatched intensity does."
    "17": "Suspending self-binding can work locally, but only while the situation itself carries the weight that identity usually does."
    "18": "Dysfunctional dynamics are rarely sudden: they are structurally prepared when Ψ leaks, Ω becomes a steering variable, Χ collapses, Α fixates, and Θ accumulation breaks the exit fiction."
    "19": "Functional practice is defined by governability, not normality: Ω nameable, Θ real, Χ operative, Ψ not substituted, Λ tolerable, inner framing accountable to outer form, and publicness kept in proportion."
    "20": "Minimal psychology in PMS-SEX activates when drift persists despite clarity: it does not explain desire, it signals that repetition, accumulation, and frame narrowing are no longer correcting themselves."
    "21": "Dignity in sexual practice is not about who someone is, but about how asymmetry is carried: when stopping works, meaning stays bounded, and consequences are acknowledged, critique is possible without humiliation."
    "22": "PMS-SEX explains how structures work; MIP explains when critique is legitimate—docking the two adds clarity without turning analysis into moral judgment."
    "23": "PMS-SEX remains valid by stopping where other lenses begin: it explains what configurations do over time, without turning structure into psychology, taxonomy, moral rank, or advice."
    "24_final_guard": >
      PMS-SEX replaces neither decisions, nor responsibility, nor tragedy.
      It makes visible where costs emerge, when they tip, and why many conflicts
      arise not from malice but from structural opacity. Internal framing does
      not erase outer form; outer legibility does not authorize person-ranking.
      Publicity may intensify what a scene becomes, but does not necessarily
      create what the scene already presents. Disturbance, entropy, deviation,
      and path-cost language name structural stabilization burden, not human
      worth, identity rank, orientation status, or clinical disorder.
    "24_closing_marker": >
      PMS-SEX remains valid by staying within what it can responsibly say: not
      what persons are, but what configurations do over time.

# -----------------------------------------------------------------------------
# Structural tools: Operator Table & Structural Map
# -----------------------------------------------------------------------------
structural_tools:
  operator_table:
    paper_refs: ["Appendix C.1", "Appendix C.2", "Appendix C.4", "Appendix C.5"]
    note: >
      Canonical Δ–Ψ operator table as used in PMS-SEX. Descriptive only;
      supports internal consistency checks. No normative, diagnostic, or
      person-classifying function.

    rows:
      - operator: "Δ"
        name: "Difference"
        depends_on: []
        minimal_function: >
          Creates distinctions that make sexual praxis legible at all:
          inside/outside, allowed/forbidden, self/other, private/public,
          local/binding-relevant.
        typical_drift_markers:
          - "undifferentiated pressure"
          - "fusion"
          - "illegibility of boundaries"
          - "inability to name what differs"

      - operator: "∇"
        name: "Impulse"
        depends_on: ["Δ"]
        minimal_function: >
          Introduces directional pressure that demands handling: activation,
          pull, movement toward or away from a difference.
        typical_drift_markers:
          - "escalation without framing"
          - "pressure outruns coordination"
          - "urgency becomes self-justifying"

      - operator: "□"
        name: "Frame"
        depends_on: ["Δ", "∇"]
        minimal_function: >
          Constrains impulse into a readable scene grammar: roles, rules,
          permissions, timing, publicity overlays, and what counts as inside/outside.
        reading_note: >
          Frame labels and internal naming do not by themselves settle the full
          outer legibility of enacted form.
        typical_drift_markers:
          - "ambiguity drift"
          - "retroactive rule changes"
          - "practice labels replacing frame analysis"
          - "mono-frame dominance"
          - "outer-form denial"

      - operator: "Λ"
        name: "Non-Event"
        depends_on: ["□"]
        minimal_function: >
          Makes absence, delay, silence, hesitation, cancellation, and withdrawal
          structurally active under expectation.
        typical_drift_markers:
          - "silence as leverage"
          - "withdrawal as punishment"
          - "chronic maybe/later"
          - "interpretive overload"
          - "non-occurrence becomes steering"

      - operator: "Α"
        name: "Attractor"
        depends_on: ["Δ", "∇", "□", "Λ"]
        minimal_function: >
          Stabilizes recurrent scripts under repetition; produces path dependence
          and lower-friction repeatability.
        typical_drift_markers:
          - "script monopolization"
          - "loss of alternatives"
          - "repetition replaces choice"
          - "practice becomes non-substitutable"
          - "label capture protects the route"

      - operator: "Ω"
        name: "Asymmetry"
        depends_on: ["Α"]
        minimal_function: >
          Produces gradients of access, exposure, obligation, definitional control,
          exit margin, repair burden, and cost-bearing.
        reading_note: >
          Ω is structural, not moral. Naming Ω does not assign blame, rank
          persons, or deny consent; it reconstructs leverage and burden.
        typical_drift_markers:
          - "pseudo-symmetry"
          - "covert cost shifting"
          - "exposure concentration"
          - "power as steering variable"
          - "asymmetry moralized instead of regulated"

      - operator: "Θ"
        name: "Temporality"
        depends_on: ["Ω", "Α"]
        minimal_function: >
          Extends configurations into trajectories: accumulation, irreversibility,
          memory traces, documentation, bodily persistence, and exit realism.
        reading_note: >
          Higher path-cost or stabilization burden describes operator-work under
          recurrence and temporality. It does not imply person-ranking,
          diagnosis, moral disorder, orientation taxonomy, or lower dignity.
        typical_drift_markers:
          - "exit fiction"
          - "delayed collapse"
          - "persistence despite visible costs"
          - "public sedimentation"
          - "recontextualization claims rewind"

      - operator: "Φ"
        name: "Recontextualization"
        depends_on: ["Θ", "Ω", "□"]
        minimal_function: >
          Relocates an existing structure into a new frame without dissolving
          costs already active under Α/Ω/Θ.
        reading_note: >
          Φ may alter how a scene is narrated or inhabited, but does not by
          itself erase the outer form already structurally effective under Θ.
        typical_drift_markers:
          - "narrative substitution"
          - "it is different now reset claims"
          - "cost denial"
          - "inner re-description used to erase outer form"

      - operator: "Χ"
        name: "Distance"
        depends_on: ["Φ", "Θ", "□"]
        minimal_function: >
          Enables stop-capability and meta-position within ongoing praxis:
          pause, refusal, humor, re-reading, de-escalation, non-fusion.
        typical_drift_markers:
          - "stop punished"
          - "critique read as betrayal"
          - "outer-form awareness forbidden"
          - "escalation lock-in"
          - "loss of self-correction"

      - operator: "Σ"
        name: "Integration"
        depends_on: ["Χ", "Φ"]
        minimal_function: >
          Synthesizes contradictions without compensation, denial, splitting,
          or coercive simplification.
        typical_drift_markers:
          - "fragmentation"
          - "Φ substitutes for Σ"
          - "Α/Ω/Λ compensate for unresolved contradiction"
          - "split coherence"

      - operator: "Ψ"
        name: "Self-Binding"
        depends_on: ["Σ", "Θ", "Χ"]
        minimal_function: >
          Binds integrated trajectories into identity-relevant commitments over time.
        reading_note: >
          Ψ can bind, suspend, or leak. Suspension is not removal from the PMS
          chain; it is a domain-specific attribution condition.
        typical_drift_markers:
          - "Ψ leak"
          - "possession or self-worth claims smuggled into limited frames"
          - "identity capture"
          - "local enactment becomes proof demand"

  structural_map:
    paper_refs: ["Appendix D"]
    note: >
      Compressed one-page orientation map for PMS-SEX. Orientation only; not
      explanatory, normative, diagnostic, or instructional.

    canonical_spine: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"

    key_zones:
      activation_and_legibility:
        operators: ["Δ", "∇", "□"]
        insight: "Difference and impulse become readable only through frame grammar."
        failure_mode: "pressure without legibility → escalation, fusion, ambiguity drift, or retroactive rule-making"

      absence_repetition_stabilization:
        operators: ["Λ", "Α"]
        insight: "Absence is not neutral; repetition is not free."

      cost_axis_core:
        operators: ["Ω", "Θ"]
        insight: >
          Once Α exists, Ω and Θ become consequence-effective. Interpretation
          may be revised; Θ does not rewind.

      narrative_handling:
        operator: "Φ"
        bifurcation:
          regulated: "Φ + Χ operative"
          drift_prone: "Φ without Χ"

      regulation_gate:
        operator: "Χ"
        insight: >
          Χ enables stop-capability and meta-position. Χ loss is the strongest
          drift predictor in PMS-SEX.

      coherence_handling:
        operator: "Σ"
        insight: >
          Σ holds contradictions without coercion or compensation. If Σ fails,
          substitutes take over: Α repetition, Φ inflation, Ω control, or Λ withdrawal.

      identity_binding_zone:
        operator: "Ψ"
        warning: >
          Ψ leak indicates binding pressure inside frames that cannot carry
          identity relevance.

    highlighted_drift_corridors:
      primary: |
        Ψ leak
         → Ω escalation
         → Χ loss
         → Α fixation
         → Θ overload
         → exit collapse
      compressed_appendix_D: |
        Λ density
         → Α monopolization
         → Ω as steering
         → Θ accumulation
         → Χ collapse
         → late Ψ capture
      secondary: |
        internal-label capture
         → outer-form denial
         → publicness confusion
         → delayed cost recognition

    minimal_viability_corridor: |
      □ explicit
      + Ω nameable
      + Θ realistic
      + Χ operative
      + Λ tolerable
      + Ψ handled
      (+ Σ reachable)
      = structurally governable configuration

    inner_outer_public_overlay: |
      A scene may be:
        - internally framed one way,
        - externally readable another way,
        - publicly circulated in a third way,
        - temporally carried in a fourth way.

      PMS-SEX does not collapse these layers.

    path_cost_disturbance_guard: |
      Where the map refers to instability, disturbance, deviation, entropy, or
      higher path-cost, these terms apply only to configuration dynamics. They
      describe stabilization burden under the Δ–Ψ grammar, not person status,
      identity rank, orientation taxonomy, clinical disorder, moral failure, or
      degraded dignity.

# -----------------------------------------------------------------------------
# Analysis checklist
# -----------------------------------------------------------------------------
analysis_checklist:
  paper_refs: ["Ch. 0.8", "Ch. 0.9", "Ch. 18", "Ch. 19", "Ch. 20", "Appendix D"]
  note: >
    Scene-bound structural checklist for PMS-SEX application. Criteria only;
    non-instructional, non-diagnostic. Use with validity_gate: Χ + reversibility + D.

  steps:
    - id: "S1"
      title: "Scene boundary"
      checks:
        - "Define the scene through □: inside/outside, timing, role grammar, permitted/not permitted, local/binding-relevant."
        - "Confirm all readings remain configuration-bound and revisable."
        - "Identify whether internal framing, outer legibility, publicness, and temporal carryover diverge."

    - id: "S2"
      title: "Canonical dependency check"
      checks:
        - "Confirm the reading does not alter the PMS v1.3 operator spine."
        - "If using a reduced signature, treat it as shorthand only."
        - "If Χ appears, remember Χ depends on Φ, Θ, and □."
        - "If Ψ appears, remember Ψ depends on Σ, Θ, and Χ."

    - id: "S3"
      title: "Reduced operator signature"
      checks:
        - "Select the closest reduced_signatures entry."
        - "Record chapter reference for the selected signature."
        - "Do not infer a new dependency relation from a shorthand cluster."

    - id: "S4"
      title: "Inner / outer / public layer scan"
      checks:
        - "Identify internal framing: how the scene is inhabited or named."
        - "Identify outer legibility: what action-form is structurally readable."
        - "Identify publicness: whether visibility, documentation, circulation, reputation, or audience uptake modifies consequences."
        - "Do not let any one layer erase the others."

    - id: "S5"
      title: "Cost axis scan"
      checks:
        - "Identify Ω gradients: access, exposure, obligation, repair, exit margin, definitional power."
        - "Identify Θ trajectory: accumulation, irreversibility, repetition, sedimentation, exit realism."
        - "Track body remainder and publicness as consequence interfaces where relevant."

    - id: "S6"
      title: "Distance and correction capacity"
      checks:
        - "Is Χ practically operative: stop-capability, hesitation, meta-comment, humor, re-reading?"
        - "Is Σ reachable without coercive simplification or narrative compensation?"
        - "Is outer-form awareness available without punishment?"

    - id: "S7"
      title: "Drift marker scan"
      checks:
        - "Check core dysfunction markers from Ch. 18.3."
        - "Check primary and secondary drift chains from Ch. 18.4."
        - "If Ψ leak is suspected, verify whether binding or attribution entered a frame narrated as limited, local, or non-binding."
        - "If outer-form denial appears, check whether practice labels are being used to block structural reading."

    - id: "S8"
      title: "Viability minimums"
      checks:
        - "Apply Ch. 19.3 functional minimums."
        - "Apply Ch. 19.4 warning signals."
        - "Use the Appendix D viability corridor as compressed orientation only."

    - id: "S9"
      title: "Path-cost guard"
      checks:
        - "If using disturbance, deviation, entropy, path-cost, or stabilization burden language, confirm it applies only to configuration dynamics."
        - "Reject any conversion into person-ranking, diagnosis, orientation taxonomy, moral pathology, or lower dignity."

    - id: "S10"
      title: "Escalation guard"
      checks:
        - "If drift persists despite structural clarity, the Ch. 20 structural self-check adapter may activate."
        - "The adapter outputs alarm only; no motive explanation or diagnosis."
        - "Maintain D: no shaming, no ranking, no person-labels, no humiliating critique."

# -----------------------------------------------------------------------------
# Example suite schema (repo vignettes; non-instructional)
# -----------------------------------------------------------------------------
example_suite_schema:
  paper_refs: ["Ch. 0.7", "Ch. 0.8"]
  note: >
    Examples are scene-bound operator-readable vignettes. They are
    non-instructional, generic, abstracted, and non-identifying.
  required_blocks:
    - "Minimal vignette (scene-bound and non-identifying)"
    - "Why this is repo-useful (structural focus only)"
    - "Operator mapping (canonical spine + reduced signature if applicable)"
    - "Inner / outer / public layer distinction"
    - "Operator costs / cost layout (Ω under Θ; include body/publicness interfaces where relevant)"
    - "Typical drift markers (max 2–3; non-moral, non-diagnostic)"
    - "Viability minimums or warning signals if applicable"
    - "Path-cost guard if disturbance or entropy language appears"
    - "Validity gate reminder (Χ + reversibility + D)"
    - "Readable structural closure (2–5 sentences; non-instructional)"
  forbidden:
    - "how-to guidance"
    - "procedural sexual instruction"
    - "risk optimization"
    - "identifiable case narratives"
    - "clinical interpretation"
    - "motive attribution"
    - "person ranking"
    - "orientation taxonomy"
    - "moral verdicts"

# -----------------------------------------------------------------------------
# Final profile guard
# -----------------------------------------------------------------------------
final_profile_guard:
  paper_refs: ["Ch. 24.3", "Ch. 24.4", "Appendix D.11"]
  text: >
    PMS-SEX remains valid by staying within what it can responsibly say:
    not what persons are, but what configurations do over time. It reads sexual
    praxis as enacted configuration under frame, asymmetry, non-event,
    repetition, temporality, distance, integration, and self-binding. It permits
    hard claims about cost, drift, outer legibility, and consequence without
    converting those claims into person-status judgments.
  compressed_rules:
    - "no consequence-free sex"
    - "no desire exempt from structural conditions"
    - "no outer-form erasure by internal labels"
    - "no publicness reduction"
    - "no path-cost as person-worth"
    - "no critique through humiliation"
    - "no taxonomy where only configuration-language is warranted"
    - "no total capture where the scene exceeds the grammar"