guard_registry:
  scene_bound: "Claims apply to concrete configurations, not persons globally."
  reversible_reading: "Readings remain revisable; Θ consequences do not rewind through reinterpretation."
  no_person_label: "No person label, essence claim, identity verdict, character verdict, or global person attribution."
  no_diagnosis: "No clinical, psychological, motive, trauma, pathology, or personality diagnosis."
  no_rank: "No dignity, maturity, adultness, orientation, sex, genital, biological, or worth ranking."
  no_moralism: "No purity claim, virtue hierarchy, moral ontology, contempt, humiliation, or moral theater."
  no_instruction: "No practical instruction, protocol, optimization, intervention method, or practice guidance."
  no_public_punishment: "Outer legibility does not authorize public accusation, exposure, shaming, punishment, or attribution escalation."
  no_orientation_taxonomy: "No taxonomy or hierarchy of sexual identities or orientations."
  no_sex_truth: "No conversion of sexed structure into sex truth, role proof, rank, or destiny."
  no_genital_truth: "No conversion of genital meaning into genital truth, person truth, command, altar, oracle, or immunity source."
  no_biological_destiny: "Biological affordance names bodies, risks, costs, thresholds, and likely strategy spaces; it does not establish destiny, role, rank, or moral evidence."
  no_relationship_mandate: "Sexed dependency does not imply heterosexual mandate, partner prescription, reproductive command, or person incompleteness."
  no_access_entitlement: "No person owes access, body, affection, desire, labor, correction, explanation, or availability."
  no_consent_substitution: "Consent, mutuality, or autonomy may be real frame conditions but do not by themselves settle cost distribution."
  no_permission_image_as_consent: "Permission-image and simulated counterdesire are not consent, encounter, or direct otherness."
  no_cost_score: "Sexual cost topology is not a score, person measure, dignity ranking, maturity ranking, sex truth, or genital truth."
  no_path_cost_person_value: "Disturbance, entropy, deviation, drift, failed emancipation, inadultness, or path-cost name stabilization burden, not human worth."
  no_visibility_totalization: "Visible form remains readable but must not be totalized as the whole configuration."
  no_internal_form_erasure: "Internal framing may be real without erasing outer form, cost topology, publicness, or temporal carryover."
  no_public_confession: "Sexuality may be publicly measure-forming without becoming confession-mandatory."
  no_boundary_aggression_authorization: "Boundary/aggression-collapse language does not adjudicate cases or authorize response, retaliation, coercion, or moral verdict."
  no_withdrawal_automatic_guilt: "Withdrawal is not automatic guilt, betrayal, exploitation, immaturity, or moral failure."
  no_withdrawal_automatic_exculpation: "Withdrawal is not automatic exculpation where structured Ψ-expectation and after-scene dignity are disowned."
  no_impulse_malice_default: "Impulse-nearness is not malice, contempt, objectification, or low intent by default."
  no_lack_of_malice_exculpation: "Lack of malice does not erase consequence, cost externalization, boundary failure, or responsibility."
  no_unlearned_handling_exculpation: "Unlearned handling may explain clumsiness without excusing cost externalization."
  operator_profile_only: "PMS-SEX records structural profiles; adultness- or maturity-relevant evaluation requires explicit MIP docking."
  mip_docking_required: "Maturity-relevant or adultness-relevant critique belongs only to explicit MIP docking."
  mip_no_back_projection: "MIP must not retroactively convert PMS-SEX structural descriptions into moral verdicts or person ontology."
  dignity_protection: "Dignity-in-Practice protects enactment from degradation; it is not a person-status score."
  after_scene_dignity: "After-scene dignity requires that Θ carryover not become person-shrinking, shame residue, self-worth leakage, blame reversal, or responsibility flight."
  direct_otherness_guard: "Direct otherness is reality-correction without access entitlement."
  genital_emancipation_guard: "Adult Sexual Emancipation means genital integration without genital sovereignty."
  asymmetry_activation_guard: "Asymmetry activation is legitimate only where marked, bounded, linked to real Ω/Θ burden, and re-bound into Σ/Ψ where relevant."
  parity_guard: "Parity coordinates reciprocity only where it does not exit responsibility under unequal cost topology."
  responsibility_guard: "Responsibility under asymmetry requires self-binding and restraint, not authority, control, or frame ownership."

