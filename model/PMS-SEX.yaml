# -----------------------------------------------------------------------------
# Overlay concepts (non-operators; application-level only)
# -----------------------------------------------------------------------------
overlay_concepts:
  paper_refs: ["Ch. 0.4a", "Ch. 0.4b", "Ch. 0.4c", "Ch. 0.6a", "Ch. 0.6b", "Appendix B"]

  internal_framing:
    name: "Internal Framing"
    is_operator: false
    definition: >
      How a scene is inhabited, narrated, or lived from within the configuration:
      as play, service, devotion, experimentation, intimacy, kink, discipline,
      restraint, authenticity, or otherwise.
    guard: >
      Internal framing may shape experience but does not by itself determine or
      erase outer structural form.

  outer_legibility:
    name: "Outer Legibility"
    is_operator: false
    definition: >
      The structurally readable action-form a scene presents under visible
      asymmetry, exposure, markedness, repetition, and consequence, independent
      of whether internal framing confirms or contests that readability.
    guard: >
      Naming outer legibility does not imply person-ranking, diagnosis, moral
      verdict, denial of consent, or total interpretation of the scene.

  pre_reflective_readability:
    name: "Pre-Reflective Scene Readability"
    is_operator: false
    definition: >
      Early or immediate scene-legibility of certain marked configurations before
      elaborate internal translation or justificatory narration.
    guard: >
      This is a structural readability claim, not a psychology thesis, not a
      theory of innocence, and not a license for person-ranking.

  publicness_as_overlay:
    name: "Publicness as Overlay"
    is_operator: false
    pms_layer: "□ extension"
    primarily_intensifies: ["Ω", "Θ"]
    interacts_with: ["□", "Α", "Λ"]
    definition: >
      Publicness as a frame-extension that distributes, amplifies, documents,
      repeats, or sedimentizes a scene’s readability and consequences without
      necessarily generating the scene’s primary form in the first place.
    guard: >
      Publicness is neither always the origin nor automatically irrelevant.
      It modifies the consequence field.

  path_cost_language:
    name: "Path-Cost / Stabilization Burden"
    is_operator: false
    definition: >
      Configuration-level language for the operator-work required to keep a
      configuration coherent, reversible, non-coercive, and dignity-preserving
      under recurrence and temporality.
    guard: >
      Path-cost, disturbance, entropy, deviation, and stabilization burden do not
      classify persons, diagnose identities, rank orientations, lower dignity,
      or authorize moral pathology.

  body_remainder:
    name: "Body as Non-Operator Remainder"
    is_operator: false
    paper_refs: ["Ch. 13"]
    definition: >
      The body is treated as a material remainder or consequence interface that
      forces visibility, irreversibility, and cost recognition without becoming
      a new PMS operator.
    guard: >
      Body remainder is not a person-ranking device and not a biological
      taxonomy. It names material consequence capacity within configurations.

